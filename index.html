  },{});
  const sevCfg = [
    {k:'critical',label:'Critical',bg:'var(--badge-red-bg)',border:'var(--badge-red-bd)',color:'var(--sev-red-t)'},
    {k:'high',    label:'High',    bg:'var(--badge-amber-bg)',border:'var(--badge-amber-bd)',color:'var(--sev-amber-t)'},
    {k:'medium',  label:'Medium',  bg:'var(--tint)',border:'var(--tint-border)',color:'var(--teal)'},
    {k:'low',     label:'Low',     bg:'var(--badge-gray-bg)',border:'var(--badge-gray-bd)',color:'var(--gray-400)'},
  ];
  return (
    <>
      <div className="sev-grid mb14">
        {sevCfg.map(s=>(
          <div key={s.k} className="sev-card" style={{background:s.bg,borderColor:s.border}}>
            <div style={{fontSize:28,fontWeight:800,color:s.color}}>{sevCount[s.k]||0}</div>
            <div style={{fontSize:10,color:s.color,marginTop:3,textTransform:'uppercase',letterSpacing:'.08em'}}>{s.label}</div>
          </div>
        ))}
      </div>
      <div className="card">
        <div className="card-title"><div className="dot" style={{background:'var(--red)'}}/>SOC Insights</div>
        <RowLimitBar limit={rowLimit} setLimit={setRowLimit}/>
        <DataTable ctl={ctl} rows={rows.slice(0,rowLimit)} defaultRows={rowLimit} initialSort={{key:'severity',dir:'asc'}} exportName="soc-insights" persistId="insights"/>
      </div>
    </>
  );
}

/* humanize a cube/raw key: "InsightsSummaryView.total_events" -> "Total Events" */
function humanizeKey(k){ return String(k).replace(/^[^.]*\./,'').replace(/[_-]/g,' ').replace(/\b\w/g,m=>m.toUpperCase()); }

/* IQ Actions — resilient to unknown shape: derives columns from the data */
function ActionsPanel({data, rowLimit, setRowLimit}) {
  const rows = !data ? [] : (Array.isArray(data) ? data : (data.actions||data.results||data.data||[]));
  const keys = rows.length ? Object.keys(rows[0]).filter(k=>k[0]!=='_').slice(0,8) : [];
  const allCols = keys.map((k,i)=>({
    key:k, label:humanizeKey(k), fixed:i===0,
    sortVal:r=>r[k],
    render:r=>{
      const v=r[k];
      if(v==null) return '—';
      if(/sever|status|level|state|result/i.test(k)){
        const lv=String(v).toLowerCase();
        const cls={critical:'b-red',high:'b-amber',active:'b-green',enabled:'b-green',completed:'b-green',success:'b-green',medium:'b-teal',low:'b-gray',failed:'b-red',error:'b-red',disabled:'b-gray',pending:'b-teal'}[lv];
        if(cls) return <span className={`badge ${cls}`}>{String(v)}</span>;
      }
      if(typeof v==='object') return <span style={{color:'var(--gray-400)'}}>{JSON.stringify(v)}</span>;
      return typeof v==='number'?v.toLocaleString():String(v);
    },
  }));
  const ctl=useColumns('actions', allCols.length?allCols:[{key:'_empty',label:'—'}]);
  if(!data) return <SkeletonTable/>;
  if(!rows.length) return <div className="no-data">No IQ actions found{data._raw?` · ${data._raw}`:''}</div>;
  return (
    <>
      <RowLimitBar limit={rowLimit} setLimit={setRowLimit}/>
      <DataTable ctl={ctl} rows={rows} defaultRows={rowLimit} exportName="iq-actions" persistId="actions"/>
    </>
  );
}

/* Host performance metrics (avg over last hour, per host+metric) */
function HostMetricsPanel({data, cutoffMs=0}) {
  const rows = !data ? [] : (cutoffMs>0 ? (data.metrics||[]).filter(r=>{const ts=r['HostMetrics.timestamp']||r.timestamp||'';const ms=new Date(ts).getTime();return isNaN(ms)||ms>=cutoffMs;}) : (data.metrics||[]));
  const max = rows.reduce((m,r)=>Math.max(m, Number(r['HostMetrics.avg_value'])||0), 0) || 1;
  const allCols=[
    {key:'host',label:'Host',fixed:true,sortVal:r=>r['HostMetrics.host_name']||'',render:r=><span style={{fontWeight:500}}>{r['HostMetrics.host_name']||'—'}</span>},
    {key:'metric',label:'Metric',sortVal:r=>r['HostMetrics.metric_name']||'',render:r=><span style={{color:'var(--gray-400)'}}>{r['HostMetrics.metric_name']||'—'}</span>},
    {key:'avg',label:'Avg (1h)',sortVal:r=>Number(r['HostMetrics.avg_value'])||0,render:r=>{const v=Number(r['HostMetrics.avg_value'])||0;return (<div style={{display:'flex',alignItems:'center',gap:8}}><div className="bar-track"><div className="bar-fill" style={{width:`${Math.round(v/max*100)}%`,background:'var(--teal)'}}/></div><span style={{fontFamily:'monospace',fontSize:11}}>{v.toLocaleString(undefined,{maximumFractionDigits:2})}</span></div>);}},
  ];
  const ctl=useColumns('hostmetrics',allCols);
  if(!data) return <SkeletonTable/>;
  if(!rows.length) return <div className="no-data">No host metrics available for the last hour</div>;
  return <DataTable ctl={ctl} rows={rows} defaultRows={15} exportName="host-metrics" persistId="hostmetrics" initialSort={{key:'avg',dir:'desc'}}/>;
}

function PercentileCards({data}) {
  if(!data||!data.metrics||!data.metrics.length) return null;
  const byMetric = {};
  data.metrics.forEach(r=>{
    const m=(r['HostMetrics.metric_name']||'').toLowerCase();
    const v=Number(r['HostMetrics.avg_value'])||0;
    if(!byMetric[m]) byMetric[m]=[];
    byMetric[m].push(v);
  });
  const pct=(arr,p)=>{const s=[...arr].sort((a,b)=>a-b);return s[Math.floor(s.length*p/100)]??0;};
  const fmt=v=>v<1?v.toFixed(3):v<100?v.toFixed(1):Math.round(v).toLocaleString();
  const metrics=[
    {key:'cpu',label:'CPU %',unit:'%'},
    {key:'memory',label:'Memory %',unit:'%'},
    {key:'disk',label:'Disk %',unit:'%'},
    {key:'latency',label:'Latency',unit:'ms'},
  ].filter(m=>byMetric[m.key]?.length);
  if(!metrics.length) return null;
  return (
    <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
      {metrics.map(m=>{
        const vals=byMetric[m.key];
        const p50=pct(vals,50), p95=pct(vals,95), p99=pct(vals,99);
        const crit=p95>90;
        return (
          <div key={m.key} className={`card${crit?' warn-state':''}`} style={{flex:1,minWidth:120,padding:10}}>
            <div style={{fontSize:9,fontFamily:'var(--font-mono)',color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:6}}>{m.label}</div>
            {[['p50',p50],['p95',p95],['p99',p99]].map(([lbl,v])=>(
              <div key={lbl} style={{display:'flex',justifyContent:'space-between',fontSize:11,fontFamily:'var(--font-mono)',padding:'1px 0'}}>
                <span style={{color:'var(--muted)'}}>{lbl}</span>
                <span style={{color:lbl==='p99'&&v>90?'var(--red)':lbl==='p95'&&v>85?'var(--amber)':'var(--ink)',fontWeight:lbl==='p50'?400:600}}>{fmt(v)}{m.unit}</span>
              </div>
            ))}
          </div>
        );
      })}
    </div>
  );
}

function ContentionMatrix({data, hosts}) {
  if(!data||!data.metrics||!data.metrics.length||!hosts||!hosts.length) return null;
  const METRICS=['cpu','memory','disk','latency'];
  const sevClr=v=>v>=90?'var(--red)':v>=75?'var(--amber)':v>=50?'var(--teal)':'var(--surface-3)';
  const byHost={};
  data.metrics.forEach(r=>{
    const h=r['HostMetrics.host_name']||'?';
    const m=(r['HostMetrics.metric_name']||'').toLowerCase();
    const v=Number(r['HostMetrics.avg_value'])||0;
    if(!byHost[h]) byHost[h]={};
    byHost[h][m]=v;
  });
  const hostNames=Object.keys(byHost).slice(0,20);
  if(!hostNames.length) return null;
  return (
    <div className="card" style={{marginBottom:14,overflowX:'auto'}}>
      <div className="card-title"><div className="dot"/>Resource Contention Matrix</div>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:10,fontFamily:'var(--font-mono)'}}>
        <thead>
          <tr>
            <th style={{textAlign:'left',padding:'2px 8px',color:'var(--muted)',fontWeight:400,borderBottom:'1px solid var(--border)'}}>Host</th>
            {METRICS.map(m=><th key={m} style={{textAlign:'center',padding:'2px 6px',color:'var(--muted)',fontWeight:400,width:52,borderBottom:'1px solid var(--border)',textTransform:'uppercase',letterSpacing:'.06em'}}>{m}</th>)}
          </tr>
        </thead>
        <tbody>
          {hostNames.map(h=>(
            <tr key={h}>
              <td style={{padding:'2px 8px',color:'var(--ink)',maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={h}>{h}</td>
              {METRICS.map(m=>{
                const v=byHost[h][m]??null;
                return (
                  <td key={m} style={{textAlign:'center',padding:2}}>
                    {v!==null
                      ? <div style={{width:44,height:20,margin:'0 auto',borderRadius:3,background:sevClr(v),display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,color:'rgba(0,0,0,.75)',fontWeight:700}} title={`${h} ${m}: ${v.toFixed(1)}`}>{v.toFixed(0)}%</div>
                      : <div style={{width:44,height:20,margin:'0 auto',borderRadius:3,background:'var(--surface-3)',opacity:.3}}/>}
                  </td>
                );
              })}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function HealthScorecards({data, hosts}) {
  if(!data||!data.metrics||!hosts||!hosts.length) return null;
  const byHost={};
  data.metrics.forEach(r=>{
    const h=r['HostMetrics.host_name']||'?';
    const m=(r['HostMetrics.metric_name']||'').toLowerCase();
    const v=Number(r['HostMetrics.avg_value'])||0;
    if(!byHost[h]) byHost[h]={};
    byHost[h][m]=v;
  });
  const score=(hostName, status)=>{
    const m=byHost[hostName]||{};
    if(status==='offline'||status==='error') return 0;
    let s=100;
    if(m.cpu>90) s-=30; else if(m.cpu>75) s-=15;
    if(m.memory>90) s-=25; else if(m.memory>75) s-=12;
    if(m.disk>90) s-=20; else if(m.disk>75) s-=10;
    if(m.latency>200) s-=15; else if(m.latency>100) s-=8;
    if(status==='degraded') s-=20;
    return Math.max(0,s);
  };
  const grade=s=>s>=90?'A':s>=75?'B':s>=60?'C':s>=40?'D':'F';
  const gradeClr=s=>s>=90?'var(--green)':s>=60?'var(--amber)':'var(--red)';
  const top=[...hosts].sort((a,b)=>score(a.name||a.ip,a.status)-score(b.name||b.ip,b.status)).slice(0,10);
  return (
    <div className="card" style={{marginBottom:14}}>
      <div className="card-title"><div className="dot"/>Device Health Scorecards</div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
        {top.map((h,i)=>{
          const nm=h.name||h.ip||'?';
          const s=score(nm, h.status);
          const g=grade(s);
          const c=gradeClr(s);
          return (
            <div key={i} style={{minWidth:80,padding:'8px 10px',background:'var(--surface-2)',borderRadius:4,border:`1px solid ${s<60?'var(--red)':s<75?'var(--amber)':'var(--border)'}`,textAlign:'center',fontFamily:'var(--font-mono)'}}>
              <div style={{fontSize:22,fontWeight:800,color:c,lineHeight:1}}>{g}</div>
              <div style={{fontSize:16,fontWeight:400,color:c,lineHeight:1,marginTop:2}}>{s}</div>
              <div title={nm} style={{fontSize:8,color:'var(--muted)',marginTop:4,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:72}}>{nm}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function StatusGrid({hosts, data}) {
  if(!hosts||!hosts.length) return null;
  const byHost={};
  (data?.metrics||[]).forEach(r=>{
    const h=r['HostMetrics.host_name']||'?';
    const m=(r['HostMetrics.metric_name']||'').toLowerCase();
    const v=Number(r['HostMetrics.avg_value'])||0;
    if(!byHost[h]) byHost[h]={};
    byHost[h][m]=v;
  });
  const statusDot=s=>s==='online'?'var(--green)':s==='degraded'?'var(--amber)':s==='offline'||s==='error'?'var(--red)':'var(--surface-3)';
  const metricDot=(v,warn=75,crit=90)=>v>=crit?'var(--red)':v>=warn?'var(--amber)':v>0?'var(--green)':'var(--surface-3)';
  const COLS=[
    {label:'Status', fn:(h)=>({clr:statusDot(h.status), val:h.status})},
    {label:'CPU',    fn:(h)=>{const v=byHost[h.name||h.ip]?.cpu??null;return {clr:v!==null?metricDot(v):'var(--surface-3)', val:v!==null?v.toFixed(0)+'%':'—'};}},
    {label:'Mem',    fn:(h)=>{const v=byHost[h.name||h.ip]?.memory??null;return {clr:v!==null?metricDot(v):'var(--surface-3)', val:v!==null?v.toFixed(0)+'%':'—'};}},
    {label:'Disk',   fn:(h)=>{const v=byHost[h.name||h.ip]?.disk??null;return {clr:v!==null?metricDot(v):'var(--surface-3)', val:v!==null?v.toFixed(0)+'%':'—'};}},
    {label:'Latency',fn:(h)=>{const v=byHost[h.name||h.ip]?.latency??null;return {clr:v!==null?metricDot(v,100,200):'var(--surface-3)', val:v!==null?v.toFixed(0)+'ms':'—'};}},
  ];
  const show=hosts.slice(0,30);
  return (
    <div className="card" style={{marginBottom:14,overflowX:'auto'}}>
      <div className="card-title"><div className="dot"/>Host Status Grid</div>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:10,fontFamily:'var(--font-mono)'}}>
        <thead><tr>
          <th style={{textAlign:'left',padding:'2px 6px',color:'var(--muted)',fontWeight:400,borderBottom:'1px solid var(--border)'}}>Host</th>
          {COLS.map(c=><th key={c.label} style={{textAlign:'center',width:56,padding:'2px 4px',color:'var(--muted)',fontWeight:400,borderBottom:'1px solid var(--border)'}}>{c.label}</th>)}
        </tr></thead>
        <tbody>
          {show.map((h,i)=>{
            const nm=h.name||h.ip||'?';
            return (
              <tr key={i}>
                <td style={{padding:'3px 6px',color:'var(--ink)',maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={nm}>{nm}</td>
                {COLS.map(c=>{const {clr,val}=c.fn(h);return(
                  <td key={c.label} style={{textAlign:'center',padding:'2px 4px'}}>
                    <div style={{display:'inline-flex',alignItems:'center',gap:3}}>
                      <div style={{width:8,height:8,borderRadius:'50%',background:clr,flexShrink:0}}/>
                      <span style={{fontSize:9,color:'var(--muted)'}}>{val}</span>
                    </div>
                  </td>
                );})}
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

function ThreatLookupPanel({subnets=[], leases=[]}) {
  const [q,setQ]         = useState('');
  const [results,setRes] = useState(null);
  const [loading,setLd]  = useState(false);
  const [blocked,setBlocked] = useState({});
  const [actionLog,setActionLog] = useState(()=>LS.get('noc.actionLog',[]));
  const [confirmBlock,setConfirmBlock] = useState(null);
  const logAction = (entry)=>{ const n=[entry,...actionLog].slice(0,50); setActionLog(n); LS.set('noc.actionLog',n); };

  const lookup = async () => {
    if(!q.trim()) return;
    setLd(true); setRes(null);
    try {
      const r = await fetch(`/api/threat-lookup?q=${encodeURIComponent(q.trim())}`);
      const d = r.ok ? await r.json() : {entities:[]};
      setRes(d);
    } catch { setRes({entities:[]}); }
    setLd(false);
  };

  const doBlock = async (domain) => {
    let ok=false, err='';
    try {
      const r = await fetch('/api/block-domain', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({domain})});
      const j = await r.json().catch(()=>({})); ok = r.ok && j.ok!==false; if(!ok) err=(j&&j.error)||('HTTP '+r.status);
    } catch(e) { err='network error'; }
    if(ok) setBlocked(b=>({...b,[domain]:true}));
    toast(ok?`Blocked ${domain} network-wide`:`Block failed: ${err}`, ok?'ok':'err');
    logAction({id:Date.now(),act:'block',domain,ok,err,ts:new Date().toISOString()});
  };
  const block = (domain) => { setConfirmBlock(domain); };
  const unblock = async (domain) => {
    let ok=false, err='';
    try {
      const r = await fetch('/api/unblock-domain', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({domain})});
      const j = await r.json().catch(()=>({})); ok = r.ok && j.ok!==false; if(!ok) err=(j&&j.error)||('HTTP '+r.status);
    } catch(e) { err='network error'; }
    if(ok) setBlocked(b=>{const n={...b}; delete n[domain]; return n;});
    toast(ok?`Unblocked ${domain}`:`Unblock failed: ${err}`, ok?'ok':'err');
    logAction({id:Date.now(),act:'unblock',domain,ok,err,ts:new Date().toISOString()});
  };

  const onKey = e => { if(e.key==='Enter') lookup(); };

  const entities = results?.entities || [];

  return (
    <>
      <div className="lookup-input-row">
        <input className="lookup-in" aria-label="Search IP, hostname, or domain" placeholder="Search IP, hostname, or domain…"
          value={q} onChange={e=>setQ(e.target.value)} onKeyDown={onKey}/>
        <button className="lookup-btn" onClick={lookup} disabled={loading||!q.trim()}>
          {loading?'…':'Search'}
        </button>
      </div>
      {results&&!loading&&(
        entities.length===0
          ?<div className="no-data">No entities found for "{q}"</div>
          :<>
            <div style={{fontSize:11,color:'var(--gray-400)',marginBottom:10}}>{entities.length} entit{entities.length===1?'y':'ies'} found</div>
            {entities.map((e,i)=>{
              const name=e.name||e.display_name||'—';
              const type=e.type||e.resource_type||'—';
              const addr=e.address||e.ip||'';
              const isDomain=/^[a-zA-Z]/.test(q)&&q.includes('.');
              return (
                <div key={i} className="entity-card">
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                    <div>
                      <div style={{fontSize:12,fontWeight:600,color:'var(--teal)',marginBottom:3}}>{name}</div>
                      <div style={{fontSize:10,color:'var(--gray-400)'}}>{type}{addr&&` · ${addr}`}</div>
                    </div>
                    <span className="badge b-gray" style={{flexShrink:0}}>{type}</span>
                  </div>
                  {isDomain&&(
                    blocked[name]
                      ?<div style={{display:'flex',gap:8,alignItems:'center',marginTop:6}}>
                         <span style={{fontSize:10,color:'var(--sev-red-t)'}}>✓ Block request sent</span>
                         <button className="collapse-btn" style={{margin:0}} onClick={()=>unblock(name)} title="Roll back this block" aria-label="Roll back block">↶ Undo</button>
                       </div>
                      :<button className="block-btn" onClick={()=>block(name)}>⊗ Block Domain</button>
                  )}
                  {(()=>{
                    const ip=(addr&&/^\d+\.\d+\.\d+\.\d+/.test(addr))?addr:(/^\d+\.\d+\.\d+\.\d+/.test(q.trim())?q.trim():'');
                    if(!ip) return null;
                    const lease=leases.find(l=>l.addr===ip);
                    const sub=lease?subnets.find(s=>s.id===lease.subnet_id):null;
                    return (
                      <div style={{marginTop:8,paddingTop:8,borderTop:'1px solid var(--border)',display:'flex',flexDirection:'column',gap:4,fontSize:11}}>
                        <div style={{fontSize:9,textTransform:'uppercase',letterSpacing:'.08em',color:'var(--gray-400)'}}>Network context</div>
                        <div><span style={{color:'var(--gray-400)'}}>IP:</span> <span style={{fontFamily:'monospace',color:'var(--ink)'}}>{ip}</span></div>
                        <div><span style={{color:'var(--gray-400)'}}>Host:</span> {lease&&lease.host?<span style={{color:'var(--gray-200)'}}>{lease.host}</span>:<span style={{color:'var(--gray-600)'}}>— no active lease</span>}</div>
                        <div><span style={{color:'var(--gray-400)'}}>Subnet:</span> {sub?<span style={{color:'var(--gray-200)'}}>{sub.name!==sub.addr?sub.name:`${sub.addr}/${sub.cidr}`} <span className="badge b-gray">{sub.site||'—'}</span> <span style={{color:utilColor(sub.util),fontWeight:700}}>{sub.util}%</span></span>:<span style={{color:'var(--gray-600)'}}>— not found in IPAM</span>}</div>
                      </div>
                    );
                  })()}
                </div>
              );
            })}
          </>
      )}
      {!results&&!loading&&(
        <div className="no-data" style={{paddingTop:60}}>
          Enter an IP address, hostname, or domain name to look up entities and threat intelligence
        </div>
      )}
      {actionLog.length>0&&(
        <div className="card" style={{marginTop:16}}>
          <div className="card-title"><div className="dot"/>Action audit trail</div>
          {actionLog.map(a=>(
            <div key={a.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:'1px solid var(--border)',fontSize:11}}>
              <span><b style={{color:a.act==='block'?'var(--sev-red-t)':'var(--teal)'}}>{a.act}</b> {a.domain}{' '}
                <span style={{color:a.ok?'var(--green)':'var(--red)'}}>{a.ok?'✓':'✗ '+a.err}</span></span>
              <span style={{display:'flex',gap:8,alignItems:'center'}}>
                <span style={{color:'var(--gray-400)'}}>{new Date(a.ts).toLocaleTimeString()}</span>
                {a.act==='block'&&a.ok&&<button className="collapse-btn" style={{margin:0}} onClick={()=>unblock(a.domain)} title="Roll back" aria-label="Roll back block">↶ Undo</button>}
              </span>
            </div>
          ))}
        </div>
      )}
      {confirmBlock&&<>
        <div className="col-overlay" onClick={()=>setConfirmBlock(null)}/>
        <div className="col-menu" style={{minWidth:240,position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)'}} role="dialog" aria-label="Confirm block" onKeyDown={e=>{if(e.key==='Escape'){e.stopPropagation();setConfirmBlock(null);}}}>
          <div className="col-menu-head"><span className="col-menu-title">Block "{confirmBlock}"?</span></div>
          <div style={{padding:'6px 10px',fontSize:11,color:'var(--gray-400)',lineHeight:1.5}}>Adds to Infoblox block list — denies DNS resolution network-wide. Requires DASHBOARD_TOKEN.</div>
          <div style={{padding:'6px 10px',display:'flex',gap:6}}>
            <button className="col-reset" onClick={async()=>{const d=confirmBlock;setConfirmBlock(null);await doBlock(d);}}>Block</button>
            <button autoFocus className="col-iconbtn" onClick={()=>setConfirmBlock(null)} aria-label="Cancel">Cancel</button>
          </div>
        </div>
      </>}
    </>
  );
}

function NXProxy({zones}) {
  const zero=zones.filter(z=>z.records===0);
  return (
    <>
      <div className="alert mb14" style={{background:'var(--hover-strong)',borderColor:'var(--tint-border)',color:'var(--teal)'}}>
        ℹ DNS query logs unavailable via IPAM API — showing zones with 0 records as NXDOMAIN proxy
      </div>
      {zero.length===0
        ?<div className="no-data">No zones with zero records</div>
        :zero.map(z=>(
          <div key={z.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
            <span style={{fontFamily:'monospace',fontSize:12}}>{z.fqdn}</span>
            <div style={{display:'flex',gap:6}}>
              <span className="badge b-teal">{z.view}</span>
              <span className="badge b-red">0 records</span>
            </div>
          </div>
        ))}
    </>
  );
}

function SearchSection({data, srchQ, setSrchQ, srchRes, setSrchRes, srching, setSrching, searchHistory, setSearchHistory}) {
  const run = async (q) => {
    q = q.trim();
    if(!q) return;
    setSrchQ(q);  // ensure input is updated
    setSearchHistory(h=>{ const next=[q,...h.filter(x=>x!==q)].slice(0,5); LS.set('sh',next); return next; });
    setSrching(true);
    setSrchRes(null);

    /* ── local search (instant, no server) ── */
    const lq = q.toLowerCase();
    const local = {
      subnets:  (data?.subnets  ||[]).filter(s=>[s.name,s.addr,s.site].some(v=>(v||'').toLowerCase().includes(lq))),
      hosts:    (data?.hosts    ||[]).filter(h=>[h.name,h.ip,h.type,h.status].some(v=>(v||'').toLowerCase().includes(lq))),
      zones:    (data?.zones    ||[]).filter(z=>[z.fqdn,z.view].some(v=>(v||'').toLowerCase().includes(lq))),
      feeds:    (data?.feeds    ||[]).filter(f=>[f.name,f.cat,f.level].some(v=>(v||'').toLowerCase().includes(lq))),
      policies: (data?.secPolicies||[]).filter(p=>[p.name,p.action].some(v=>(v||'').toLowerCase().includes(lq))),
      leases:   (data?.leases   ||[]).filter(l=>[l.addr,l.host,l.subnet].some(v=>(v||'').toLowerCase().includes(lq))),
    };

    /* ── MCP entity search ── */
    let entities = [];
    try {
      const r = await fetch(`/api/threat-lookup?q=${encodeURIComponent(q)}`);
      if(r.ok) { const d = await r.json(); entities = d.entities||[]; }
    } catch {}

    setSrchRes({local, entities, q});
    setSrching(false);
  };

  const onKey = e => { if(e.key==='Enter') run(srchQ); };

  const totalLocal = srchRes ? Object.values(srchRes.local).reduce((a,v)=>a+v.length,0) : 0;

  return (
    <div>
      {searchHistory.length>0&&(
        <div style={{marginBottom:10}}>
          <div style={{fontSize:10,color:'var(--gray-400)',marginBottom:5}}>Recent searches:</div>
          <div className="chip-bar">
            {searchHistory.map((q,i)=>(
              <button key={i} className="chip" onClick={()=>run(q)}>{q}</button>
            ))}
            <button className="chip" style={{color:'var(--sev-red-t)'}} onClick={()=>{setSearchHistory([]); LS.set('sh',[]);}}>✕ clear</button>
          </div>
        </div>
      )}
      {/* Search input */}
      <div className="card mb20" style={{padding:'18px 20px'}}>
        <div style={{fontSize:13,fontWeight:700,color:'var(--teal)',marginBottom:12}}>Search your network</div>
        <div style={{display:'flex',gap:8}}>
          <input
            style={{flex:1,background:'var(--surface-2)',border:'1px solid var(--border)',borderRadius:7,
              color:'var(--ink)',fontSize:13,padding:'10px 14px',outline:'none',transition:'border-color .12s'}}
            placeholder="IP address, hostname, subnet, domain, zone…"
            value={srchQ} onChange={e=>setSrchQ(e.target.value)} onKeyDown={onKey}
            autoFocus
            onFocus={e=>e.target.style.borderColor='var(--focus-border)'}
            onBlur={e=>e.target.style.borderColor='var(--border)'}
          />
          <button
            onClick={()=>run(srchQ)}
            disabled={!srchQ.trim()||srching}
            style={{background:'var(--teal)',border:'none',borderRadius:7,color:'var(--blue-dark)',
              fontSize:13,fontWeight:700,padding:'10px 22px',cursor:'pointer',opacity:(!srchQ.trim()||srching)?0.4:1,
              transition:'opacity .15s',whiteSpace:'nowrap'}}>
            {srching ? '…' : 'Search'}
          </button>
        </div>
        <div style={{fontSize:10,color:'var(--gray-400)',marginTop:8}}>
          Searches loaded data instantly + queries network entities via MCP
        </div>
      </div>

      {/* Empty state */}
      {!srchRes&&!srching&&(
        <div className="no-data" style={{paddingTop:80}}>
          <div style={{fontSize:32,marginBottom:12,opacity:.3}} aria-hidden="true">⊕</div>
          <div style={{color:'var(--gray-400)',fontSize:13}}>Enter a search term and press Search or Enter</div>
          <div style={{color:'var(--gray-400)',fontSize:11,marginTop:6}}>Searches subnets, hosts, zones, feeds, policies, leases, and network entities</div>
        </div>
      )}

      {/* Loading */}
      {srching&&<div className="spinner"/>}

      {/* Results */}
      {srchRes&&!srching&&(
        <>
          <div style={{fontSize:11,color:'var(--gray-400)',marginBottom:14}}>
            Results for <b style={{color:'var(--teal)'}}>{srchRes.q}</b>
            {' — '}{totalLocal} local match{totalLocal!==1?'es':''}{srchRes.entities.length>0?`, ${srchRes.entities.length} network entit${srchRes.entities.length!==1?'ies':'y'}`:''}
          </div>

          {totalLocal===0&&srchRes.entities.length===0&&(
            <div className="no-data">No matches found for "{srchRes.q}"</div>
          )}

          {/* Local groups */}
          {(()=>{
            return [
            {key:'subnets',  label:'Subnets',         cols:['name','addr','cidr','util','site'], fmt:(s)=>`${s.name} — ${s.addr}/${s.cidr} (${s.util}%) ${s.site}`},
            {key:'hosts',    label:'Hosts',            cols:['name','ip','type','status'],        fmt:(h)=>`${h.name} — ${h.ip} [${h.type}] ${h.status}`},
            {key:'zones',    label:'DNS Zones',        cols:['fqdn','view'],                      fmt:(z)=>`${z.fqdn} (${z.view})`},
            {key:'leases',   label:'DHCP Leases',      cols:['addr','host','subnet','state'],     fmt:(l)=>`${l.addr} — ${l.host||'—'} (${l.state})`},
            {key:'feeds',    label:'Threat Feeds',     cols:['name','level','cat'],               fmt:(f)=>`${f.name} [${f.level}]`},
            {key:'policies', label:'Security Policies',cols:['name','action'],                    fmt:(p)=>`${p.name} — ${p.action}`},
          ].filter(g=>srchRes.local[g.key]?.length>0).map(g=>(
            <div key={g.key} className="card mb14">
              <div className="card-title">
                <div className="dot"/>
                {g.label}
                <span style={{marginLeft:6,background:'var(--surface-3)',borderRadius:4,padding:'1px 7px',fontSize:10,color:'var(--teal)',fontWeight:700}}>
                  {srchRes.local[g.key].length}
                </span>
              </div>
              <SearchGroupTable g={g} items={srchRes.local[g.key]} q={srchRes.q}/>
            </div>
          ));})()}

          {/* MCP Network Entities */}
          {srchRes.entities.length>0&&(
            <div className="card">
              <div className="card-title">
                <div className="dot" style={{background:'var(--green)'}}/>
                Network Entities
                <span style={{marginLeft:6,background:'var(--surface-3)',borderRadius:4,padding:'1px 7px',fontSize:10,color:'var(--green)',fontWeight:700}}>
                  {srchRes.entities.length}
                </span>
              </div>
              {srchRes.entities.map((e,i)=>{
                const name=e.name||e.object_information?.name||'—';
                const type=e.resource_name||e.resource||'—';
                const app=e.application_name||e.application||'';
                const ip=e.object_information?.['Host IP Address']||e.object_information?.['IP Address']||'';
                return (
                  <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 0',borderBottom:'1px solid var(--border)'}}>
                    <div>
                      <div style={{fontSize:12,fontWeight:600}}>{name}</div>
                      <div style={{fontSize:10,color:'var(--gray-400)',marginTop:2}}>{app}{ip&&` · ${ip}`}</div>
                    </div>
                    <span className="badge b-teal">{type}</span>
                  </div>
                );
              })}
            </div>
          )}
        </>
      )}
    </div>
  );
}

const STARTER_CHIPS = {
  overview:['What needs attention?','Summarize network health','Which subnets are critical?'],
  triage:['What needs attention?','Which subnets are critical?','Which hosts are offline?'],
  ipam:['Which subnets are near capacity?','Find subnets with >90% utilization','Any subnets near exhaustion?'],
  hosts:['Which hosts are offline?','List degraded infrastructure','Any hosts with errors?'],
  threats:['What are the active threat categories?','Any new threat intel today?','Show critical feeds'],
  audit:['Who made changes in the last hour?','Show recent failures','Any unauthorized changes?'],
  security:['Which policies are blocking traffic?','Any policy changes recently?'],
  dns:['Any DNS zones with anomalies?','Show zones with TTL issues'],
};

function ChatPanel({open, onClose, data, messages, setMessages, queryMode, setQueryMode, searchQuery, setSearchQuery, section}) {
  const [input, setInput] = useState('');
  const [thinking, setThinking] = useState(false);
  const [cmdHistory, setCmdHistory] = useState([]);
  const [histIdx, setHistIdx] = useState(-1);
  const endRef = useRef(null);
  useEffect(()=>{ if(endRef.current) endRef.current.scrollIntoView({behavior:'smooth'}); },[messages,thinking]);

  const fillAndSend = (q) => {
    setMessages(m=>[...m,{id:Date.now(),role:'u',content:q}]);
    setThinking(true);
    const ctx = section ? `The operator is currently viewing the ${section} section.` : '';
    fetch('/api/query',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q,context:ctx})})
      .then(r=>r.ok?r.json():Promise.reject(r.status))
      .then(json=>{
        const ans=(json&&typeof json.answer==='string')?json.answer:'Query returned an unexpected response.';
        const sugs=(json&&Array.isArray(json.suggestions))?json.suggestions:[];
        const trace=(json&&Array.isArray(json.trace))?json.trace:[];
        setMessages(m=>[...m,{id:Date.now(),role:'a',content:ans,suggestions:sugs,trace}]);
        setThinking(false);
      })
      .catch(status=>{
        const msg=typeof status==='number'
          ?(status>=500?`Server error (${status}) — backend may be restarting. Try again.`:`Query failed (${status}).`)
          :'Connection error — check network and try again.';
        setMessages(m=>[...m,{id:Date.now(),role:'a',content:msg}]);
        setThinking(false);
      });
  };

  const send = async () => {
    const q = input.trim();
    if(!q) return;
    setInput('');
    setCmdHistory(h=>[q,...h.filter(x=>x!==q)].slice(0,50));
    setHistIdx(-1);
    if(queryMode==='filter') {
      setSearchQuery(q);
      setMessages(m=>[...m,
        {id:Date.now(),role:'u',content:q},
        {id:Date.now()+1,role:'a',content:`Filtering dashboard for "${q}" — matching results shown in each section.`}
      ]);
      return;
    }
    setMessages(m=>[...m,{id:Date.now(),role:'u',content:q}]);
    setThinking(true);
    try {
      const ctx = section ? `The operator is currently viewing the ${section} section.` : '';
      const r = await fetch('/api/query', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({question: q, context: ctx}),
      });
      if(!r.ok){
        const msg=r.status>=500?`Server error (${r.status}) — backend may be restarting. Try again.`:`Query failed (${r.status}).`;
        setMessages(m=>[...m,{id:Date.now(),role:'a',content:msg}]);
        setThinking(false); return;
      }
      const json = await r.json();
      const ans = (json && typeof json.answer === 'string') ? json.answer : 'Query returned an unexpected response.';
      const sugs = (json && Array.isArray(json.suggestions)) ? json.suggestions : [];
      const trace = (json && Array.isArray(json.trace)) ? json.trace : [];
      setMessages(m=>[...m,{id:Date.now(),role:'a',content:ans,suggestions:sugs,trace}]);
    } catch(e) {
      setMessages(m=>[...m,{id:Date.now(),role:'a',content:'Connection error — check network and try again.'}]);
    }
    setThinking(false);
  };

  const onKey = e => {
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();return;}
    if(e.key==='ArrowUp'&&cmdHistory.length>0){
      e.preventDefault();
      const idx=Math.min(histIdx+1,cmdHistory.length-1);
      setHistIdx(idx);setInput(cmdHistory[idx]);
    }
    if(e.key==='ArrowDown'){
      e.preventDefault();
      const idx=histIdx-1;
      if(idx<0){setHistIdx(-1);setInput('');}
      else{setHistIdx(idx);setInput(cmdHistory[idx]);}
    }
  };

  return (
    <div className={`chat-panel${open?' open':''}`}>
      <div className="chat-head">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',width:'100%',gap:6}}>
          <div className="chat-head-title">Query Assistant</div>
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            <div className="mode-row" style={{marginBottom:0}}>
              <button className={`mode-btn${queryMode==='ask'?' on':''}`} onClick={()=>setQueryMode('ask')}>Ask</button>
              <button className={`mode-btn${queryMode==='filter'?' on':''}`}
                onClick={()=>setQueryMode('filter')}
                style={queryMode==='filter'?{background:'var(--badge-amber-bg)',color:'var(--sev-amber-t)'}:{}}>Filter</button>
            </div>
            <button style={{background:'none',border:'1px solid var(--border)',borderRadius:5,color:'var(--gray-400)',cursor:'pointer',fontSize:10,fontWeight:600,padding:'3px 8px',letterSpacing:'.04em'}}
              onClick={()=>setMessages([{id:0,role:'a',content:'Cleared. Ask anything about your network.'}])}>Clear</button>
            <button className="close-btn" onClick={onClose} aria-label="Close query panel">✕</button>
          </div>
        </div>
      </div>

      <div className="chat-msgs">
        {messages.length<=1&&STARTER_CHIPS[section]&&(
          <div style={{padding:'8px 0 4px'}}>
            <div style={{fontSize:10,color:'var(--gray-400)',marginBottom:6,textTransform:'uppercase',letterSpacing:'.07em'}}>Suggested</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
              {STARTER_CHIPS[section].map((chip,i)=>(
                <button key={i} className="suggestion-chip" onClick={()=>fillAndSend(chip)}>{chip}</button>
              ))}
            </div>
          </div>
        )}
        {messages.map(m=>(
          <div key={m.id}>
            <div className={m.role==='u'?'msg-u':'msg-a'}>{m.content}</div>
            {m.role==='a'&&m.trace&&m.trace.length>0&&(
              <div className="trace-tl">
                <div className="trace-hd">Agent checked {m.trace.length} source{m.trace.length>1?'s':''}</div>
                {m.trace.map((t,i)=>{
                  const args=Object.values(t.args||{}).filter(v=>v!=null&&v!=='');
                  return (
                    <div key={i} className="trace-step">
                      <span className="trace-n">{i+1}</span>
                      <span className="trace-tool">{t.tool.replace(/^get_|^search_/,'')}</span>
                      {args.length>0&&<span style={{color:'var(--gray-400)',fontSize:10}}>({args.join(', ')})</span>}
                    </div>
                  );
                })}
              </div>
            )}
            {m.role==='a'&&m.suggestions&&m.suggestions.length>0&&(
              <div className="suggestion-chips">
                {m.suggestions.map((s,i)=>(
                  <button key={i} className="suggestion-chip" onClick={()=>fillAndSend(s)}>{s}</button>
                ))}
              </div>
            )}
          </div>
        ))}
        {thinking&&(
          <div className="msg-a" role="status" aria-label="Thinking…">
            <div className="thinking" aria-hidden="true">
              <div className="t-dot"/><div className="t-dot"/><div className="t-dot"/>
            </div>
          </div>
        )}
        <div ref={endRef}/>
      </div>

      <div className="chat-foot">
        <div className="chat-row">
          <textarea className="chat-in" rows={2} aria-label="Query input"
            placeholder="Ask about your network — try 'who is sending the most queries'…"
            value={input} onChange={e=>setInput(e.target.value)} onKeyDown={onKey}/>
          <button className="send-b" onClick={send} disabled={!input.trim()||thinking} aria-label="Send query">↑</button>
        </div>
      </div>
    </div>
  );
}

/* ─── DASHBOARD WIZARD ───────────────────────────────────────────────────────*/
const PROTECTED_SECTIONS = new Set(['overview']);
function DashboardWizard({overviewOrder, collapsed, hiddenSections, widgetLabels, moveWidget, toggleCollapse, toggleHideSection, onDone, orgDomain, orgName, onBrandSave, initialTab}) {
  const [tab, setTab] = useState(initialTab||'widgets');
  const [companyInput, setCompanyInput] = useState(orgName||'');
  const [suggestions, setSuggestions] = useState([]);
  const [showDropdown, setShowDropdown] = useState(false);
  const [selectedDomain, setSelectedDomain] = useState(orgDomain||'');
  const [selectedName, setSelectedName] = useState(orgName||'');
  const [fetchError, setFetchError] = useState(false);
  const [manualMode, setManualMode] = useState(false);
  const [manualDomain, setManualDomain] = useState(orgDomain||'');
  const debounceRef = useRef(null);
  const fetchSuggestions = (q) => {
    if(!q||q.length<2){ setSuggestions([]); setShowDropdown(false); return; }
    fetch(`https://autocomplete.clearbit.com/v1/companies/suggest?query=${encodeURIComponent(q)}`)
      .then(r=>r.json())
      .then(data=>{ setSuggestions(data.slice(0,6)); setShowDropdown(data.length>0); setFetchError(false); })
      .catch(()=>{ setFetchError(true); setShowDropdown(false); });
  };
  const handleCompanyInput = (val) => {
    setCompanyInput(val); setSelectedDomain(''); setSelectedName('');
    clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(()=>fetchSuggestions(val), 400);
  };
  const handleBrandSave = ()=>{
    const domain = manualMode ? extractDomain(manualDomain) : selectedDomain;
    const name = (manualMode ? companyInput : selectedName)||companyInput||'Infoblox MCP';
    onBrandSave(domain, name);
  };
  const navSections = SECTIONS.filter(s=>!PROTECTED_SECTIONS.has(s.id)&&!s.noAuto);
  const modalRef = useRef(null);
  const onDoneRef = useRef(onDone);
  useEffect(()=>{ onDoneRef.current=onDone; },[onDone]);
  useEffect(()=>{
    const prev = document.activeElement;
    const sel = 'button, a, input, select, textarea, [tabindex]:not([tabindex="-1"])';
    const focusables = () => modalRef.current ? Array.from(modalRef.current.querySelectorAll(sel)) : [];
    const first = focusables()[0]; if(first) first.focus();
    const h = e => {
      if(e.key==='Escape'){ onDoneRef.current(); return; }
      if(e.key==='Tab'){
        const f = focusables(); if(!f.length) return;
        const a = f[0], z = f[f.length-1];
        if(e.shiftKey && document.activeElement===a){ e.preventDefault(); z.focus(); }
        else if(!e.shiftKey && document.activeElement===z){ e.preventDefault(); a.focus(); }
      }
    };
    document.addEventListener('keydown', h);
    return ()=>{ document.removeEventListener('keydown', h); if(prev && prev.focus) prev.focus(); };
  },[]);
  useEffect(()=>{ setTab(initialTab||'widgets'); },[initialTab]);
  return (
    <>
      <div className="wiz-overlay" onClick={onDone}/>
      <div className="wiz-modal" role="dialog" aria-modal="true" aria-label="Set up your dashboard" ref={modalRef}>
        <div className="wiz-hd">
          <div>
            <div className="wiz-title">Set up your dashboard</div>
            <div className="wiz-sub">Choose which panels and sections appear. Reset any time from ⋯ → Reset dashboard.</div>
          </div>
          <div className="chip-bar" style={{marginTop:10,gap:4}}>
            <button className={`chip${tab==='widgets'?' on':''}`} onClick={()=>setTab('widgets')}>Overview Widgets</button>
            <button className={`chip${tab==='nav'?' on':''}`} onClick={()=>setTab('nav')}>Nav Sections</button>
            <button className={`chip${tab==='brand'?' on':''}`} onClick={()=>setTab('brand')}>Branding</button>
          </div>
        </div>
        <div className="wiz-list">
          {tab==='widgets'&&overviewOrder.map((id,i)=>(
            <div key={id} className="wiz-row">
              <div className="wiz-ord">
                <button className="wiz-ordbtn" disabled={i===0} aria-label="Move up" onClick={()=>moveWidget(id,-1)}>▲</button>
                <button className="wiz-ordbtn" disabled={i===overviewOrder.length-1} aria-label="Move down" onClick={()=>moveWidget(id,1)}>▼</button>
              </div>
              <span className="wiz-lbl">{widgetLabels[id]||id}</span>
              <button className={`wiz-vis${collapsed[id]?'':' on'}`} role="switch" aria-checked={!collapsed[id]}
                onClick={()=>toggleCollapse(id)}>{collapsed[id]?'Hidden':'Visible'}</button>
            </div>
          ))}
          {tab==='brand'&&(
            <div style={{padding:'16px 14px',display:'flex',flexDirection:'column',gap:14}}>
              <div style={{position:'relative'}}>
                <label style={{fontSize:11,color:'var(--muted)',display:'block',marginBottom:4}}>Company name</label>
                <input value={companyInput} onChange={e=>handleCompanyInput(e.target.value)}
                  onFocus={()=>suggestions.length&&setShowDropdown(true)}
                  onBlur={()=>setTimeout(()=>setShowDropdown(false),150)}
                  placeholder="e.g. Infoblox" type="text" autoComplete="off"
                  style={{width:'100%',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:4,color:'var(--ink)',fontSize:12,padding:'5px 8px'}}/>
                {showDropdown&&suggestions.length>0&&(
                  <div style={{position:'absolute',top:'calc(100% + 2px)',left:0,right:0,background:'var(--surface-2)',border:'1px solid var(--border)',borderRadius:4,zIndex:200,boxShadow:'0 4px 16px rgba(0,0,0,.3)',overflow:'hidden'}}>
                    {suggestions.map(s=>(
                      <div key={s.domain}
                        onMouseDown={e=>{e.preventDefault();setSelectedDomain(s.domain);setSelectedName(s.name);setCompanyInput(s.name);setShowDropdown(false);}}
                        style={{display:'flex',alignItems:'center',gap:8,padding:'7px 10px',cursor:'pointer',borderBottom:'1px solid var(--border)'}}>
                        <BrandLogoImg domain={s.domain} alt={s.name} style={{width:20,height:20,borderRadius:2,objectFit:'contain',background:'#fff',padding:1,flexShrink:0}}/>
                        <span style={{fontSize:12,color:'var(--ink)',flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.name}</span>
                        <span style={{fontSize:11,color:'var(--muted)',fontFamily:'monospace',flexShrink:0}}>{s.domain}</span>
                      </div>
                    ))}
                  </div>
                )}
                {fetchError&&(
                  <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>
                    Lookup unavailable. <button onMouseDown={e=>{e.preventDefault();setManualMode(m=>!m);}} style={{background:'none',border:'none',color:'var(--accent)',fontSize:11,cursor:'pointer',textDecoration:'underline',padding:0}}>Enter domain manually</button>
                  </div>
                )}
              </div>
              {manualMode&&(
                <div>
                  <label style={{fontSize:11,color:'var(--muted)',display:'block',marginBottom:4}}>Domain <span style={{fontWeight:400,opacity:.6}}>(e.g. infoblox.com)</span></label>
                  <input value={manualDomain} onChange={e=>setManualDomain(e.target.value)}
                    onBlur={()=>setSelectedDomain(extractDomain(manualDomain))}
                    placeholder="infoblox.com" type="text"
                    style={{width:'100%',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:4,color:'var(--ink)',fontSize:12,padding:'5px 8px'}}/>
                </div>
              )}
              {selectedDomain&&(
                <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:4}}>
                  <BrandLogoImg domain={selectedDomain} alt="logo preview" style={{width:28,height:28,borderRadius:4,objectFit:'contain',background:'#fff',padding:1}}/>
                  <span style={{fontSize:12,color:'var(--muted)'}}>{selectedName||companyInput} · {selectedDomain}</span>
                </div>
              )}
              <button onClick={handleBrandSave} style={{alignSelf:'flex-start',background:'var(--accent)',border:'none',borderRadius:4,color:'#fff',fontSize:12,fontWeight:600,padding:'6px 14px',cursor:'pointer'}}>Save branding</button>
            </div>
          )}
          {tab==='nav'&&navSections.map(s=>(
            <div key={s.id} className="wiz-row">
              <span className="wiz-nav-icon"><NavIcon id={s.id} size={14}/></span>
              <span className="wiz-lbl">{s.label}</span>
              <button className={`wiz-vis${hiddenSections.includes(s.id)?'':' on'}`} role="switch" aria-checked={!hiddenSections.includes(s.id)}
                onClick={()=>toggleHideSection(s.id)}>{hiddenSections.includes(s.id)?'Hidden':'Visible'}</button>
            </div>
          ))}
        </div>
        <div className="wiz-foot">
          <button className="wiz-skip" onClick={onDone}>Skip</button>
          <button className="wiz-done" onClick={onDone}>Done</button>
        </div>
      </div>
    </>
  );
}

/* ─── HOST BANNER ────────────────────────────────────────────────────────────*/
function HostBanner({hosts, demoMode}) {
  const [dismissed, setDismissed] = useState(()=>LS.get('noc.hostBannerDismissed',false));
  const errHosts = hosts.filter(h=>h.status==='error'||h.status==='offline');
  const errRate = hosts.length ? errHosts.length/hosts.length : 0;
  if(errRate<=0.4||dismissed||demoMode) return null;
  return (
    <div className="notice n-red b-full" style={{marginBottom:0}}>
      <span className="n-ico" aria-hidden="true">!</span>
      <span className="n-msg"><b>{Math.round(errRate*100)}% of hosts offline or in error</b> — {errHosts.length} of {hosts.length} hosts affected</span>
      <span className="n-acts"><button className="n-x" aria-label="Dismiss" onClick={()=>{setDismissed(true);LS.set('noc.hostBannerDismissed',true);}}>×</button></span>
    </div>
  );
}

/* ─── DRILL SHEET ────────────────────────────────────────────────────────────*/
function DrillSheet({entity, onClose, leases=[], subnets=[], setSection, setZoneFilt}) {
  const panelRef = useRef(null);
  useEffect(()=>{
    const prev = document.activeElement;
    const panel = panelRef.current;
    const sel = 'button, a, input, select, textarea, [tabindex]:not([tabindex="-1"])';
    const focusables = () => panel ? Array.from(panel.querySelectorAll(sel)) : [];
    const first = focusables()[0];
    if(first) first.focus();
    const h = e => {
      if(e.key==='Escape'){ onClose(); return; }
      if(e.key==='Tab'){
        const f = focusables(); if(!f.length) return;
        const a = f[0], z = f[f.length-1];
        if(e.shiftKey && document.activeElement===a){ e.preventDefault(); z.focus(); }
        else if(!e.shiftKey && document.activeElement===z){ e.preventDefault(); a.focus(); }
      }
    };
    document.addEventListener('keydown', h);
    return ()=>{ document.removeEventListener('keydown', h); if(prev && prev.focus) prev.focus(); };
  },[onClose]);
  if(!entity) return null;
  const kv = (k,v) => <div className="drill-kv"><span className="k">{k}</span><span style={{color:'var(--gray-200)',fontVariantNumeric:'tabular-nums',fontSize:11}}>{v||'—'}</span></div>;
  let title='', body=null;
  if(entity.type==='subnet') {
    const sub = entity.data;
    const subLeases = leases.filter(l=>l.subnet===sub.id||l.network===sub.addr);
    title = sub.name!==sub.addr ? sub.name : sub.addr;
    body = (
      <>
        {kv('Network', `${sub.addr}/${sub.cidr}`)}
        {kv('Utilization', `${sub.util}% (${sub.used}/${sub.total})`)}
        {kv('Site', sub.site)}
        {kv('DHCP Leases', subLeases.length)}
        {(()=>{
          const hist = (LS.get('noc.tileHist',{})||{})['Subnets'] || [];
          if(hist.length < 3) return null;
          // simple linear regression on last N points
          const n=hist.length, xs=hist.map((_,i)=>i), ys=hist;
          const mx=xs.reduce((a,b)=>a+b,0)/n, my=ys.reduce((a,b)=>a+b,0)/n;
          const num=xs.reduce((a,x,i)=>a+(x-mx)*(ys[i]-my),0);
          const den=xs.reduce((a,x)=>a+(x-mx)**2,0)||1;
          const slope=num/den, intercept=my-slope*mx;
          const daysToFull = slope>0 ? Math.round((100-sub.util)/slope) : null;
          return (
            <div style={{marginTop:10,padding:'8px 10px',background:'var(--surface-3)',borderRadius:4,fontFamily:'var(--font-mono)',fontSize:11}}>
              <div style={{color:'var(--muted)',fontSize:9,textTransform:'uppercase',letterSpacing:'.08em',marginBottom:4}}>Capacity Forecast</div>
              {daysToFull!==null && daysToFull>0 && daysToFull<365
                ? <div style={{color:daysToFull<30?'var(--red)':daysToFull<90?'var(--amber)':'var(--green)'}}>
                    [!] Pool exhaustion in ~{daysToFull} days at current trend
                  </div>
                : slope<=0
                  ? <div style={{color:'var(--green)'}}>✓ Utilization trending down — no exhaustion projected</div>
                  : <div style={{color:'var(--muted)'}}>Trend insufficient to project exhaustion</div>}
              <div style={{color:'var(--muted)',marginTop:4}}>Trend: {slope>0?'+':'−'}{Math.abs(slope*10).toFixed(1)}%/10 refreshes · {n} data points</div>
            </div>
          );
        })()}
        {subLeases.length>0&&(
          <div style={{marginTop:12}}>
            <div style={{fontSize:10,color:'var(--gray-400)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:6}}>Active Leases</div>
            {subLeases.slice(0,15).map((l,i)=>(
              <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'4px 0',borderBottom:'1px solid var(--border)',fontSize:11}}>
                <span style={{color:'var(--gray-200)',fontFamily:'monospace'}}>{l.ip}</span>
                <span style={{color:'var(--gray-400)'}}>{l.hostname||'—'}</span>
              </div>
            ))}
            {subLeases.length>15&&<div style={{fontSize:10,color:'var(--teal)',marginTop:4}}>+{subLeases.length-15} more</div>}
          </div>
        )}
      </>
    );
  } else if(entity.type==='host') {
    const h = entity.data;
    const hostLease = leases.find(l=>l.hostname===h.name||l.ip===h.ip);
    const hostSub = hostLease ? subnets.find(s=>s.addr===hostLease.network||s.id===hostLease.subnet) : null;
    title = h.name;
    body = (
      <>
        {kv('IP', h.ip)}
        {kv('Type', h.type)}
        {kv('Status', h.status)}
        {hostSub&&kv('Subnet', `${hostSub.addr}/${hostSub.cidr} (${hostSub.util}% util)`)}
        {hostLease&&kv('Lease expires', hostLease.ends||hostLease.end||'—')}
      </>
    );
  } else if(entity.type==='zone') {
    const z = entity.data;
    title = z.name||z.fqdn;
    body = (
      <>
        {kv('FQDN', z.fqdn||z.name)}
        {kv('Type', z.type)}
        {kv('TTL', z.ttl!=null?`${z.ttl}s`:'—')}
        {kv('Anomaly', z.anomaly?'Yes':'No')}
        {z.issues&&z.issues.length>0&&(
          <div style={{marginTop:8,display:'flex',gap:5,flexWrap:'wrap'}}>
            {z.issues.map((iss,i)=><span key={i} className={`badge ${iss.includes('High')||iss.includes('Too High')?'b-amber':'b-red'}`}>{iss}</span>)}
          </div>
        )}
      </>
    );
  } else if(entity.type==='feed') {
    const f = entity.data;
    title = f.name;
    body = (
      <>
        {kv('Category', f.cat)}
        <div className="drill-kv"><span className="k">Threat Level</span><span className={`badge ${levelBadge(f.level)}`}>{f.level}</span></div>
        {kv('Confidence', f.conf)}
        {kv('Entries', f.entries!=null?f.entries.toLocaleString():'—')}
        <div className="drill-kv"><span className="k">Status</span><span className={`badge ${f.active?'b-green':'b-gray'}`}>{f.active?'Active':'Off'}</span></div>
      </>
    );
  } else if(entity.type==='policy') {
    const p = entity.data;
    const actBadge={block:'b-red',allow:'b-green',redirect:'b-amber',monitor:'b-teal'};
    title = p.name;
    body = (
      <>
        <div className="drill-kv"><span className="k">Action</span><span className={`badge ${actBadge[p.action]||'b-gray'}`}>{p.action}</span></div>
        {kv('Rules', p.rules)}
        {kv('Created', p.created)}
        <div className="drill-kv"><span className="k">Status</span><span className={`badge ${p.active?'b-green':'b-gray'}`}>{p.active?'Active':'Off'}</span></div>
      </>
    );
  } else if(entity.type==='lease') {
    const l = entity.data;
    const lSub = subnets.find(s=>s.id===l.subnet_id||s.name===l.subnet);
    title = l.addr;
    body = (
      <>
        {kv('IP Address', l.addr)}
        {kv('Hostname', l.host)}
        <div className="drill-kv"><span className="k">State</span><span className={`badge ${l.state==='active'?'b-green':'b-gray'}`}>{l.state}</span></div>
        {kv('Subnet', l.subnet)}
        {lSub&&kv('Utilization', `${lSub.util}% (${lSub.used}/${lSub.total})`)}
      </>
    );
  } else if(entity.type==='audit') {
    const a = entity.data;
    title = a.action;
    body = (
      <>
        {kv('Time', fmtTs(a.ts))}
        {kv('User', a.user)}
        <div className="drill-kv"><span className="k">Action</span><span style={{fontSize:11,fontWeight:700,color:actionColor(a.action)}}>{a.action}</span></div>
        {kv('Resource', a.resource)}
        <div className="drill-kv"><span className="k">Result</span><span className={`badge ${a.result==='success'?'b-green':'b-red'}`}>{a.result==='success'?'OK':'Fail'}</span></div>
      </>
    );
  }
  return (
    <>
      <div className="drill-sheet-overlay" onClick={onClose}/>
      <div className="drill-sheet" role="dialog" aria-modal="true" aria-label={`Details: ${title}`} ref={panelRef}>
        <div className="drill-sheet-hd">
          <div style={{fontSize:13,fontWeight:700,color:'var(--gray-200)'}}>{title}</div>
          <button className="close-btn" onClick={onClose} aria-label="Close">✕</button>
        </div>
        <div className="drill-sheet-bd">{body}</div>
        {setSection&&(()=>{
          const sectionMap={subnet:'ipam',host:'hosts',zone:'dns',feed:'security',policy:'security',lease:'ipam',audit:'audit'};
          const target=sectionMap[entity.type];
          if(!target) return null;
          return (
            <div style={{padding:'12px 16px',borderTop:'1px solid var(--border)'}}>
              <button className="refresh-btn" style={{width:'100%',justifyContent:'center'}} onClick={()=>{
                if(entity.type==='zone'&&setZoneFilt&&entity.data&&entity.data.id) setZoneFilt(entity.data.id);
                setSection(target);
                onClose();
              }}>Open in {target.toUpperCase()} →</button>
            </div>
          );
        })()}
      </div>
    </>
  );
}

/* ─── TRIAGE PANEL ──────────────────────────────────────────────────────────*/
function TriagePanel({subnets, hosts, zones, auditLogs, firingAlerts, setSection, dhcpCrit, dhcpWarn}) {
  const errHosts  = hosts.filter(h=>h.status==='error'||h.status==='offline');
  const critSubs  = subnets.filter(s=>s.util>=dhcpCrit);
  const warnSubs  = subnets.filter(s=>s.util>=dhcpWarn&&s.util<dhcpCrit);
  const ttlBad    = zones.filter(z=>z.anomaly);
  const auditFail = auditLogs.filter(l=>l.result==='failure');
  const rows = [];
  if(errHosts.length>0)  rows.push({sev:'crit',count:errHosts.length,  desc:`host${errHosts.length>1?'s':''} offline / error`,sec:'hosts',items:errHosts.slice(0,3).map(h=>h.name)});
  if(critSubs.length>0)  rows.push({sev:'crit',count:critSubs.length,  desc:`subnet${critSubs.length>1?'s':''} ≥${dhcpCrit}% utilization`,sec:'ipam',items:critSubs.slice(0,3).map(s=>s.name!==s.addr?s.name:s.addr)});
  if(auditFail.length>0) rows.push({sev:'crit',count:auditFail.length, desc:`audit failure${auditFail.length>1?'s':''}`,sec:'audit',items:auditFail.slice(0,3).map(l=>l.action)});
  if(firingAlerts.length>0) rows.push({sev:'warn',count:firingAlerts.length, desc:`alert rule${firingAlerts.length>1?'s':''} firing`,sec:'alerts',items:firingAlerts.slice(0,3).map(a=>a.metric)});
  if(warnSubs.length>0)  rows.push({sev:'warn',count:warnSubs.length,  desc:`subnet${warnSubs.length>1?'s':''} ${dhcpWarn}–${dhcpCrit-1}% utilization`,sec:'ipam',items:warnSubs.slice(0,3).map(s=>s.name!==s.addr?s.name:s.addr)});
  if(ttlBad.length>0)    rows.push({sev:'warn',count:ttlBad.length,    desc:`DNS zone${ttlBad.length>1?'s':''} with TTL anomalies`,sec:'dns',items:ttlBad.slice(0,3).map(z=>z.name)});
  const sevDot = {crit:'var(--red)',warn:'var(--amber)',info:'var(--teal)'};
  return (
    <div className="card">
      <div className="card-title"><div className="dot" style={{background:'var(--amber)'}}/>Triage — items needing attention</div>
      {rows.length===0
        ? <div className="no-data" style={{padding:24}}>No issues detected — all metrics within normal thresholds.</div>
        : rows.map((r,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
              <div style={{width:8,height:8,borderRadius:'50%',background:sevDot[r.sev],flexShrink:0}}/>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600}}>
                  <span style={{color:r.sev==='crit'?'var(--red)':'var(--amber)',marginRight:6}}>{r.count}</span>
                  {r.desc}
                </div>
                {r.items.length>0&&<div style={{fontSize:10,color:'var(--gray-400)',marginTop:2}}>{r.items.join(', ')}</div>}
              </div>
              <button className="n-btn" onClick={()=>setSection(r.sec)}>View →</button>
            </div>
          ))
      }
    </div>
  );
}

function IPAMTable({subnets, ipamChip, rowLimit, leaseCt, onDrill}) {
  const hasSite = subnets.some(s=>s.site&&s.site!=='–'&&s.site!=='—');
  const rows = subnets.filter(s=>{
    if(!ipamChip) return true;
    if(ipamChip==='critical') return s.util>=90;
    if(ipamChip==='warning')  return s.util>=75&&s.util<90;
    if(ipamChip==='healthy')  return s.util<75;
    return true;
  });
  const allCols=[
    {key:'name',label:'Name',fixed:true,render:s=><span style={{fontWeight:500}} title={s.name!==s.addr?s.name:undefined}>{s.name!==s.addr?s.name:<span style={{color:'var(--gray-600)'}}>—</span>}</span>},
    {key:'addr',label:'Network',mono:true,size:11,sortVal:s=>s.addr,csv:s=>`${s.addr}/${s.cidr}`,render:s=>(<span style={{color:'var(--gray-200)'}} title={`${s.addr}/${s.cidr}`}>{s.addr}/{s.cidr}<button className="copy-btn" tabIndex={0} onClick={()=>copyToClip(s.addr)} title="Copy IP" aria-label="Copy IP address">⎘</button></span>)},
    ...(hasSite?[{key:'site',label:'Site',size:11,render:s=><span style={{color:'var(--gray-400)'}}>{s.site}</span>}]:[]),
    {key:'usedtotal',label:'Used / Total',mono:true,size:11,sortVal:s=>s.used,csv:s=>`${s.used}/${s.total}`,render:s=>`${s.used} / ${s.total}`},
    {key:'util',label:'Utilization',sortVal:s=>s.util,render:s=>(<div style={{display:'flex',alignItems:'center',gap:8}}><div className="bar-track" style={{position:'relative'}}><div className="bar-fill" style={{width:`${s.util}%`,background:utilColor(s.util)}}/><div style={{position:'absolute',top:0,bottom:0,left:'75%',width:'1px',background:'rgba(232,160,48,0.5)'}} title="75% warning"/><div style={{position:'absolute',top:0,bottom:0,left:'90%',width:'1px',background:'rgba(232,80,80,0.6)'}} title="90% critical"/></div><span style={{fontSize:11,fontWeight:700,color:utilColor(s.util)}}>{s.util}%</span></div>)},
    {key:'leases',label:'DHCP Leases',size:11,sortVal:s=>leaseCt[s.name]||0,render:s=><span style={{color:'var(--gray-400)'}}>{(leaseCt[s.name]||0).toLocaleString()}</span>},
    {key:'anomaly',label:'Risk',size:11,nosort:false,sortVal:s=>{let sc=0;if(s.util>=90)sc+=3;else if(s.util>=75)sc+=2;if(s.free===0)sc+=2;if((leaseCt[s.name]||0)===0&&s.util===0)sc-=1;return sc;},csv:s=>{let sc=0;if(s.util>=90)sc+=3;else if(s.util>=75)sc+=2;if(s.free===0)sc+=2;return sc>0?sc:'OK';},render:s=>{let sc=0;if(s.util>=90)sc+=3;else if(s.util>=75)sc+=2;if(s.free===0)sc+=2;if(sc===0)return <span style={{color:'var(--green)',fontSize:10}}>OK</span>;if(sc>=4)return <span style={{color:'var(--red)',fontSize:10,fontWeight:700}}>HIGH</span>;if(sc>=2)return <span style={{color:'var(--amber)',fontSize:10,fontWeight:600}}>WARN</span>;return <span style={{color:'var(--amber)',fontSize:10}}>LOW</span>;}},
  ];
  const ctl=useColumns('ipam',allCols);
  return <DataTable ctl={ctl} rows={rows} defaultRows={rowLimit} rowKey={s=>s.id} initialSort={{key:'util',dir:'desc'}} exportName="subnets" persistId="ipam" onRowClick={onDrill?s=>onDrill({type:'subnet',data:s}):undefined}/>;
}

function HostsTable({hosts, rowLimit, hostSeen={}, onDrill}) {
  const ctl=useColumns('hosts',[
    {key:'name',label:'Hostname',fixed:true,render:h=><span style={{fontWeight:500}} title={h.name}>{h.name}</span>},
    {key:'ip',label:'IP',mono:true,size:10,render:h=>(<span style={{color:'var(--gray-400)'}} title={h.ip}>{h.ip}{h.ip&&<button className="copy-btn" onClick={()=>copyToClip(h.ip)} title="Copy IP" aria-label="Copy IP address">⎘</button>}</span>)},
    {key:'type',label:'Type',size:10,render:h=><span style={{color:'var(--gray-400)'}}>{h.type}</span>},
    {key:'status',label:'Status',render:h=>(<span style={{display:'flex',alignItems:'center',gap:5}}><span className={`s-dot s-${h.status}`}/><span style={{fontSize:11,textTransform:'capitalize'}}>{h.status}</span></span>)},
    {key:'lastonline',label:'Last Online',size:11,sortVal:h=>hostSeen[h.id]?new Date(hostSeen[h.id]).getTime():(h.status==='online'?Infinity:-1),render:h=>{
      if(h.status==='online') return <span style={{color:'var(--sev-green-t)',fontSize:11}}>now</span>;
      const t=hostSeen[h.id];
      if(!t) return <span style={{color:'var(--gray-600)'}}>—</span>;
      return <span style={{color:'var(--gray-400)',fontSize:11}} title={fmtTs(t)}>{timeAgo(t)}</span>;
    }},
  ]);
  return <DataTable ctl={ctl} rows={hosts} defaultRows={rowLimit} rowKey={h=>h.id} initialSort={{key:'name',dir:'asc'}} exportName="hosts" persistId="hosts" onRowClick={onDrill?h=>onDrill({type:'host',data:h}):undefined}/>;
}

// ── Alert-rules engine: fire when a live metric crosses a threshold ──────────
const ALERT_METRICS = [
  {key:'offline_hosts',    label:'Offline / error hosts',      get:d=>d.hosts.filter(h=>h.status==='error'||h.status==='offline').length},
  {key:'critical_subnets', label:'Subnets ≥90% utilization',   get:d=>d.subnets.filter(s=>s.util>=90).length},
  {key:'ttl_anomalies',    label:'DNS zones w/ TTL anomalies',  get:d=>d.zones.filter(z=>z.anomaly).length},
  {key:'audit_failures',   label:'Failed audit events',        get:d=>d.auditLogs.filter(l=>l.result==='failure').length},
  {key:'active_feeds',     label:'Active threat feeds',         get:d=>d.feeds.filter(f=>f.active).length},
  {key:'total_hosts',      label:'Total hosts',                 get:d=>d.hosts.length},
];
const ALERT_OPS = {'>=':(a,b)=>a>=b, '>':(a,b)=>a>b, '<=':(a,b)=>a<=b, '<':(a,b)=>a<b, '==':(a,b)=>a===b};
// which section a firing alert metric points at (drives the nav badge)
const ALERT_SECTION = {offline_hosts:'hosts', critical_subnets:'ipam', ttl_anomalies:'dns', audit_failures:'audit', active_feeds:'threats', total_hosts:'hosts'};
const metricLabel = k => (ALERT_METRICS.find(m=>m.key===k)||{}).label || k;
const DEFAULT_ALERT_RULES = [
  {id:'def-offline',  metric:'offline_hosts',    op:'>=', threshold:1},
  {id:'def-critical', metric:'critical_subnets', op:'>=', threshold:1},
  {id:'def-audit',    metric:'audit_failures',   op:'>=', threshold:1},
];
function evalAlerts(data, rules){
  if(!data) return [];
  return rules.map(r=>{
    const m = ALERT_METRICS.find(x=>x.key===r.metric);
    const val = m ? m.get(data) : 0;
    const op = ALERT_OPS[r.op] || (()=>false);
    return {...r, value:val, firing: op(val, Number(r.threshold))};
  });
}
// snapshot of headline counts, for change-detection between refreshes
function snapMetrics(data){
  if(!data) return {};
  const o={}; ALERT_METRICS.forEach(m=>{o[m.key]=m.get(data);});
  o.total_subnets=data.subnets.length; o.total_zones=data.zones.length; o.total_leases=data.leases.length;
  return o;
}

function VaultGate() {
  const [st,setSt]=useState(null);
  const refresh=useCallback(()=>fetch('/api/vault/status').then(r=>r.json()).then(setSt).catch(()=>setSt({vaultMode:false})),[]);
  useEffect(()=>{refresh();},[refresh]);
  if(!st) return <div style={{display:'flex',height:'100vh',alignItems:'center',justifyContent:'center'}}><div className="spinner" style={{width:44,height:44}}/></div>;
  if(!st.vaultMode) return <App vault={st}/>;              // env-key mode — unchanged
  if(st.ready)       return <App vault={st} onVaultChange={refresh}/>;
  if(!st.exists)     return <VaultSetup onDone={refresh}/>;
  if(!st.unlocked)   return <VaultUnlock onDone={refresh}/>;
  return <VaultAddTenant first onDone={refresh}/>;
}

// Poll until the server responds 200, then call onReady().
// Prevents the "page can't be displayed" flash when reloading right after a container restart.
function waitForServer(onReady, maxAttempts=40, interval=500) {
  let attempts=0;
  const probe=()=>{
    fetch('/api/vault/status',{cache:'no-store',method:'GET'})
      .then(r=>{ if(r.ok) onReady(); else retry(); })
      .catch(retry);
  };
  const retry=()=>{ attempts++; if(attempts<maxAttempts) setTimeout(probe,interval); else onReady(); };
  setTimeout(probe,interval);
}

function UtilGauges({subnets}) {
  const top = [...subnets].sort((a,b)=>(b.util||0)-(a.util||0)).slice(0,5);
  if(!top.length) return null;
  const sevClr = u => u>=90?'var(--red)':u>=75?'var(--amber)':'var(--green)';
  return (
    <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
      {top.map((s,i)=>{
        const u=Math.min(100,s.util||0);
        const R=32, cx=40, cy=40;
        const startAngle=-Math.PI*0.75;
        const sweep=(u/100)*Math.PI*1.5;
        const endAngle=startAngle+sweep;
        const x1=cx+R*Math.cos(startAngle), y1=cy+R*Math.sin(startAngle);
        const x2=cx+R*Math.cos(endAngle), y2=cy+R*Math.sin(endAngle);
        const large=sweep>Math.PI?1:0;
        const bgX2=cx+R*Math.cos(startAngle+Math.PI*1.5), bgY2=cy+R*Math.sin(startAngle+Math.PI*1.5);
        const lbl=s.name&&s.name!==s.addr?s.name:s.addr;
        const clr=sevClr(u);
        return (
          <div key={i} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2,cursor:'pointer'}}
            title={`${lbl} — ${u}% utilized`}>
            <svg width={80} height={56} viewBox="0 0 80 56" aria-hidden="true">
              <path d={`M ${x1} ${y1} A ${R} ${R} 0 1 1 ${bgX2} ${bgY2}`} fill="none" stroke="var(--surface-3)" strokeWidth={7} strokeLinecap="round"/>
              {u>0&&<path d={`M ${x1} ${y1} A ${R} ${R} 0 ${large} 1 ${x2} ${y2}`} fill="none" stroke={clr} strokeWidth={7} strokeLinecap="round"/>}
              <text x={40} y={38} textAnchor="middle" fontSize={11} fontWeight={700} fill={clr} fontFamily="var(--font-mono)">{u}%</text>
            </svg>
            <div style={{fontSize:8,fontFamily:'var(--font-mono)',color:'var(--muted)',textAlign:'center',maxWidth:78,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{lbl}</div>
          </div>
        );
      })}
    </div>
  );
}

    const m={};
    (subnets||[]).forEach(s=>{
      const site=s.site&&s.site!=='–'&&s.site!=='—'?s.site:'(no site)';
      if(!m[site]) m[site]=[];
      m[site].push(s);
    });
    return Object.entries(m).sort((a,b)=>b[1].length-a[1].length);

    return m;
  },[hosts,subnets]);
  const sevClr=u=>u>=90?'var(--red)':u>=75?'var(--amber)':'var(--green)';
  const hostClr=hs=>{if(!hs||!hs.length)return'var(--border)';if(hs.some(h=>h.status==='down'))return'var(--red)';if(hs.some(h=>h.status==='degraded'))return'var(--amber)';return'var(--green)';};
  const saveAnnotation=(sid,txt)=>{
    const n={...annotations,[sid]:{text:txt,ts:Date.now(),author:'NOC'}};
    setAnnotations(n);
    LS.set('noc.annotations',n);
    setEditingAnnot(null);
    setAnnotText('');
  };
  if(!subnets||!subnets.length) return <div className="no-data">No subnet data</div>;
  const filteredBySite = React.useMemo(()=>{
    if(!filter.trim()) return bySite;
    const q = filter.toLowerCase();
    return bySite
      .map(([site, snets]) => {
        if(site.toLowerCase().includes(q)) return [site, snets];
        const f = snets.filter(s =>
          (s.name||'').toLowerCase().includes(q) ||
          (s.addr||'').toLowerCase().includes(q)
        );
        return f.length ? [site, f] : null;
      })
      .filter(Boolean);
  }, [bySite, filter]);
  return (
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      {focus&&(
        <button className="col-btn" onClick={()=>setFocus(null)} style={{marginBottom:8,alignSelf:'flex-start'}}>
          ← all sites
        </button>
      )}
      <div style={{display:'flex',gap:8,marginBottom:12,alignItems:'center'}}>
        <input
          type="text"
          placeholder="Filter sites or subnets…"
          value={filter}
          onChange={e=>setFilter(e.target.value)}
          style={{flex:1,background:'var(--surface-2)',border:'1px solid var(--border)',
            borderRadius:4,padding:'4px 8px',color:'var(--ink)',fontFamily:'var(--font-mono)',
            fontSize:11,outline:'none'}}
        />
        {['tiles','list'].map(v=>(
          <button key={v} className="col-btn"
            onClick={()=>setView(v)}
            style={view===v?{background:'var(--surface-3)',borderColor:'var(--teal)'}:{}}>
            {v==='tiles'?'⊞ Tiles':'≡ List'}
          </button>
        ))}
      </div>

        <div key={site} style={{background:'var(--surface-2)',border:'1px solid var(--border)',borderRadius:6,padding:14}}>
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:collapsed[site]?0:10}}>
            <button onClick={e=>{e.stopPropagation();setCollapsed(c=>({...c,[site]:!c[site]}));}}
              style={{background:'none',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:10,padding:'0 2px',fontFamily:'var(--font-mono)'}}>
              {collapsed[site]?'▶':'▼'}
            </button>
            <button onClick={e=>{e.stopPropagation();setFocus(focus===site?null:site);}}
              style={{background:'none',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:10,fontFamily:'var(--font-mono)',textTransform:'uppercase',letterSpacing:'.08em',textAlign:'left',flex:1}}>
              ◈ {site} <span style={{color:'var(--border)'}}>·</span> {snets.length} subnet{snets.length!==1?'s':''}
            </button>
          </div>
          {!collapsed[site]&&(view==='tiles'?(
            <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
              {snets.map(s=>{
                const hs=hostsBySub[s.id]||[];
                const lbl=s.name&&s.name!==s.addr?s.name:`${s.addr}/${s.cidr}`;
                const isHov=hover===s.id;
                return (
                  <div key={s.id}
                    onMouseEnter={()=>setHover(s.id)} onMouseLeave={()=>setHover(null)}
                    onClick={()=>onDrill&&onDrill({type:'subnet',data:s})}
                    title={`${lbl} — ${s.util||0}% util · ${hs.length} hosts`}
                    style={{
                      width:100,padding:'8px 10px',borderRadius:5,cursor:'pointer',
                      background:isHov?'var(--surface-3)':'var(--surface)',
                      border:`1px solid ${sevClr(s.util||0)}44`,
                      borderLeft:`3px solid ${sevClr(s.util||0)}`,
                      transition:'background .12s',
                    }}>
                    <div style={{display:'flex',alignItems:'center',gap:3,marginBottom:4}}>
                      <span style={{flex:1,fontSize:10,fontFamily:'var(--font-mono)',color:'var(--ink)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{lbl}</span>
                      {annotations[s.id]&&(
                        <span title={annotations[s.id].text}
                          style={{width:6,height:6,borderRadius:'50%',background:'var(--teal)',flexShrink:0,display:'inline-block'}}/>
                      )}
                      {isHov&&(
                        <span onClick={e=>{e.stopPropagation();setEditingAnnot(s.id);setAnnotText((annotations[s.id]&&annotations[s.id].text)||'');}}
                          title="Add note" style={{cursor:'pointer',color:'var(--muted)',fontSize:9,flexShrink:0}}>✎</span>
                      )}
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:4}}>
                      <div style={{flex:1,height:3,background:'var(--surface-3)',borderRadius:2}}>

                      </div>

                    </div>
                    {hs.length>0&&<div style={{marginTop:4,fontSize:9,color:hostClr(hs)}}>{hs.length} host{hs.length!==1?'s':''}</div>}
                    {editingAnnot===s.id&&(
                      <div onClick={e=>e.stopPropagation()} style={{marginTop:6}}>
