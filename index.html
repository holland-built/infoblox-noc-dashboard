  const [srchRes, setSrchRes]   = useState(null);
  const [srching, setSrching]   = useState(false);
  const [autoRefresh, setAutoRefresh] = useState(()=>LS.get('ar',0));
  const [arCountdown, setArCountdown] = useState(0);
  const [showShortcuts, setShowShortcuts] = useState(false);
  const [ipamChip, setIpamChip] = useState(null);
  const [hostChip, setHostChip] = useState(null);
  const [searchHistory, setSearchHistory] = useState(()=>LS.get('sh',[]));
  const [zoneFilt, setZoneFilt] = useState(null);
  const [rowLimits, setRowLimits]       = useState(()=>LS.get('rl',{}));
  const [collapsed, setCollapsed]       = useState(()=>LS.get('cl',{}));
  const DEFAULT_ORDER=['kpis','hosts','subnets','ttl','audit','pols','feeds'];
  const [overviewOrder, setOverviewOrder] = useState(()=>{
    const saved=LS.get('noc.widgetOrder', null) || LS.get('oo', null) || DEFAULT_ORDER;
    // keep only known ids + append any missing defaults (forward-compatible)
    const known=saved.filter(id=>DEFAULT_ORDER.includes(id));
    return [...known, ...DEFAULT_ORDER.filter(id=>!known.includes(id))];
  });
  const [vizMode, setVizMode]           = useState(()=>LS.get('noc.viz',{}));
  const [fullscreen, setFullscreen]     = useState(null);
  const [dragOver, setDragOver]         = useState(null);
  const [dragging, setDragging]         = useState(null);
  const [dragArmed, setDragArmed]       = useState(null);

  const getViz = (id, def='table') => vizMode[id] || def;
  const setViz = (id, v) => { const n={...vizMode,[id]:v}; setVizMode(n); LS.set('noc.viz',n); };
  const [alertRules, setAlertRules] = useState(()=>LS.get('noc.alertRules',[]));
  const [deltas, setDeltas] = useState(null);
  const [accounts, setAccounts]     = useState([]);
  const [activeAcct, setActiveAcct] = useState('');   // CSP account id
  const [showAcctMenu, setShowAcctMenu] = useState(false);
  const [switchingAcct, setSwitchingAcct] = useState(false);
  const [acctSearch, setAcctSearch] = useState('');

  const rl = (key, def=25) => rowLimits[key]||def;
  const setRl = (key, val) => { const n={...rowLimits,[key]:val}; setRowLimits(n); LS.set('rl',n); };
  const toggleCollapse = (key) => { const n={...collapsed,[key]:!collapsed[key]}; setCollapsed(n); LS.set('cl',n); };
  const toggleFs = (key) => setFullscreen(f=>f===key?null:key);

  const onDragStart = (e, id) => { e.dataTransfer.setData('card',id); e.dataTransfer.effectAllowed='move'; setDragging(id); };
  const onDragOver  = (e, id) => { e.preventDefault(); e.dataTransfer.dropEffect='move'; if(dragOver!==id) setDragOver(id); };
  const onDragEnd   = () => { setDragOver(null); setDragging(null); };
  const onDrop      = (e, id) => {
    e.preventDefault(); setDragOver(null); setDragging(null);
    const from = e.dataTransfer.getData('card');
    if(from===id) return;
    const arr=[...overviewOrder];
    const fi=arr.indexOf(from), ti=arr.indexOf(id);
    if(fi<0||ti<0) return;
    arr.splice(fi,1); arr.splice(ti,0,from);
    setOverviewOrder(arr); LS.set('noc.widgetOrder',arr);
  };

  // props for a draggable bento wrapper; whole card is the drop target but
  // dragging only initiates from the handle (so inner buttons/text still work)
  const wrapProps = (id, extra='') => ({
    draggable: dragArmed===id,
    className:`drag-card${extra?' '+extra:''}${dragging===id?' dragging':''}${dragOver===id?' drag-over':''}`,
    onDragStart:e=>onDragStart(e,id),
    onDragOver:e=>onDragOver(e,id),
    onDrop:e=>onDrop(e,id),
    onDragEnd:()=>{onDragEnd(); setDragArmed(null);}
  });
  const DragHandle = ({id}) => (
    <span className="drag-handle" title="Drag to reorder" aria-label="Drag to reorder"
      onMouseDown={()=>setDragArmed(id)} onMouseUp={()=>setDragArmed(null)}>⠿</span>
  );
  const VIZ_OPTS=[['table','Table'],['bar','Bar'],['line','Line'],['raw','Raw']];
  const VizSelect = ({id, def='table', opts=VIZ_OPTS}) => (
    <select className="viz-sel" value={getViz(id,def)} onChange={e=>setViz(id,e.target.value)}
      onMouseDown={e=>e.stopPropagation()} title="Change visualization">
      {opts.map(([v,l])=><option key={v} value={v}>{l}</option>)}
    </select>
  );

  const load = useCallback(async (bustCache=false)=>{
    // Show stale data immediately so UI isn't blank
    if(!data) {
      const stale = LS.get('_dc', null);
      if(stale) { setData(stale); setLoading(false); }
    }
    setRefreshing(true);
    if(bustCache) { try { await fetch('/api/cache-bust'); } catch{} }
    try {
      const resp = await fetch('/api/data');
      if(resp.ok) {
        const d = await resp.json();
        /* fall back to MOCK for any missing arrays so the UI never breaks */
        const merged = {
          subnets:     d.subnets?.length     ? d.subnets     : MOCK.subnets,
          leases:      d.leases?.length      ? d.leases      : MOCK.leases,
          dnsViews:    d.dnsViews?.length    ? d.dnsViews    : MOCK.dnsViews,
          zones:       d.zones?.length       ? d.zones       : MOCK.zones,
          hosts:       d.hosts?.length       ? d.hosts       : MOCK.hosts,
          secPolicies: d.secPolicies?.length ? d.secPolicies : MOCK.secPolicies,
          feeds:       d.feeds?.length       ? d.feeds       : MOCK.feeds,
          auditLogs:   d.auditLogs?.length   ? d.auditLogs   : MOCK.auditLogs,
        };
        setData(merged);
        LS.set('_dc', {subnets:merged.subnets||[],leases:merged.leases||[],dnsViews:merged.dnsViews||[],zones:merged.zones||[],hosts:merged.hosts||[],secPolicies:merged.secPolicies||[],feeds:merged.feeds||[],auditLogs:merged.auditLogs||[]});
        // change-detection: diff headline counts vs the previous refresh
        const _prev = LS.get('noc.prevSnap', null);
        const _cur  = snapMetrics(merged);
        if(_prev) setDeltas(Object.keys(_cur).reduce((a,k)=>{const dv=_cur[k]-(k in _prev?_prev[k]:_cur[k]); if(dv!==0)a[k]=dv; return a;},{}));
        LS.set('noc.prevSnap', _cur);
      } else {
        setData(MOCK); /* server error — use mock */
      }
    } catch(e) {
      setData(MOCK); /* no server running — use mock */
    }
    setLastUpd(new Date());
    setLoading(false);
    setRefreshing(false);
  },[]);

  useEffect(()=>{load();},[]);

  // CSP accounts this API key's user can act in (portal-style sandbox switch)
  useEffect(()=>{
    fetch('/api/accounts').then(r=>r.json()).then(d=>{
      setAccounts(d.accounts||[]);
      setActiveAcct(d.active||'');
    }).catch(()=>{});
  },[]);
  const switchAcct = async (id) => {
    setShowAcctMenu(false); setAcctSearch('');
    if(id===activeAcct) return;
    setSwitchingAcct(true);
    try {
      const r = await fetch('/api/switch-account', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({id})
      });
      const d = await r.json();
      if(d.ok){
        setActiveAcct(d.active);
        LS.set('_dc', null);   // stale cache belongs to the previous tenant
        LS.set('noc.prevSnap', null);
        setData(null); setLoading(true);
        await load(true);
      }
    } catch{}
    setSwitchingAcct(false);
  };

  // deep-link: section <-> URL hash (shareable views)
  useEffect(()=>{
    const apply=()=>{ const id=decodeURIComponent(location.hash.replace(/^#/,'')).split('?')[0];
      if(id && SECTIONS.some(s=>s.id===id)) setSection(id); };
    apply();
    window.addEventListener('hashchange',apply);
    return ()=>window.removeEventListener('hashchange',apply);
  },[]);
  useEffect(()=>{
    if(location.hash.replace(/^#/,'')!==section) history.replaceState(null,'','#'+section);
  },[section]);

  // auto-tooltip: set title=full value on any table cell/badge that is actually truncated
  useEffect(()=>{
    const t=setTimeout(()=>{
      document.querySelectorAll('.tbl td, .tbl td .badge').forEach(el=>{
        if(el.scrollWidth>el.clientWidth+1){ if(!el.title) el.title=el.textContent; }
        else if(el.title&&el.title===el.textContent){ el.removeAttribute('title'); }
      });
    },120);
    return ()=>clearTimeout(t);
  });

  useEffect(()=>{
    if(!autoRefresh) { setArCountdown(0); return; }
    setArCountdown(autoRefresh);
    const tick = setInterval(()=>{
      setArCountdown(c=>{
        if(c<=1){ load(); return autoRefresh; }
        return c-1;
      });
    },1000);
    return ()=>clearInterval(tick);
  },[autoRefresh]);

  useEffect(()=>{
    const handler = e => {
      if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT'||e.target.isContentEditable) return;
      if(e.key==='?') { setShowShortcuts(s=>!s); return; }
      if(e.key==='Escape') { setChatOpen(false); setSubFilt(null); setHostFilt(null); setShowShortcuts(false); return; }
      if(e.key==='r'&&!e.metaKey&&!e.ctrlKey) { load(); return; }
      if(e.key==='/'){ e.preventDefault(); setSection('search'); return; }
      const idx = parseInt(e.key);
      if(idx>=1&&idx<=9) { const s=SECTIONS[idx-1]; if(s) setSection(s.id); }
    };
    document.addEventListener('keydown', handler);
    return ()=>document.removeEventListener('keydown', handler);
  },[load]);

  useEffect(()=>{
    document.body.classList.toggle('chat-open', chatOpen);
    return ()=>document.body.classList.remove('chat-open');
  },[chatOpen]);

  useEffect(()=>{
    if(!data) { document.title='Infoblox NOC Dashboard'; return; }
    const crit = data.subnets.filter(s=>s.util>=90).length;
    const errs = data.hosts.filter(h=>h.status==='error'||h.status==='offline').length;
    let title = 'Infoblox NOC';
    if(crit>0) title += ' ⚠'+crit+' critical';
    if(errs>0) title += ' | '+errs+' errors';
    document.title = title;
  },[data]);

  useEffect(()=>{
    if(section==='dns-analytics'&&!dnsAnalytics) {
      fetch('/api/dns-analytics').then(r=>r.ok?r.json():null).then(d=>d&&setDnsAnalytics(d)).catch(()=>{});
    }
    if(section==='insights'&&!insights) {
      fetch('/api/insights').then(r=>r.ok?r.json():null).then(d=>d&&setInsights(d)).catch(()=>{});
    }
  },[section]);

  if(loading&&!data) return (
    <div style={{display:'flex',height:'100vh',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:14}}>
      <div className="spinner" style={{width:44,height:44}}/>
      <div style={{color:'var(--teal)',fontSize:14,fontWeight:600}}>Connecting to Infoblox</div>
      <div style={{color:'var(--gray-400)',fontSize:12}}>Loading network data…</div>
    </div>
  );

  const {subnets,leases,dnsViews,zones,hosts,secPolicies,feeds,auditLogs}=data;

  /* search filter — only active when queryMode==='filter' and searchQuery set */
  const sq = (queryMode==='filter'&&searchQuery) ? searchQuery.toLowerCase() : '';
  const s_subnets  = sq ? subnets.filter(s=>[s.name,s.addr,s.site].some(v=>v.toLowerCase().includes(sq)))  : subnets;
  const s_leases   = sq ? leases.filter(l=>[l.addr,l.host,l.subnet].some(v=>v.toLowerCase().includes(sq))) : leases;
  const s_zones    = sq ? zones.filter(z=>[z.fqdn,z.view].some(v=>v.toLowerCase().includes(sq)))           : zones;
  const s_hosts    = sq ? hosts.filter(h=>[h.name,h.ip,h.type,h.status].some(v=>v.toLowerCase().includes(sq))) : hosts;
  const s_policies = sq ? secPolicies.filter(p=>[p.name,p.action].some(v=>v.toLowerCase().includes(sq)))   : secPolicies;
  const s_feeds    = sq ? feeds.filter(f=>[f.name,f.cat,f.level].some(v=>v.toLowerCase().includes(sq)))    : feeds;
  const s_logs     = sq ? auditLogs.filter(l=>[l.user,l.action,l.resource].some(v=>v.toLowerCase().includes(sq))) : auditLogs;

  const critSubs  = subnets.filter(s=>s.util>=90);
  const onlineH   = hosts.filter(h=>h.status==='online');
  const ttlBad    = zones.filter(z=>z.anomaly);
  const activeF   = feeds.filter(f=>f.active);
  const leaseCt   = leases.reduce((a,l)=>{a[l.subnet_id]=(a[l.subnet_id]||0)+1;return a},{});
  const filtHosts = (hostFilt||hostChip) ? s_hosts.filter(h=>h.status===(hostFilt||hostChip)) : s_hosts;
  const firingAlerts = evalAlerts(data, alertRules).filter(a=>a.firing);
  const shareView = () => { const url=location.origin+location.pathname+'#'+section;
    if(navigator.clipboard) navigator.clipboard.writeText(url).catch(()=>{}); };

  return (
    <div style={{display:'flex',minHeight:'100vh'}}>

      {/* SIDEBAR */}
      <div className="sidebar">
        <div className="logo">
          <svg width="28" height="28" viewBox="0 0 28 28">
            <rect width="28" height="28" rx="6" fill="#252321"/>
            <path d="M7 20L14 8L21 20" stroke="#C8C4BE" strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
            <circle cx="14" cy="8" r="2" fill="#C8C4BE"/>
          </svg>
          <div>
            <div className="logo-text">Infoblox</div>
            <div className="logo-sub">NOC Dashboard</div>
          </div>
        </div>

        <nav className="sidebar-nav">
          <div className="nav-sec">Navigation</div>
          {SECTIONS.map(s=>{
            let badge = null;
            if(data&&s.id==='ipam') { const c=data.subnets.filter(x=>x.util>=90).length; if(c>0) badge=<span className="badge-pill">{c}</span>; }
            if(data&&s.id==='hosts') { const c=data.hosts.filter(h=>h.status==='error'||h.status==='offline').length; if(c>0) badge=<span className="badge-pill">{c}</span>; }
            if(data&&s.id==='dns') { const c=data.zones.filter(z=>z.anomaly).length; if(c>0) badge=<span className="badge-pill badge-pill-amber">{c}</span>; }
            if(data&&s.id==='audit') { const c=data.auditLogs.filter(l=>l.result==='failure').length; if(c>0) badge=<span className="badge-pill badge-pill-amber">{c}</span>; }
            if(s.id==='alerts'&&firingAlerts.length>0) badge=<span className="badge-pill">{firingAlerts.length}</span>;
            return (
              <button key={s.id} className={`nav-item${section===s.id?' active':''}`} onClick={()=>setSection(s.id)}>
                <span className="nav-icon">{s.icon}</span>{s.label}{badge}
              </button>
            );
          })}
        </nav>

        <div className="sidebar-foot">
          <div style={{color:'var(--green)',display:'flex',alignItems:'center',gap:5}}>
            <span className="pulse">●</span> API Connected
          </div>
          {accounts.length>0&&(
            <div style={{position:'relative'}}>
              <div className="acct-name">Account: <b style={{color:'var(--gray-200)'}}>{(accounts.find(a=>a.id===activeAcct)||{}).name||'—'}</b></div>
              {accounts.length===1&&(
                <div style={{fontSize:9,color:'var(--gray-600)',marginTop:3,lineHeight:1.4}}
                  title="This API key's user belongs to a single CSP account. Use an interactive User API Key (portal → user menu → User API Keys) to enable switching.">
                  single-account key — switching off
                </div>
              )}
              {accounts.length>1&&<button className="acct-switch-btn" disabled={switchingAcct} onClick={()=>setShowAcctMenu(m=>!m)}>
                {switchingAcct?'⟳ Switching…':'⇄ Switch account'}
              </button>}
              {showAcctMenu&&(
                <>
                  <div className="acct-overlay" onClick={()=>{setShowAcctMenu(false);setAcctSearch('');}}/>
                  <div className="acct-menu">
                    {accounts.length>6&&(
                      <input className="acct-search" autoFocus placeholder="Search accounts…"
                        value={acctSearch} onChange={e=>setAcctSearch(e.target.value)}/>
                    )}
                    <div style={{maxHeight:240,overflowY:'auto'}}>
                      {accounts.filter(a=>a.name.toLowerCase().includes(acctSearch.toLowerCase())).map(a=>(
                        <button key={a.id} className={`acct-menu-item${a.id===activeAcct?' active':''}`}
                          title={a.name} onClick={()=>switchAcct(a.id)}>
                          {a.id===activeAcct?'● ':'○ '}{a.name}
                        </button>
                      ))}
                    </div>
                  </div>
                </>
              )}
            </div>
          )}
        </div>
      </div>

      {/* MAIN */}
      <div className="main">
        <div className="topbar">
          <div>
            <div className="page-title">{SECTIONS.find(s=>s.id===section)?.label}</div>
            <div className="page-sub">{lastUpd&&`Last updated: ${lastUpd.toLocaleTimeString()}`}</div>
          </div>
          <div style={{display:'flex',alignItems:'center'}}>
            <select className="auto-refresh-sel" value={autoRefresh}
              onChange={e=>{const v=Number(e.target.value);setAutoRefresh(v);LS.set('ar',v);}}>
              <option value={0}>Auto-refresh: Off</option>
              <option value={30}>Auto-refresh: 30s</option>
              <option value={60}>Auto-refresh: 1m</option>
              <option value={300}>Auto-refresh: 5m</option>
            </select>
            {autoRefresh>0&&<span className="refresh-countdown">{arCountdown}s</span>}
            <button className="refresh-btn" onClick={()=>load(true)}>
              <span className={refreshing?'spin':''} style={{display:'inline-block'}}>↻</span>
              {refreshing?'Refreshing…':'Refresh All'}
            </button>
            <button className={`chat-toggle-btn${chatOpen?' on':''}`} onClick={()=>setChatOpen(o=>!o)}>
              ⊕ {chatOpen?'Close Query':'Query'}
            </button>
            <button className="chat-toggle-btn" onClick={shareView} title="Copy a deep link to this view">◳ Share</button>
            <button style={{background:'none',border:'1px solid var(--border)',borderRadius:6,
              color:'var(--gray-400)',fontSize:12,fontWeight:700,padding:'7px 10px',cursor:'pointer',marginLeft:6}}
              onClick={()=>setShowShortcuts(s=>!s)} title="Keyboard shortcuts">?</button>
          </div>
        </div>
        {sq&&(
          <div className="filter-banner">
            <span>Filtering: "<b>{searchQuery}</b>" — results narrowed in all sections</span>
            <button className="filter-clear" onClick={()=>setSearchQuery('')}>✕ Clear</button>
          </div>
        )}

        {/* ── OVERVIEW ── */}
        {section==='overview'&&(
          <>
            {/* Priority Issue Strip */}
            {(()=>{
              const issues=[];
              const errHosts=hosts.filter(h=>h.status==='error'||h.status==='offline');
              if(errHosts.length>0) issues.push({cls:'issue-row-crit',icon:'⚠',msg:`${errHosts.length} host${errHosts.length>1?'s':''} offline or in error state`,section:'hosts'});
              const ttlIssues=zones.filter(z=>z.anomaly);
              if(ttlIssues.length>0) issues.push({cls:'issue-row-warn',icon:'⚡',msg:`${ttlIssues.length} DNS zone${ttlIssues.length>1?'s':''} with TTL anomalies`,section:'dns'});
              if(critSubs.length>0) issues.push({cls:'issue-row-warn',icon:'⚠',msg:`${critSubs.length} subnet${critSubs.length>1?'s':''} at ≥90% utilization`,section:'ipam'});
              const feedCrit=feeds.filter(f=>f.level==='critical'&&f.active);
              if(feedCrit.length>0) issues.push({cls:'issue-row-warn',icon:'🛡',msg:`${feedCrit.length} active critical threat feeds`,section:'threats'});
              if(issues.length===0) return (
                <div className="issue-row-ok issue-row" style={{marginBottom:18}}>
                  <span>✓ All systems normal — no critical issues detected</span>
                </div>
              );
              return (
                <div className="issue-strip">
                  {issues.map((iss,i)=>(
                    <div key={i} className={`issue-row ${iss.cls}`} onClick={()=>setSection(iss.section)}>
                      <span>{iss.icon} {iss.msg}</span>
                      <span className="issue-arrow">→ {iss.section.toUpperCase()}</span>
                    </div>
                  ))}
                </div>
              );
            })()}
            {firingAlerts.length>0&&(
              <div className="issue-strip" style={{marginBottom:14}}>
                {firingAlerts.map(a=>(
                  <div key={a.id} className="issue-row issue-row-crit" onClick={()=>setSection('alerts')}>
                    <span>⚑ Alert: {metricLabel(a.metric)} {a.op} {a.threshold} (now {a.value})</span>
                    <span className="issue-arrow">→ ALERTS</span>
                  </div>
                ))}
              </div>
            )}
            {deltas&&Object.keys(deltas).length>0&&(
              <div className="card mb14">
                <div className="card-title"><div className="dot"/>Changes since last refresh</div>
                <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
                  {Object.entries(deltas).map(([k,v])=>(
                    <div key={k} style={{fontSize:12,color:'var(--gray-300)'}}>
                      {({total_subnets:'Total subnets',total_zones:'Total zones',total_leases:'Total leases'}[k])||metricLabel(k)}:{' '}
                      <span style={{fontWeight:700,color:v>0?'#EF4444':'#10B981'}}>{v>0?('▲ +'+v):('▼ '+v)}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {critSubs.length>0&&(
              <div className="alert mb20">
                ⚠ {critSubs.length} subnet{critSubs.length>1?'s':''} at ≥90% utilization: {critSubs.map(s=>s.name).slice(0,3).join(', ')}{critSubs.length>3?'…':''}
              </div>
            )}
            <div className="bento">
            {overviewOrder.map(id=>{
              if(id==='kpis') return (
                <div key="kpis" {...wrapProps('kpis','b-full')} style={{position:'relative'}}>
                  <div style={{position:'absolute',top:-2,right:2,zIndex:2}}><DragHandle id="kpis"/></div>
                  <div className="g4">
                    <GaugeCard value={critSubs.length}  max={subnets.length}   label="Critical Subnets" sub={`of ${subnets.length} total`}    color={critSubs.length>0?'#EF4444':'#10B981'} icon="⊞" onClick={()=>setSection('ipam')}/>
                    <GaugeCard value={onlineH.length}   max={hosts.length}     label="Hosts Online"     sub={`of ${hosts.length} total`}      color="#10B981"  icon="⊡" onClick={()=>setSection('hosts')}/>
                    <GaugeCard value={ttlBad.length}    max={zones.length}     label="TTL Anomalies"    sub={`of ${zones.length} zones`}      color={ttlBad.length>0?'#F59E0B':'#10B981'} icon="⊕" onClick={()=>setSection('dns')}/>
                    <GaugeCard value={activeF.length}   max={feeds.length}     label="Active Feeds"     sub={`of ${feeds.length} total`}      color="#C8C4BE"  icon="⊗" onClick={()=>setSection('threats')}/>
                  </div>
                </div>
              );
              if(id==='hosts') return (
                <div key="hosts" {...wrapProps('hosts')}>
                  <div className={`card${fullscreen==='hosts'?' fs':''}`}>
                    <div className="card-title">
                      <DragHandle id="hosts"/>
                      <div className="dot"/>Host Status Distribution
                      <div style={{marginLeft:'auto',display:'flex',gap:6,alignItems:'center'}}>
                        <VizSelect id="hosts" def="donut" opts={[['donut','Donut'],['table','Table'],['bar','Bar'],['raw','Raw']]}/>
                        <button className="collapse-btn" style={{margin:0}} onClick={()=>toggleCollapse('hosts')} title={collapsed['hosts']?'Expand':'Collapse'}>{collapsed['hosts']?'▶':'▼'}</button>
                        <button className="fs-btn" onClick={()=>toggleFs('hosts')} title="Fullscreen">⤢</button>
                      </div>
                    </div>
                    {!collapsed['hosts']&&(()=>{
                      const filteredH = hostFilt ? hosts.filter(h=>h.status===hostFilt) : [];
                      const statusColor = {online:'#10B981',degraded:'#F59E0B',offline:'#64748B',error:'#EF4444',pending:'var(--teal)'};
                      const hv=getViz('hosts','donut');
                      const statusRows=['online','degraded','offline','error','pending']
                        .map(st=>({status:st,count:hosts.filter(h=>h.status===st).length})).filter(r=>r.count>0);
                      const statusColors={online:'#10B981',degraded:'#F59E0B',offline:'#64748B',error:'#EF4444',pending:'#C8C4BE'};
                      return (
                        <>
                          {hv==='donut'?<>
                          <div style={{fontSize:9,color:'var(--gray-600)',marginBottom:6,textAlign:'right'}}>Click a segment to drill down</div>
                          <Donut hosts={hosts} filter={hostFilt} onSlice={s=>setHostFilt(f=>f===s?null:s)}/>
                          </>:<WidgetViz data={statusRows} viz={hv==='line'?'bar':hv} columns={[{key:'status',label:'Status'},{key:'count',label:'Hosts'}]} labelKey="status" valueKey="count" rowColor={r=>statusColors[r.status]} defaultRows={6}/>}
                          {hostFilt&&(
                            <div className="drill-panel">
                              <div className="drill-header">
                                <span className="drill-title" style={{color:statusColor[hostFilt]||'var(--teal)'}}>
                                  ⊡ {hostFilt.charAt(0).toUpperCase()+hostFilt.slice(1)} Hosts ({filteredH.length})
                                </span>
                                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                                  <button className="drill-see-all" onClick={()=>setSection('hosts')}>See all in Hosts tab →</button>
                                  <button className="drill-close" onClick={()=>setHostFilt(null)}>×</button>
                                </div>
                              </div>
                              <div className="scroll" style={{maxHeight:220}}>
                                <table className="tbl">
                                  <colgroup><col style={{width:'52%'}}/><col style={{width:'30%'}}/><col style={{width:'18%'}}/></colgroup>
                                  <thead><tr><th>Hostname</th><th>IP</th><th>Type</th></tr></thead>
                                  <tbody>
                                    {filteredH.slice(0,15).map(h=>(
                                      <tr key={h.id}>
                                        <td style={{fontSize:11,fontWeight:500}} title={h.name}>{h.name}</td>
                                        <td style={{fontFamily:'monospace',fontSize:10,color:'var(--gray-400)'}} title={h.ip}>{h.ip||'—'}</td>
                                        <td style={{fontSize:10,color:'var(--gray-400)'}}>{h.type}</td>
                                      </tr>
                                    ))}
                                  </tbody>
                                </table>
                                {filteredH.length>15&&<div style={{textAlign:'center',fontSize:10,color:'var(--gray-400)',marginTop:4}}>{filteredH.length-15} more → <button className="drill-see-all" onClick={()=>setSection('hosts')}>Hosts tab</button></div>}
                              </div>
                            </div>
                          )}
                        </>
                      );
                    })()}
                  </div>
                </div>
              );
              if(id==='subnets') return (
                <div key="subnets" {...wrapProps('subnets','b-wide')}>
                  <div className={`card${fullscreen==='subnets'?' fs':''}`}>
                    <div className="card-title">
                      <DragHandle id="subnets"/>
                      <div className="dot"/>Top 10 Subnets by DHCP Utilization
                      <div style={{marginLeft:'auto',display:'flex',gap:6,alignItems:'center'}}>
                        <VizSelect id="subnets" def="subnetbars" opts={[['subnetbars','Bars'],['table','Table'],['line','Line'],['raw','Raw']]}/>
                        <button className="collapse-btn" style={{margin:0}} onClick={()=>toggleCollapse('subnets')} title={collapsed['subnets']?'Expand':'Collapse'}>{collapsed['subnets']?'▶':'▼'}</button>
                        <button className="fs-btn" onClick={()=>toggleFs('subnets')} title="Fullscreen">⤢</button>
                      </div>
                    </div>
                    {!collapsed['subnets']&&(()=>{
                      const drillSub = subFilt ? subnets.find(s=>s.id===subFilt) : null;
                      const drillLeases = drillSub ? leasesInSubnet(leases, drillSub) : [];
                      const sv=getViz('subnets','subnetbars');
                      const subRows=[...subnets].sort((a,b)=>b.util-a.util).slice(0,10)
                        .map(s=>({...s, name: s.name!==s.addr?s.name:'—', addr: `${s.addr}/${s.cidr}`}));
                      const subHasSite=subRows.some(s=>s.site&&s.site!=='–'&&s.site!=='—');
                      const subCols=[{key:'name',label:'Subnet'},{key:'addr',label:'Network'},{key:'util',label:'Util %'},{key:'used',label:'Used'},
                        ...(subHasSite?[{key:'site',label:'Site'}]:[])];
                      return (
                        <>
                          {sv==='subnetbars'?<>
                          <div style={{fontSize:9,color:'var(--gray-600)',marginBottom:6,textAlign:'right'}}>Click a bar to drill down</div>
                          <SubnetBars subnets={subnets} highlight={subFilt} onBar={id=>setSubFilt(f=>f===id?null:id)}/>
                          </>:<WidgetViz data={subRows} viz={sv}
                            columns={subCols}
                            labelKey="name" valueKey="util" rowColor={r=>utilColor(r.util)} defaultRows={10}/>}
                          {drillSub&&(
                            <div className="drill-panel">
                              <div className="drill-header">
                                <span className="drill-title">⊞ {drillSub.name} — {drillSub.addr}/{drillSub.cidr}</span>
                                <button className="drill-close" onClick={()=>setSubFilt(null)}>×</button>
                              </div>
                              <div style={{display:'flex',gap:16,marginBottom:10,flexWrap:'wrap'}}>
                                {[
                                  {l:'Utilization', v:`${drillSub.util}%`, c:utilColor(drillSub.util)},
                                  {l:'Used IPs',    v:`${drillSub.used} / ${drillSub.total}`, c:'var(--gray-200)'},
                                  {l:'Site',        v:drillSub.site||'—', c:'var(--gray-400)'},
                                  {l:'Leases found',v:drillLeases.length, c:'var(--teal)'},
                                ].map((x,i)=>(
                                  <div key={i} style={{fontSize:11}}>
                                    <div style={{color:'var(--gray-600)',marginBottom:1,fontSize:9,textTransform:'uppercase',letterSpacing:'.08em'}}>{x.l}</div>
                                    <div style={{color:x.c,fontWeight:700}}>{x.v}</div>
                                  </div>
                                ))}
                              </div>
                              {drillLeases.length>0?(
                                <div className="scroll" style={{maxHeight:160}}>
                                  <table className="tbl">
                                    <thead><tr><th>IP Address</th><th>Hostname</th><th>State</th></tr></thead>
                                    <tbody>
                                      {drillLeases.slice(0,20).map((l,i)=>(
                                        <tr key={i}>
                                          <td style={{fontFamily:'monospace',fontSize:11}}>{l.addr}</td>
                                          <td style={{fontSize:11,color:'var(--gray-200)'}}>{l.host||'—'}</td>
                                          <td><span className={`badge ${l.state==='active'?'b-green':'b-gray'}`}>{l.state}</span></td>
                                        </tr>
                                      ))}
                                    </tbody>
                                  </table>
                                  {drillLeases.length>20&&<div style={{textAlign:'center',fontSize:10,color:'var(--gray-400)',marginTop:4}}>{drillLeases.length-20} more — <button className="drill-see-all" onClick={()=>setSection('dhcp')}>See all in DHCP tab</button></div>}
                                </div>
                              ):(
                                <div style={{fontSize:11,color:'var(--gray-400)'}}>No lease data loaded for this subnet. <button className="drill-see-all" onClick={()=>setSection('ipam')}>View in IPAM tab →</button></div>
                              )}
                            </div>
                          )}
                        </>
                      );
                    })()}
                  </div>
                </div>
              );
              if(id==='ttl') return (
                <div key="ttl" {...wrapProps('ttl','b-wide')}>
                  <div className={`card${fullscreen==='ttl'?' fs':''}`}>
                    <div className="card-title">
                      <DragHandle id="ttl"/>
                      <div className="dot" style={{background:'#F59E0B'}}/>Zones with TTL Issues
                      <div style={{marginLeft:'auto',display:'flex',gap:6,alignItems:'center'}}>
                        <VizSelect id="ttl"/>
                        <button className="collapse-btn" style={{margin:0}} onClick={()=>toggleCollapse('ttl')} title={collapsed['ttl']?'Expand':'Collapse'}>{collapsed['ttl']?'▶':'▼'}</button>
                        <button className="fs-btn" onClick={()=>toggleFs('ttl')} title="Fullscreen">⤢</button>
                      </div>
                    </div>
                    {!collapsed['ttl']&&(getViz('ttl')==='table'
                      ?<TTLTable zones={zones}/>
                      :<WidgetViz data={zones.filter(z=>z.anomaly)} viz={getViz('ttl')}
                        columns={[{key:'fqdn',label:'Zone'},{key:'view',label:'View'},{key:'ttl',label:'TTL'},{key:'neg_ttl',label:'Neg TTL'},{key:'records',label:'Records'}]}
                        labelKey="fqdn" valueKey="ttl" defaultRows={10}/>)}
                  </div>
                </div>
              );
              if(id==='audit') return (
                <div key="audit" {...wrapProps('audit','b-wide')}>
                  <div className={`card${fullscreen==='audit'?' fs':''}`}>
                    <div className="card-title">
                      <DragHandle id="audit"/>
                      <div className="dot"/>Recent Audit Activity
                      <div style={{marginLeft:'auto',display:'flex',gap:6,alignItems:'center'}}>
                        <VizSelect id="audit"/>
                        <button className="collapse-btn" style={{margin:0}} onClick={()=>toggleCollapse('audit')} title={collapsed['audit']?'Expand':'Collapse'}>{collapsed['audit']?'▶':'▼'}</button>
                        <button className="fs-btn" onClick={()=>toggleFs('audit')} title="Fullscreen">⤢</button>
                      </div>
                    </div>
                    {!collapsed['audit']&&(getViz('audit')==='table'
                      ?<AuditTable logs={auditLogs} limit={rl('audit-ov',10)}/>
                      :(()=>{
                        const cnt=auditLogs.reduce((a,l)=>{a[l.action]=(a[l.action]||0)+1;return a},{});
                        const actRows=Object.entries(cnt).map(([action,count])=>({action,count}));
                        return <WidgetViz data={getViz('audit')==='raw'?auditLogs:actRows} viz={getViz('audit')}
                          columns={[{key:'action',label:'Action'},{key:'count',label:'Events'}]}
                          labelKey="action" valueKey="count" rowColor={r=>actionColor(r.action)} defaultRows={10}/>;
                      })())}
                  </div>
                </div>
              );
              if(id==='pols') return (
                <div key="pols" {...wrapProps('pols')}>
                  <div className={`card${fullscreen==='pols'?' fs':''}`}>
                    <div className="card-title">
                      <DragHandle id="pols"/>
                      <div className="dot" style={{background:'#C8C4BE'}}/>Security Policies
                      <div style={{marginLeft:'auto',display:'flex',gap:6,alignItems:'center'}}>
                        <VizSelect id="pols" def="panel" opts={[['panel','Panel'],['table','Table'],['bar','Bar'],['raw','Raw']]}/>
                        <button className="collapse-btn" style={{margin:0}} onClick={()=>toggleCollapse('pols')} title={collapsed['pols']?'Expand':'Collapse'}>{collapsed['pols']?'▶':'▼'}</button>
                        <button className="fs-btn" onClick={()=>toggleFs('pols')} title="Fullscreen">⤢</button>
                      </div>
                    </div>
                    {!collapsed['pols']&&(getViz('pols','panel')==='panel'
                      ?<PoliciesPanel policies={secPolicies}/>
                      :<WidgetViz data={secPolicies} viz={getViz('pols','panel')}
                        columns={[{key:'name',label:'Policy'},{key:'action',label:'Action'},{key:'rules',label:'Rules'},{key:'active',label:'Active',render:p=>p.active?'Yes':'No'}]}
                        labelKey="name" valueKey="rules" defaultRows={10}/>)}
                  </div>
                </div>
              );
              if(id==='feeds') return (
                <div key="feeds" {...wrapProps('feeds','b-wide')}>
                  <div className={`card${fullscreen==='feeds'?' fs':''}`}>
                    <div className="card-title">
                      <DragHandle id="feeds"/>
                      <div className="dot" style={{background:'#EF4444'}}/>Top Threat Feeds by Severity
                      <div style={{marginLeft:'auto',display:'flex',gap:6,alignItems:'center'}}>
                        <VizSelect id="feeds"/>
                        <button className="collapse-btn" style={{margin:0}} onClick={()=>toggleCollapse('feeds')} title={collapsed['feeds']?'Expand':'Collapse'}>{collapsed['feeds']?'▶':'▼'}</button>
                        <button className="fs-btn" onClick={()=>toggleFs('feeds')} title="Fullscreen">⤢</button>
                      </div>
                    </div>
                    {!collapsed['feeds']&&(getViz('feeds')==='table'
                      ?<FeedsTable feeds={feeds}/>
                      :<WidgetViz data={[...feeds].sort((a,b)=>b.entries-a.entries)} viz={getViz('feeds')}
                        columns={[{key:'name',label:'Feed'},{key:'cat',label:'Category'},{key:'level',label:'Level'},{key:'entries',label:'Entries'}]}
                        labelKey="name" valueKey="entries" rowColor={r=>levelColor(r.level)} defaultRows={10}/>)}
                  </div>
                </div>
              );
              return null;
            })}
            </div>
          </>
        )}

        {/* ── IPAM ── */}
        {section==='ipam'&&(
          <div className="card">
            <div className="card-title"><div className="dot"/>All Subnets — DHCP Utilization ({s_subnets.length}{sq&&` of ${subnets.length}`})</div>
            <RowLimitBar limit={rl('ipam')} setLimit={v=>setRl('ipam',v)}/>
              <div style={{textAlign:'right',marginBottom:6}}>
                <button className="refresh-btn" style={{fontSize:10,padding:'4px 10px'}}
                  onClick={()=>downloadCSV('subnets.csv',[...s_subnets].sort((a,b)=>b.util-a.util),[
                    {key:'name',label:'Name'},{key:'addr',label:'Address'},{key:'cidr',label:'CIDR'},
                    {key:'used',label:'Used'},{key:'total',label:'Total'},{key:'util',label:'Util%'},{key:'site',label:'Site'}
                  ])}>⬇ Export CSV</button>
              </div>
              <div className="chip-bar">
                {[
                  {label:'All', val:null, count:s_subnets.length},
                  {label:'Critical ≥90%', val:'critical', count:s_subnets.filter(s=>s.util>=90).length},
                  {label:'Warning 75–89%', val:'warning', count:s_subnets.filter(s=>s.util>=75&&s.util<90).length},
                  {label:'Healthy <75%', val:'healthy', count:s_subnets.filter(s=>s.util<75).length},
                ].map(c=>(
                  <button key={c.val} className={`chip${ipamChip===c.val?' on':''}`}
                    onClick={()=>setIpamChip(c.val)}>
                    {c.label} <span style={{opacity:.6}}>({c.count})</span>
                  </button>
                ))}
              </div>
            <IPAMTable subnets={s_subnets} ipamChip={ipamChip} rowLimit={rl('ipam')} leaseCt={leaseCt}/>
          </div>
        )}

        {/* ── DHCP ── */}
        {section==='dhcp'&&(
          <>
            <div className="g3 mb20">
              {[
                {v:s_leases.filter(l=>l.state==='active').length, l:'Active Leases',  c:'var(--teal)'},
                {v:s_leases.filter(l=>l.state==='expired').length,l:'Expired Leases', c:'var(--amber)'},
                {v:Object.keys(leaseCt).length,                   l:'Subnets w/ Leases',c:'var(--gray-200)'},
              ].map((x,i)=>(
                <div key={i} className="card" style={{textAlign:'center'}}>
                  <div style={{fontSize:30,fontWeight:800,color:x.c}}>{x.v}</div>
                  <div style={{fontSize:10,color:'var(--gray-400)',marginTop:4,textTransform:'uppercase',letterSpacing:'.1em'}}>{x.l}</div>
                </div>
              ))}
            </div>
            <div className="card">
              <div className="card-title"><div className="dot"/>DHCP Leases{sq?` — filtered (${s_leases.length})`:` (showing ${rl('dhcp')} of ${s_leases.length})`}</div>
              <RowLimitBar limit={rl('dhcp')} setLimit={v=>setRl('dhcp',v)}/>
              <div className="scroll" style={{maxHeight:480}}>
                <table className="tbl">
                  <thead><tr><th>IP Address</th><th>Hostname</th><th>Subnet</th><th>State</th></tr></thead>
                  <tbody>
                    {s_leases.slice(0,rl('dhcp')).map(l=>(
                      <tr key={l.addr}>
                        <td style={{fontFamily:'monospace',fontSize:11}}>{l.addr}</td>
                        <td style={{fontSize:11,color:'var(--gray-200)'}}>{l.host}</td>
                        <td style={{fontSize:11,color:'var(--gray-400)'}}>{l.subnet}</td>
                        <td><span className={`badge ${l.state==='active'?'b-green':'b-gray'}`}>{l.state}</span></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </>
        )}

        {/* ── DNS ── */}
        {section==='dns'&&(
          <>
            <div className="g3 mb20">
              {[
                {v:dnsViews.length,  l:'DNS Views',     c:'var(--teal)'},
                {v:zones.length,     l:'Auth Zones',    c:'var(--gray-200)'},
                {v:ttlBad.length,    l:'TTL Anomalies', c:'var(--amber)'},
              ].map((x,i)=>(
                <div key={i} className="card" style={{textAlign:'center'}}>
                  <div style={{fontSize:30,fontWeight:800,color:x.c}}>{x.v}</div>
                  <div style={{fontSize:10,color:'var(--gray-400)',marginTop:4,textTransform:'uppercase',letterSpacing:'.1em'}}>{x.l}</div>
                </div>
              ))}
            </div>
            <div className="g2">
              <div className="card">
                <div className="card-title"><div className="dot" style={{background:'#F59E0B'}}/>Zones with TTL Issues</div>
                <TTLTable zones={s_zones}/>
                {(()=>{
                  const drillZone = zoneFilt ? (s_zones.find(z=>z.id===zoneFilt)||zones.find(z=>z.id===zoneFilt)) : null;
                  return drillZone&&(
                    <div className="drill-panel">
                      <div className="drill-header">
                        <span className="drill-title" style={{fontFamily:'monospace'}}>⊕ {drillZone.fqdn}</span>
                        <button className="drill-close" onClick={()=>setZoneFilt(null)}>×</button>
                      </div>
                      <div style={{display:'flex',gap:20,flexWrap:'wrap'}}>
                        {[
                          {l:'View', v:drillZone.view},
                          {l:'TTL', v:drillZone.ttl+'s', c:drillZone.ttl<60||drillZone.ttl>86400?'#FCA5A5':'var(--gray-200)'},
                          {l:'Neg TTL', v:drillZone.neg_ttl+'s', c:drillZone.neg_ttl>3600?'#FCD34D':'var(--gray-200)'},
                          {l:'Records', v:drillZone.records},
                          {l:'Anomaly', v:drillZone.anomaly?'Yes':'No', c:drillZone.anomaly?'#FCA5A5':'#10B981'},
                        ].map((x,i)=>(
                          <div key={i} style={{fontSize:11}}>
                            <div style={{color:'var(--gray-600)',fontSize:9,textTransform:'uppercase',letterSpacing:'.08em',marginBottom:2}}>{x.l}</div>
                            <div style={{color:x.c||'var(--gray-200)',fontWeight:600}}>{x.v}</div>
                          </div>
                        ))}
                      </div>
                      {drillZone.anomaly&&drillZone.issues.length>0&&(
                        <div style={{marginTop:8,display:'flex',gap:5,flexWrap:'wrap'}}>
                          {drillZone.issues.map((iss,i)=><span key={i} className={`badge ${iss.includes('High')||iss.includes('Too High')?'b-amber':'b-red'}`}>{iss}</span>)}
                        </div>
                      )}
                    </div>
                  );
                })()}
              </div>
              <div className="card">
                <div className="card-title"><div className="dot"/>Top NXDOMAINs</div>
                <NXProxy zones={s_zones}/>
              </div>
            </div>
          </>
        )}

        {/* ── HOSTS ── */}
        {section==='hosts'&&(
          <div className="g2">
            <div className="card">
              <div className="card-title"><div className="dot"/>Status Breakdown</div>
              <Donut hosts={hosts} filter={hostFilt} onSlice={s=>setHostFilt(f=>f===s?null:s)}/>
              {hostFilt&&<div style={{textAlign:'center',fontSize:11,color:'var(--teal)',marginTop:8}}>Filtered: <b>{hostFilt}</b> — click segment to clear</div>}
            </div>
            <div className="card">
              <div className="card-title"><div className="dot"/>Host List {hostFilt&&`— ${hostFilt} (${filtHosts.length})`}</div>
              <RowLimitBar limit={rl('hosts')} setLimit={v=>setRl('hosts',v)}/>
              <div className="chip-bar">
                {['online','degraded','offline','error','pending'].map(st=>{
                  const cnt=hosts.filter(h=>h.status===st).length;
                  if(!cnt) return null;
                  const colors={online:'#10B981',degraded:'#F59E0B',offline:'#64748B',error:'#EF4444',pending:'var(--teal)'};
                  return (
                    <button key={st} className={`chip${hostChip===st?' on':''}`}
                      style={hostChip===st?{borderColor:colors[st],color:colors[st]}:{}}
                      onClick={()=>setHostChip(h=>h===st?null:st)}>
                      {st} ({cnt})
                    </button>
                  );
                })}
                {hostChip&&<button className="chip" onClick={()=>setHostChip(null)}>✕ clear</button>}
              </div>
              <HostsTable hosts={filtHosts} rowLimit={rl('hosts')}/>
            </div>
          </div>
        )}

        {/* ── SECURITY ── */}
        {section==='security'&&(
          <div className="card">
            <div className="card-title"><div className="dot"/>Security Policies ({s_policies.length}{sq&&` of ${secPolicies.length}`})</div>
            <PoliciesPanel policies={s_policies}/>
          </div>
        )}

        {/* ── THREATS ── */}
        {section==='threats'&&(
          <div className="card">
            <div className="card-title"><div className="dot" style={{background:'#EF4444'}}/>All Threat Feeds by Severity{sq&&` (${s_feeds.length} of ${feeds.length})`}</div>
            <RowLimitBar limit={rl('threats')} setLimit={v=>setRl('threats',v)}/>
            <FeedsTable feeds={s_feeds.slice(0,rl('threats'))}/>
          </div>
        )}

        {/* ── AUDIT ── */}
        {section==='audit'&&(
          <div className="card">
            <div className="card-title"><div className="dot"/>Audit Log — {sq?`${s_logs.length} of `:'Last '}{auditLogs.length} Entries</div>
            <RowLimitBar limit={rl('audit')} setLimit={v=>setRl('audit',v)}/>
            <AuditTable logs={s_logs} limit={rl('audit')}/>
          </div>
        )}

        {/* ── DNS ANALYTICS ── */}
        {section==='dns-analytics'&&(
          <DnsAnalyticsPanel data={dnsAnalytics} rowLimit={rl('dns-clients')} setRowLimit={v=>setRl('dns-clients',v)}/>
        )}

        {/* ── SOC INSIGHTS ── */}
        {section==='insights'&&(
          <InsightsPanel data={insights} rowLimit={rl('insights')} setRowLimit={v=>setRl('insights',v)}/>
        )}

        {/* ── THREAT LOOKUP ── */}
        {section==='alerts'&&(
          <AlertsPanel data={data} rules={alertRules} setRules={setAlertRules}/>
        )}
        {section==='threat-lookup'&&(
          <div className="card">
            <div className="card-title"><div className="dot" style={{background:'#EF4444'}}/>Entity & Threat Lookup</div>
            <ThreatLookupPanel/>
          </div>
        )}

        {section==='search'&&(
          <SearchSection
            data={data}
            srchQ={srchQ} setSrchQ={setSrchQ}
            srchRes={srchRes} setSrchRes={setSrchRes}
            srching={srching} setSrching={setSrching}
            searchHistory={searchHistory} setSearchHistory={setSearchHistory}
          />
        )}

      </div>

      {showShortcuts&&(
        <div className="shortcut-overlay" onClick={()=>setShowShortcuts(false)}>
          <div className="shortcut-box" onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:14,fontWeight:700,color:'var(--teal)',marginBottom:14}}>Keyboard Shortcuts</div>
            {[
              ['1–9','Navigate sections'],['r','Refresh data'],['/','Jump to Search'],
              ['?','Toggle this help'],['Esc','Close panels / clear filters'],
            ].map(([k,d])=>(
              <div key={k} style={{display:'flex',alignItems:'center',marginBottom:8,fontSize:12}}>
                <span className="kbd">{k}</span><span style={{color:'var(--gray-200)'}}>{d}</span>
              </div>
            ))}
            <div style={{marginTop:12,fontSize:10,color:'var(--gray-600)'}}>Click anywhere to close</div>
          </div>
        </div>
      )}
      <ChatPanel
        open={chatOpen} onClose={()=>setChatOpen(false)}
        data={data}
        messages={messages} setMessages={setMessages}
        queryMode={queryMode} setQueryMode={setQueryMode}
        searchQuery={searchQuery} setSearchQuery={setSearchQuery}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
