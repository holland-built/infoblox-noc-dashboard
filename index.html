// Overflow menu for low-frequency / set-once actions (also reachable via ⌘K / ? key).
function AckMenu({id, onAck}) {
  const [open, setOpen] = React.useState(false);
  const [custom, setCustom] = React.useState('');
  const opts = [{label:'1h', ms:3600*1000},{label:'4h', ms:4*3600*1000},{label:'8h', ms:8*3600*1000},{label:'Mute', ms:30*24*3600*1000}];
  const applyCustom = () => {
    const h = parseFloat(custom);
    if(!h||h<=0) return;
    setOpen(false); setCustom('');
    onAck(id, h*3600*1000);
  };
  return (
    <span style={{position:'relative',display:'inline-flex'}}>
      <button className="n-btn" onClick={()=>setOpen(o=>!o)}>Ack ▾</button>
      {open&&(<>
        <div className="col-overlay" onClick={()=>setOpen(false)}/>
        <div className="col-menu" style={{minWidth:120,top:'100%',right:0,left:'auto'}} role="menu">
          {opts.map(o=>(
            <div key={o.label} className="col-row" style={{cursor:'pointer'}} role="menuitem" tabIndex={0}
              onKeyDown={e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();e.currentTarget.click();}}}
              onClick={()=>{setOpen(false);onAck(id,o.ms);}}>
              <span className="col-lbl">{o.label}</span>
            </div>
          ))}
          <div className="col-row" style={{cursor:'pointer'}} role="menuitem" tabIndex={0}
            onKeyDown={e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();e.currentTarget.click();}}}
            onClick={()=>{setOpen(false);onAck(id,0);}}>
            <span className="col-lbl" style={{color:'var(--gray-400)'}}>Clear</span>
          </div>
          <div className="col-row" style={{gap:4,padding:'6px 8px'}}>
            <input type="number" aria-label="Custom snooze duration in hours" min="0.25" step="0.25" placeholder="hrs"
              value={custom} onChange={e=>setCustom(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter')applyCustom();e.stopPropagation();}}
              style={{width:52,background:'var(--surface-2)',border:'1px solid var(--border)',borderRadius:4,color:'var(--gray-200)',padding:'3px 5px',fontSize:11}}/>
            <button className="col-reset" onClick={applyCustom}>OK</button>
          </div>
        </div>
      </>)}
    </span>
  );
}

function AcctPill({accounts=[], activeAcct, switchAcct, switchingAcct, vault={}, onManageKeys, acctSearch='', setAcctSearch}) {
  const [open, setOpen] = React.useState(false);
  const [switchingKey, setSwitchingKey] = React.useState(null);
  const [adding, setAdding] = React.useState(false);
  if (!accounts.length || (vault.vaultMode && !vault.unlocked)) return null;
  const active = accounts.find(a => a.id === activeAcct) || {};
  const allTenants = vault.vaultMode ? (vault.tenants || []) : [];
  // Build unified flat list: each account, cross-ref with stored keys by name
  const unified = accounts.map(a => {
    const t = allTenants.find(t => t.label === a.name);
    return { name: a.name, accountId: a.id, tenantId: t ? t.id : null, hasKey: !!t, isActive: a.id === activeAcct };
  }).sort((x,y) => (y.isActive - x.isActive) || (y.hasKey - x.hasKey) || x.name.localeCompare(y.name));
  const filtered = acctSearch ? unified.filter(u => u.name.toLowerCase().includes(acctSearch.toLowerCase())) : unified;
  const showSearch = unified.length > 6;
  const hasNoKey = filtered.some(u => !u.hasKey);
  const hasWithKey = filtered.some(u => u.hasKey);
  const close = () => { setOpen(false); setAcctSearch && setAcctSearch(''); };
  const switchKey = async id => {
    setSwitchingKey(id);
    const {ok, data} = await vpost('/api/vault/active', {id});
    if (!ok || !data.ok) { setSwitchingKey(null); toast('Switch failed: ' + ((data && data.error) || 'unknown'), 'err'); return; }
    toast('Switching account…', 'ok');
    window.location.reload();
  };
  const handleSwitchAcct = id => { close(); switchAcct && switchAcct(id); };
  const handleManageKeys = () => { close(); onManageKeys && onManageKeys(); };
  const keyedStyle = {borderLeft:'2px solid var(--teal)',paddingLeft:'8px',borderRadius:'0 4px 4px 0'};
  const grayStyle  = {borderLeft:'2px solid var(--border)',paddingLeft:'8px',borderRadius:'0 4px 4px 0',color:'var(--gray-500)',cursor:'default'};
  return (
    <div style={{position:'relative',flexShrink:0}}>
      {adding && <VaultAddTenant onDone={()=>{setAdding(false);setOpen(false);window.location.reload();}} onCancel={()=>setAdding(false)}/>}
      <button className="acct-pill" disabled={!!switchingAcct || !!switchingKey} onClick={() => open ? close() : setOpen(true)}>
        <span className="acct-pill-cap">Account</span>
        <span className="acct-pill-name">{active.name || '—'}</span>
      </button>
      {open && (<>
        <div className="acct-overlay" onClick={close}/>
        <div className="acct-menu down">
          {showSearch && (
            <input className="acct-search" aria-label="Search accounts" autoFocus placeholder="Search accounts…"
              value={acctSearch} onChange={e => setAcctSearch && setAcctSearch(e.target.value)}/>
          )}
          <div style={{maxHeight:280,overflowY:'auto'}}>
            {filtered.filter(u => u.hasKey).map(u => (
              <button key={u.accountId} style={keyedStyle}
                className={`acct-menu-item${u.isActive ? ' active' : ''}`}
                disabled={u.isActive || !!switchingKey}
                onClick={() => u.isActive ? undefined : (u.tenantId && u.tenantId !== vault.active ? switchKey(u.tenantId) : handleSwitchAcct(u.accountId))}>
                {u.isActive ? '● ' : (switchingKey === u.tenantId ? '⟳ ' : '○ ')}{u.name}
              </button>
            ))}
            {hasWithKey && hasNoKey && <div className="acct-sec-divider" style={{margin:'4px 10px'}}/>}
            {filtered.filter(u => !u.hasKey).map(u => (
              <div key={u.accountId} style={{display:'flex',alignItems:'center'}}>
                <button style={{...grayStyle,flex:1}} className="acct-menu-item" disabled>
                  {'○ '}{u.name}
                </button>
                {vault.vaultMode && <button style={{fontSize:'9px',padding:'1px 5px',marginRight:'6px',borderRadius:'3px',border:'1px solid var(--border)',background:'none',color:'var(--gray-400)',cursor:'pointer',flexShrink:0}}
                  onClick={e=>{e.stopPropagation();setAdding(true);}}>+ key</button>}
              </div>
            ))}
          </div>
          {vault.vaultMode && (<>
            <div className="acct-sec-divider"/>
            <button className="acct-menu-item" style={{color:'var(--gray-400)'}} onClick={handleManageKeys}>
              Manage keys ›
            </button>
          </>)}
        </div>
      </>)}
    </div>
  );
}

function PresetMenu({section, openProp, setOpenProp}) {
  const [views,setViews]=React.useState(()=>LS.get('noc.views',{}));
  const [_open,_setOpen]=React.useState(false);
  const open = openProp !== undefined ? openProp : _open;
  const setOpen = setOpenProp || _setOpen;
  const [saving,setSaving]=React.useState(false);
  const [nameVal,setNameVal]=React.useState('');
  const names=Object.keys(views);
  const commitSave=()=>{
    const name=nameVal.trim(); if(!name) return;
    const next={...views,[name]:{section,ls:snapshotViewLS()}}; setViews(next); LS.set('noc.views',next);
    setSaving(false); setNameVal('');
  };
  const cancelSave=()=>{ setSaving(false); setNameVal(''); };
  const apply=name=>{ const v=views[name]; if(!v) return; applyViewLS(v.ls); location.hash=v.section||section; location.reload(); };
  const del=name=>{ const next={...views}; delete next[name]; setViews(next); LS.set('noc.views',next); };
  return (
    <span style={{position:'static',display:'inline-flex'}}>
      {openProp===undefined&&<button className="theme-btn" style={{gap:5,fontSize:12.5}} title="Saved snapshots" aria-label="Saved snapshots" aria-expanded={open}
        data-tip="<b>Snapshots</b> — save &amp; restore the current filter + section state. Like bookmarks for dashboard views."
        onClick={()=>{ setOpen(o=>!o); setSaving(false); setNameVal(''); }}>★</button>}
      {open&&(<>
        <div className="col-overlay" onClick={()=>setOpen(false)}/>
        <div className="col-menu" style={{minWidth:210,top:'auto',bottom:'calc(100% + 4px)'}} role="menu">
          <div className="col-menu-head"><span className="col-menu-title">Saved snapshots</span>
            {!saving&&<button className="col-reset" onClick={()=>{ setSaving(true); setNameVal(''); }}>+ Save current</button>}
          </div>
          {saving&&(
            <div style={{padding:'6px 10px',display:'flex',gap:6,alignItems:'center'}}>
              <input autoFocus className="vault-in"
                style={{flex:1,fontSize:11,padding:'4px 8px',height:28}}
                placeholder="Snapshot name…"
                maxLength={50}
                value={nameVal}
                onChange={e=>setNameVal(e.target.value)}
                onKeyDown={e=>{ if(e.key==='Enter'){e.preventDefault();commitSave();} if(e.key==='Escape'){e.preventDefault();cancelSave();} }}
                aria-label="Snapshot name"/>
              <button className="col-reset" onClick={commitSave} disabled={!nameVal.trim()}>Save</button>
              <button className="col-iconbtn" onClick={cancelSave} aria-label="Cancel">✕</button>
            </div>
          )}
          {names.length===0
            ? <div className="col-row" style={{color:'var(--gray-400)'}}>No saved snapshots yet</div>

                <div key={n} className="col-row">
                  <button className="col-lbl" style={{background:'none',border:'none',color:'inherit',textAlign:'left',cursor:'pointer',font:'inherit',padding:0}} onClick={()=>apply(n)} title={`Apply "${n}"`}>{n}</button>
                  <button className="col-iconbtn" title="Delete snapshot" aria-label={`Delete ${n}`} onClick={()=>del(n)}>✕</button>
                </div>
              ))}
        </div>
      </>)}
    </span>
  );
}

/* ── command palette (⌘K / Ctrl-K) ── */
function CommandPalette({open, onClose, commands, data, onDrill}) {
  const [q,setQ]=React.useState('');
  const [sel,setSel]=React.useState(0);
  const inputRef=React.useRef(null);
  React.useEffect(()=>{ if(open){ setQ(''); setSel(0); setTimeout(()=>inputRef.current&&inputRef.current.focus(),0);} },[open]);
  if(!open) return null;
  const ql=q.toLowerCase().trim();
  const dataMatches = data && ql.length>=2 ? [
    ...(data.subnets||[]).filter(s=>[s.name,s.addr].some(v=>String(v||'').toLowerCase().includes(ql))).slice(0,6).map(s=>({id:'sub-'+s.id, icon:'◈', label:s.name&&s.name!==s.addr?s.name:s.addr+'/'+s.cidr, keywords:s.addr, hint:'Subnet', run:()=>onDrill&&onDrill({type:'subnet',data:s})})),
    ...(data.hosts||[]).filter(h=>[h.name,h.ip].some(v=>String(v||'').toLowerCase().includes(ql))).slice(0,6).map(h=>({id:'host-'+h.name, icon:'○', label:h.name||h.ip||'?', keywords:h.ip||'', hint:'Host', run:()=>onDrill&&onDrill({type:'host',data:h})})),
    ...(data.zones||[]).filter(z=>String(z.fqdn||'').toLowerCase().includes(ql)).slice(0,4).map(z=>({id:'zone-'+z.id, icon:'⊛', label:z.fqdn, keywords:z.fqdn, hint:'Zone', run:()=>onDrill&&onDrill({type:'zone',data:z})})),
  ] : [];
  const filtered=[...dataMatches, ...commands.filter(c=>!ql||c.label.toLowerCase().includes(ql)||(c.keywords||'').toLowerCase().includes(ql))];
  const run=c=>{ if(!c) return; onClose(); c.run(); };
  const onKey=e=>{
    if(e.key==='ArrowDown'){e.preventDefault();setSel(s=>Math.min(s+1,filtered.length-1));}
    else if(e.key==='ArrowUp'){e.preventDefault();setSel(s=>Math.max(s-1,0));}
    else if(e.key==='Enter'){e.preventDefault();run(filtered[sel]);}
    else if(e.key==='Escape'){e.preventDefault();onClose();}
  };
  return (
    <div className="cmdk-overlay" onClick={onClose}>
      <div className="cmdk-box" role="dialog" aria-modal="true" aria-label="Command palette" onClick={e=>e.stopPropagation()}>
        <input ref={inputRef} className="cmdk-input" placeholder="Jump to a section or run a command…"
          value={q} onChange={e=>{setQ(e.target.value);setSel(0);}} onKeyDown={onKey} aria-label="Command palette"/>
        <div className="cmdk-list">
          {filtered.length===0
            ? <div className="cmdk-empty">No matches for "{q}"</div>
            : filtered.map((c,i)=>(
                <div key={c.id} className={`cmdk-item${i===sel?' sel':''}`} onMouseEnter={()=>setSel(i)} onClick={()=>run(c)} role="option" aria-selected={i===sel}>
                  <span className="cmdk-icon">{NAV_ICONS[c.icon]?<NavIcon id={c.icon} size={13}/>:(c.icon||'▸')}</span>{c.label}{c.hint&&<span className="cmdk-hint">{c.hint}</span>}
                </div>
              ))}
        </div>
        <div className="cmdk-foot"><span>↑↓ navigate</span><span>↵ select</span><span>esc close</span></div>
      </div>
    </div>
  );
}

/* ── toasts (decoupled event bus) ── */
function toast(msg, kind='info'){ try{ window.dispatchEvent(new CustomEvent('noc-toast',{detail:{id:Date.now()+Math.random(),msg,kind}})); }catch(e){} }
function Toasts(){
  const [items,setItems]=React.useState([]);
  React.useEffect(()=>{
    const on=e=>{ const t=e.detail; setItems(x=>[...x,t]); setTimeout(()=>setItems(x=>x.filter(i=>i.id!==t.id)),4500); };
    window.addEventListener('noc-toast',on); return ()=>window.removeEventListener('noc-toast',on);
  },[]);
  if(!items.length) return null;
  return (
    <div className="toasts" aria-live="polite">
      {items.map(t=>(
        <div key={t.id} className={`toast ${t.kind||''}`}>
          <span className="toast-dot"/><span className="sr-only">{t.kind==='ok'?'OK':t.kind==='err'?'Error':t.kind==='warn'?'Warning':'Info'}</span><span>{t.msg}</span>
          <button className="toast-close" aria-label="Dismiss notification" onClick={()=>setItems(x=>x.filter(i=>i.id!==t.id))}>×</button>
        </div>
      ))}
    </div>
  );
}

let _lgSeq = 0;
function MiniLineChart({data, valueKey, labelKey, color='var(--teal)', height=90}) {
  const gid = React.useMemo(()=>'lg'+(++_lgSeq),[]);
  const [tip,setTip] = useState(null);
  if(!data||!data.length) return <div className="no-data">No data</div>;
  const vals = data.map(d=>Number(d[valueKey])||0);
  const max = Math.max(...vals,1);
  const W=420, H=height, pad=8;
  const pts = vals.map((v,i)=>({
    x: pad + i*(W-2*pad)/(vals.length-1||1),
    y: H - pad - (v/max)*(H-2*pad)
  }));
  const line = pts.map((p,i)=>`${i?'L':'M'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const area = line + ` L${pts[pts.length-1].x.toFixed(1)},${H} L${pts[0].x.toFixed(1)},${H} Z`;
  const labels = data.map(d=>(d[labelKey]||'').toString().slice(0,10));
  return (
    <div style={{position:'relative'}}>
      <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{display:'block'}} role="img" aria-label={`Trend chart over ${data.length} data points`}>
        <defs>
          <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.25"/>
            <stop offset="100%" stopColor={color} stopOpacity="0.02"/>
          </linearGradient>
        </defs>
        <path d={area} fill={`url(#${gid})`}/>
        <path d={line} fill="none" stroke={color} strokeWidth="1.8"/>
        {pts.map((p,i)=>(
          <circle key={i} cx={p.x} cy={p.y} r={tip===i?5:3} fill={color}
            style={{cursor:'pointer'}} onMouseEnter={()=>setTip(i)} onMouseLeave={()=>setTip(null)}/>
        ))}
        {tip!=null&&(
          <g>
            <rect x={Math.min(pts[tip].x-38,W-80)} y={pts[tip].y-30} width={78} height={24} rx={4}
              fill="var(--blue-mid)" stroke="var(--border)" strokeWidth={1}/>
            <text x={Math.min(pts[tip].x-38,W-80)+39} y={pts[tip].y-14} textAnchor="middle"
              fill={color} fontSize={10} fontWeight={700}>{vals[tip].toLocaleString()}</text>
          </g>
        )}
      </svg>
      <div style={{display:'flex',justifyContent:'space-between',marginTop:2}}>
        {labels.map((l,i)=>i===0||i===labels.length-1||i===Math.floor(labels.length/2)?(
          <span key={i} style={{fontSize:9,color:'var(--gray-400)'}}>{l.slice(5)}</span>
        ):null)}
      </div>
    </div>
  );
}

/* Generic horizontal-bar chart over arbitrary {label,value} rows — pure SVG */
function VizBars({rows, color='var(--teal)'}) {
  const data=rows.filter(r=>Number(r.value)>0).slice(0,12);
  const [tip,setTip]=useState(null);
  if(!data.length) return <div className="no-data">No numeric data to chart</div>;
  const max=Math.max(...data.map(r=>Number(r.value)||0),1);
  const W=420,lw=120,rpad=50,bh=16,gap=8;
  const chartW=W-lw-rpad;
  const H=data.length*(bh+gap)+2;
  return (
    <div style={{position:'relative'}}>
      <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{display:'block'}} role="img" aria-label={`Bar chart: ${data.map(r=>`${r.label} ${(Number(r.value)||0).toLocaleString()}`).join(', ')}`}>
        {data.map((r,i)=>{
          const y=i*(bh+gap);
          const v=Number(r.value)||0;
          const bw=Math.max(2,v/max*chartW);
          const col=r.color||color;
          const label=(r.label||'').length>17?(r.label).slice(0,16)+'…':r.label;
          return (
            <g key={i} onMouseEnter={()=>setTip(r)} onMouseLeave={()=>setTip(null)}>
              <text x={lw-6} y={y+bh/2} fill="var(--gray-200)" fontSize={10} textAnchor="end" dominantBaseline="central">{label}</text>
              <rect x={lw} y={y} width={chartW} height={bh} fill="var(--svg-track)" rx={3}/>
              <rect x={lw} y={y} width={bw} height={bh} fill={col} rx={3}/>
              <text x={lw+bw+5} y={y+bh/2} fill={col} fontSize={10} dominantBaseline="central" fontWeight={700}>{v.toLocaleString()}</text>
            </g>
          );
        })}
      </svg>
      {tip&&(
        <div style={{position:'absolute',top:0,right:0,background:'var(--blue-mid)',border:'1px solid var(--border)',borderRadius:6,padding:'6px 10px',fontSize:11,pointerEvents:'none',zIndex:10}}>
          <div style={{color:'var(--teal)',fontWeight:700}}>{tip.label}</div>
          <div style={{color:'var(--gray-200)'}}>{(Number(tip.value)||0).toLocaleString()}</div>
        </div>
      )}
    </div>
  );
}

function WidgetVizTable({data, columns, defaultRows, persistId}) {

/* Reusable per-widget renderer. `viz` ∈ table|bar|line|raw.
   `columns`: [{key,label}] for the table. `labelKey`/`valueKey`: which fields
   drive bar/line. `rowColor(row)` optional per-bar color. */
function WidgetViz({data=[], viz='table', columns=[], labelKey, valueKey, rowColor, color='var(--teal)', defaultRows=10, persistId}) {
  if(!data.length) return <div className="no-data">No data</div>;

  if(viz==='raw')
    return <pre style={{maxHeight:420,overflow:'auto',fontSize:10,lineHeight:1.5,color:'var(--gray-200)',background:'var(--surface-2)',border:'1px solid var(--border)',borderRadius:6,padding:'10px 12px',whiteSpace:'pre-wrap',wordBreak:'break-word'}}>{JSON.stringify(data,null,2)}</pre>;

  if(viz==='bar'||viz==='line') {
    const lk=labelKey||(columns[0]&&columns[0].key);
    const vk=valueKey||(columns.find(c=>data.some(r=>typeof r[c.key]==='number'))||{}).key||(columns[1]&&columns[1].key);
    if(!vk) return <div className="no-data">No numeric column to chart</div>;
    if(viz==='line') {
      const ld=data.slice(0,40);
      return <MiniLineChart data={ld} valueKey={vk} labelKey={lk} color={color} height={120}/>;
    }
    const rows=[...data].sort((a,b)=>(Number(b[vk])||0)-(Number(a[vk])||0))
      .map(r=>({label:String(r[lk]??'—'),value:Number(r[vk])||0,color:rowColor?rowColor(r):null}));
    return <VizBars rows={rows} color={color}/>;
  }

  if(viz==='heatmap'){
    const lk=labelKey||(columns[0]&&columns[0].key);
    const vk=valueKey||(columns.find(c=>data.some(r=>typeof r[c.key]==='number'))||{}).key||(columns[1]&&columns[1].key);
    const sevClr=v=>v>=90?'var(--red)':v>=75?'var(--amber)':v>=50?'var(--green)':'var(--surface-3)';
    return (
      <div style={{display:'flex',flexWrap:'wrap',gap:3,padding:'4px 0'}}>
        {[...data].sort((a,b)=>(Number(b[vk])||0)-(Number(a[vk])||0)).map((r,i)=>{
          const val=Number(r[vk])||0;
          const lbl=String(r[lk]??'—');
          return (
            <div key={i} title={`${lbl}: ${val}`}
              style={{width:52,height:28,borderRadius:3,background:sevClr(val),display:'flex',flexDirection:'column',
                alignItems:'center',justifyContent:'center',cursor:'pointer',overflow:'hidden',
                border:'1px solid rgba(0,0,0,.2)',transition:'opacity .1s'}}
              onMouseEnter={e=>e.currentTarget.style.opacity='.7'}
              onMouseLeave={e=>e.currentTarget.style.opacity='1'}>
              <span style={{fontSize:9,fontFamily:'var(--font-mono)',color:'rgba(0,0,0,.8)',fontWeight:700,lineHeight:1}}>{val}%</span>
              <span style={{fontSize:7,color:'rgba(0,0,0,.6)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:48,lineHeight:1.2,padding:'0 2px'}}>{lbl}</span>
            </div>
          );
        })}
      </div>
    );
  }

  if(viz==='pie') {
    const lk=labelKey||(columns[0]&&columns[0].key);
    const vk=valueKey||(columns.find(c=>data.some(r=>typeof r[c.key]==='number'))||{}).key||(columns[1]&&columns[1].key);
    if(!vk) return <div className="no-data">No numeric column to chart</div>;
    const pieCols=['var(--teal)','var(--amber)','var(--green)','var(--red)','var(--gray-400)'];
    const sorted=[...data].filter(r=>Number(r[vk])>0).sort((a,b)=>Number(b[vk])-Number(a[vk])).slice(0,8);
    const total=sorted.reduce((s,r)=>s+Number(r[vk]),0)||1;
    const R=52, ri=28, cx=64, cy=64;
    let ang=-Math.PI/2;
    const slices=sorted.map((r,i)=>{
      const sweep=(Number(r[vk])/total)*Math.PI*2;
      const x1=cx+R*Math.cos(ang), y1=cy+R*Math.sin(ang);
      ang+=sweep;
      const x2=cx+R*Math.cos(ang), y2=cy+R*Math.sin(ang);
      const large=sweep>Math.PI?1:0;
      return {r, i, x1,y1,x2,y2,large,color:pieCols[i%pieCols.length],val:Number(r[vk]),label:String(r[lk]??'—')};
    });
    return (
      <div style={{display:'flex',alignItems:'center',gap:16,padding:'4px 0'}}>
        <svg width={128} height={128} viewBox="0 0 128 128" aria-hidden="true" style={{flexShrink:0}}>
          {slices.map((s,i)=>(
            <path key={i} d={`M ${cx} ${cy} L ${s.x1} ${s.y1} A ${R} ${R} 0 ${s.large} 1 ${s.x2} ${s.y2} Z`}
              fill={s.color} opacity={0.85}/>
          ))}
          <circle cx={cx} cy={cy} r={ri} fill="var(--surface)"/>
          <text x={cx} y={cy+1} textAnchor="middle" dominantBaseline="middle" fontSize={9} fill="var(--muted)" fontFamily="var(--font-mono)">{sorted.length} items</text>
        </svg>
        <div style={{display:'flex',flexDirection:'column',gap:4}}>
          {slices.map((s,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:6,fontSize:11}}>
              <div style={{width:8,height:8,borderRadius:2,background:s.color,flexShrink:0}}/>
              <span style={{fontFamily:'var(--font-mono)',color:'var(--ink)',minWidth:60,maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={s.label}>{s.label}</span>
              <span style={{color:'var(--muted)'}}>{Math.round(s.val/total*100)}%</span>
            </div>
          ))}
        </div>
      </div>
    );
  }

  /* table (default) */
  const cols=columns.length?columns:Object.keys(data[0]).slice(0,5).map(k=>({key:k,label:k}));
  if(persistId) return <WidgetVizTable data={data} columns={cols} defaultRows={defaultRows} persistId={persistId}/>;
  return (
    <ShowMoreTable rows={data} defaultRows={defaultRows}
      tableHead={<thead><tr>{cols.map(c=><th key={c.key} title={c.label}>{c.label}</th>)}</tr></thead>}>
      {visible=>visible.map((r,i)=>(
        <tr key={r.id||i}>
          {cols.map(c=>{
            const v=r[c.key];
            return <td key={c.key} style={{fontSize:11,...(typeof v==='number'?{fontFamily:'monospace'}:{})}}>
              {c.render?c.render(r):(typeof v==='number'?v.toLocaleString():(v==null?'—':String(v)))}
            </td>;
          })}
        </tr>
      ))}
    </ShowMoreTable>
  );
}

function QueryTypeChart({queryTypes}){
  if(!queryTypes||queryTypes.length===0) return null;
  const NDA='NstarDnsActivity.';
  const items=queryTypes.map(r=>({
    type:r[NDA+'query_type']||'?',
    cnt:Number(r[NDA+'total_query_count'])||0,
  })).filter(r=>r.cnt>0);
  if(!items.length) return null;
  const total=items.reduce((a,r)=>a+r.cnt,0);
  const COLORS=['var(--teal)','var(--amber)','var(--green)','var(--red)','var(--gray-400)','var(--teal-bright)'];
  const R=52, r=28, cx=64, cy=64;
  let angle=-Math.PI/2;
  const slices=items.map((it,i)=>{
    const sweep=total>0?(it.cnt/total)*Math.PI*2:0;
    const x1=cx+R*Math.cos(angle), y1=cy+R*Math.sin(angle);
    angle+=sweep;
    const x2=cx+R*Math.cos(angle), y2=cy+R*Math.sin(angle);
    const large=sweep>Math.PI?1:0;
    const xi=cx+r*Math.cos(angle-sweep/2), yi=cy+r*Math.sin(angle-sweep/2);
    const xo=cx+R*Math.cos(angle-sweep/2), yo=cy+R*Math.sin(angle-sweep/2);
    return {it, i, x1,y1,x2,y2,large,xi,yi,xo,yo,sweep,color:COLORS[i%COLORS.length]};
  });
  return (
    <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:8}}>
      <svg width={128} height={128} viewBox="0 0 128 128" aria-hidden="true">
        {slices.map((s,i)=>(
          <path key={i} d={`M ${cx} ${cy} L ${s.x1} ${s.y1} A ${R} ${R} 0 ${s.large} 1 ${s.x2} ${s.y2} Z`}
            fill={s.color} opacity={0.85}/>
        ))}
        <circle cx={cx} cy={cy} r={r} fill="var(--surface)"/>
        <text x={cx} y={cy+1} textAnchor="middle" dominantBaseline="middle" fontSize={9} fill="var(--muted)" fontFamily="var(--font-mono)">{items.length} types</text>
      </svg>
      <div style={{display:'flex',flexDirection:'column',gap:4}}>
        {slices.map((s,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:6,fontSize:11}}>
            <div style={{width:8,height:8,borderRadius:2,background:s.color,flexShrink:0}}/>
            <span style={{fontFamily:'var(--font-mono)',color:'var(--ink)',minWidth:36}}>{s.it.type}</span>
            <span style={{color:'var(--muted)'}}>{total>0?Math.round(s.it.cnt/total*100):0}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}

const NDA='NstarDnsActivity.';
function DnsAnalyticsPanel({data, rowLimit, setRowLimit, cutoffMs=0}) {
  const [cf,setCf]=useState('');
  const [topN,setTopN]=React.useState(10);
  const linReg=pts=>{const n=pts.length;if(n<2)return{m:0,b:pts[0]||0};const mx=pts.reduce((a,_,i)=>a+i,0)/n,my=pts.reduce((a,v)=>a+v,0)/n;const num=pts.reduce((a,v,i)=>a+(i-mx)*(v-my),0);const den=pts.reduce((a,_,i)=>a+(i-mx)**2,0);const m=den?num/den:0;return{m,b:my-m*mx};};
  const spikes = React.useMemo(()=>{
    if(!data||!data.top_clients) return {};
    const cur={};
    data.top_clients.forEach(r=>{const ip=r[NDA+'device_ip'];if(ip)cur[ip]=Number(r[NDA+'total_query_count'])||0;});
    let snaps=LS.get('noc.dnsSnapshots',[]);
    const today=new Date().toISOString().slice(0,10);
    const last=snaps[snaps.length-1];
    if(!last||last.ts!==today){
      snaps=[...snaps,{ts:today,clients:cur}].slice(-7);
      LS.set('noc.dnsSnapshots',snaps);
    }
    const hist=snaps.slice(0,-1);
    const out={};
    Object.keys(cur).forEach(ip=>{
      const vals=hist.map(s=>s.clients[ip]).filter(v=>v!=null);
      if(vals.length>=2){const avg=vals.reduce((a,b)=>a+b,0)/vals.length;if(avg>0&&cur[ip]>3*avg)out[ip]={avg:Math.round(avg),series:[...vals,cur[ip]]};}
    });
    return out;
  },[data]);
  const sparkPath=series=>{const mx=Math.max(...series,1),n=series.length;return series.map((v,i)=>`${(i/(n-1||1)*36).toFixed(1)},${(14-v/mx*12).toFixed(1)}`).join(' ');};
  const clientCtl=useColumns('dns-clients',[
    {key:'device',label:'Device',fixed:true,sortVal:r=>r[NDA+'device_name']||'',csv:r=>r[NDA+'device_name']||'',render:r=>{const sp=spikes[r[NDA+'device_ip']];return <span style={{fontWeight:500,display:'inline-flex',alignItems:'center',gap:6}}>{r[NDA+'device_name']||'—'}{sp&&<span className="badge b-amber" title={`Query spike vs ${sp.avg}/day avg`}>▲ spike</span>}{sp&&<svg width="38" height="14" style={{flexShrink:0}}><polyline points={sparkPath(sp.series)} fill="none" stroke="var(--sev-amber-t)" strokeWidth="1.2"/></svg>}</span>;}},
    {key:'ip',label:'IP',mono:true,size:10,sortVal:r=>r[NDA+'device_ip']||'',csv:r=>r[NDA+'device_ip']||'',render:r=><span style={{color:'var(--gray-400)'}}>{r[NDA+'device_ip']||'—'}</span>},
    {key:'queries',label:'Queries',mono:true,size:11,sortVal:r=>Number(r[NDA+'total_query_count'])||0,csv:r=>Number(r[NDA+'total_query_count'])||0,render:r=>(Number(r[NDA+'total_query_count'])||0).toLocaleString()},
    {key:'share',label:'Share',sortVal:r=>Number(r[NDA+'total_query_count'])||0,csv:r=>{const c=Number(r[NDA+'total_query_count'])||0;const t=(data&&(data.top_clients||[]).reduce((a,x)=>a+(Number(x[NDA+'total_query_count'])||0),0))||0;return (t>0?Math.round(c/t*100):0)+'%';},render:r=>{const c=Number(r[NDA+'total_query_count'])||0;const t=(data&&(data.top_clients||[]).reduce((a,x)=>a+(Number(x[NDA+'total_query_count'])||0),0))||0;const pct=t>0?Math.round(c/t*100):0;return <div style={{display:'flex',alignItems:'center',gap:6}}><div className="bar-track"><div className="bar-fill" style={{width:`${pct}%`,background:'var(--teal)'}}/></div><span style={{fontSize:10,color:'var(--gray-400)',fontVariantNumeric:'tabular-nums'}}>{pct}%</span></div>;}},
  ]);
  if(!data) return <SkeletonTable/>;
  const {volume=[],top_clients=[],query_types=[]} = data;
  const filtVolume = cutoffMs>0 ? volume.filter(r=>{const ts=r['NstarDnsActivity.timestamp']||r.timestamp||'';const ms=new Date(ts).getTime();return isNaN(ms)||ms>=cutoffMs;}) : volume;
  const total = top_clients.reduce((a,r)=>a+(Number(r['NstarDnsActivity.total_query_count'])||0),0);
  const fclients = cf ? top_clients.filter(r=>[r['NstarDnsActivity.device_name'],r['NstarDnsActivity.device_ip']].some(v=>String(v||'').toLowerCase().includes(cf.toLowerCase()))) : top_clients;
  return (
    <>
      <div className="g3 mb20">
        {[
          {v:(top_clients.reduce((a,r)=>a+(Number(r['NstarDnsActivity.total_query_count'])||0),0)).toLocaleString(), l:'Total Queries (7d)', c:'var(--teal)'},
          {v:top_clients.length, l:'Unique Clients', c:'var(--gray-200)'},
          {v:query_types.length, l:'Query Types', c:'var(--amber)'},
        ].map((x,i)=>(
          <div key={i} className="card" style={{textAlign:'center'}}>
            <div style={{fontSize:26,fontWeight:800,color:x.c,fontFamily:'var(--font-mono)'}}>{x.v}</div>
            <div style={{fontSize:10,color:'var(--gray-400)',marginTop:4,textTransform:'uppercase',letterSpacing:'.1em'}}>{x.l}</div>
          </div>
        ))}
      </div>
      <div className="g2 mb20">
        <div className="card">
          <div className="card-title"><div className="dot"/>Query Volume — Last 7 Days</div>
          {(()=>{
            if(!filtVolume||!filtVolume.length) return <div className="no-data">No data</div>;
            const vk='NstarDnsActivity.total_query_count';
            const lk='NstarDnsActivity.timestamp';
            const vals=filtVolume.map(d=>Number(d[vk])||0);
            const maxV=Math.max(...vals,1);
            const W=420,H=100,pad=8;
            const pts=vals.map((v,i)=>({x:pad+i*(W-2*pad)/(vals.length-1||1),y:H-pad-(v/maxV)*(H-2*pad)}));
            const line=pts.map((p,i)=>`${i?'L':'M'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
            const area=line+` L${pts[pts.length-1].x.toFixed(1)},${H} L${pts[0].x.toFixed(1)},${H} Z`;
            const labels=filtVolume.map(d=>(d[lk]||'').toString().slice(0,10));
            const fVals=filtVolume.slice(-6).map(r=>Number(r[vk])||0);
            const forecastEl=(()=>{
              if(fVals.length<3) return null;
              const {m,b}=linReg(fVals);
              const totalPts=filtVolume.length+3;
              const sx=i=>pad+i*(W-2*pad)/(totalPts-1||1);
              const sy=v=>H-pad-(Math.max(0,v)/maxV)*(H-2*pad);
              const forecastPts=[0,1,2].map(d=>{const i=filtVolume.length+d;return `${sx(i).toFixed(1)},${sy(m*i+b).toFixed(1)}`;});
              const bandTop=[0,1,2].map(d=>{const i=filtVolume.length+d;return `${sx(i).toFixed(1)},${sy((m*i+b)*1.15).toFixed(1)}`;});
              const bandBot=[2,1,0].map(d=>{const i=filtVolume.length+d;return `${sx(i).toFixed(1)},${sy((m*i+b)*0.85).toFixed(1)}`;});
              return (<>
                <polygon points={[...bandTop,...bandBot].join(' ')} fill="var(--amber)" opacity="0.12"/>
                <polyline points={forecastPts.join(' ')} fill="none" stroke="var(--amber)" strokeWidth="1.5" strokeDasharray="3,2" opacity="0.7"/>
              </>);
            })();
            return (<div style={{position:'relative'}}>
              <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{display:'block'}} role="img" aria-label={`DNS volume trend over ${filtVolume.length} data points`}>
                <path d={area} fill="var(--teal)" opacity="0.12"/>
                <path d={line} fill="none" stroke="var(--teal)" strokeWidth="1.8"/>
                {forecastEl}
              </svg>
              <div style={{display:'flex',justifyContent:'space-between',marginTop:2}}>
                {labels.map((l,i)=>i===0||i===labels.length-1||i===Math.floor(labels.length/2)?(<span key={i} style={{fontSize:9,color:'var(--gray-400)'}}>{l.slice(5)}</span>):null)}
              </div>
            </div>);
          })()}
        </div>
        <div className="card">
          <div className="card-title"><div className="dot"/>Query Types</div>
          {query_types.length===0?<div className="no-data">No data</div>:(
            <div style={{marginTop:4}}>
              <QueryTypeChart queryTypes={query_types}/>
              {query_types.map((r,i)=>{
                const cnt=Number(r['NstarDnsActivity.total_query_count'])||0;
                const pct=total>0?Math.round(cnt/total*100):0;
                const type=r['NstarDnsActivity.query_type']||'?';
                return (
                  <div key={i} style={{display:'flex',alignItems:'center',gap:8,marginBottom:7}}>
                    <span style={{fontSize:11,width:40,color:'var(--gray-200)',fontFamily:'var(--font-mono)'}}>{type}</span>
                    <div style={{flex:1,height:6,background:'var(--surface-3)',borderRadius:3}}>
                      <div style={{width:`${pct}%`,height:'100%',background:'var(--teal)',borderRadius:3}}/>
                    </div>
                    <span style={{fontSize:10,color:'var(--gray-400)',width:48,textAlign:'right'}}>{cnt.toLocaleString()}</span>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
      <div className="card">
        <div className="card-title" style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
          <div className="dot"/>Top DNS Clients — Last 7 Days
          <select aria-label="Number of top DNS clients to show" value={topN} onChange={e=>setTopN(e.target.value==='all'?'all':Number(e.target.value))}
            style={{fontSize:10,background:'var(--surface-2)',color:'var(--ink)',border:'1px solid var(--border)',borderRadius:3,padding:'1px 4px',fontFamily:'var(--font-mono)',marginLeft:4}}>
            {[5,10,25,'all'].map(n=><option key={n} value={n}>Top {n==='all'?'All':n}</option>)}
          </select>
        </div>
        <div style={{display:'flex',gap:10,alignItems:'center',marginBottom:8,flexWrap:'wrap'}}>
          <input className="global-search" aria-label="Filter by device or IP" style={{width:220,maxWidth:'100%'}} placeholder="Filter by device or IP…"
            value={cf} onChange={e=>setCf(e.target.value)}/>
          {cf&&<span style={{fontSize:10,color:'var(--gray-400)'}}>{fclients.length} of {top_clients.length}</span>}
          <div style={{marginLeft:'auto'}}><RowLimitBar limit={rowLimit} setLimit={setRowLimit}/></div>
        </div>
        {(()=>{const visClients=topN==='all'?fclients:fclients.slice(0,topN);return(
        <div className="scroll" style={{maxHeight:480}}>
          {visClients.length===0
            ? <div className="no-data" style={{padding:'24px 0'}}>No clients match "{cf}"</div>
            : <DataTable cols={clientCtl.allCols} ctl={clientCtl} rows={visClients}
                defaultRows={rowLimit} rowKey={r=>r[NDA+'device_ip']||r[NDA+'device_name']}
                initialSort={{key:'queries',dir:'desc'}} exportName="dns-top-clients" persistId="dns-clients"/>}
        </div>
        );})()}
      </div>
    </>
  );
}

const INS='InsightsSummaryView.';

    {key:'name',label:'Insight',fixed:true,render:r=><span title={r[INS+'name']||'—'}>{r[INS+'name']||'—'}</span>},
    {key:'severity',label:'Severity',sortVal:r=>levelOrder[(r[INS+'severity']||'').toLowerCase()]??9,render:r=>{const sev=(r[INS+'severity']||'').toLowerCase();return <span className={`badge ${levelBadge(sev)}`}>{sev||'—'}</span>;}},
    {key:'status',label:'Status',size:11,sortVal:r=>r[INS+'currentStatus']||'',render:r=><span style={{color:'var(--gray-400)'}}>{r[INS+'currentStatus']||'—'}</span>},
    {key:'events',label:'Events',mono:true,size:11,sortVal:r=>Number(r[INS+'totalEvents'])||0,render:r=>(Number(r[INS+'totalEvents'])||0).toLocaleString()},
    {key:'assets',label:'Assets',mono:true,size:11,sortVal:r=>Number(r[INS+'totalVerifiedAssets'])||0,render:r=>Number(r[INS+'totalVerifiedAssets'])||0},
    {key:'saved',label:'Time Saved',size:11,sortVal:r=>Number(r[INS+'timeSaved'])||0,render:r=>{const mins=Math.round((Number(r[INS+'timeSaved'])||0)/60);return <span style={{color:'var(--green)'}}>{mins>0?`${mins}m`:'—'}</span>;}},
  ]);
