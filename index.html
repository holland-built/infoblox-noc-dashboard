function SearchSection({data, srchQ, setSrchQ, srchRes, setSrchRes, srching, setSrching, searchHistory, setSearchHistory}) {
  const run = async (q) => {
    q = q.trim();
    if(!q) return;
    setSrchQ(q);  // ensure input is updated
    setSearchHistory(h=>{ const next=[q,...h.filter(x=>x!==q)].slice(0,5); LS.set('sh',next); return next; });
    setSrching(true);
    setSrchRes(null);

    /* ── local search (instant, no server) ── */
    const lq = q.toLowerCase();
    const local = {
      subnets:  (data?.subnets  ||[]).filter(s=>[s.name,s.addr,s.site].some(v=>(v||'').toLowerCase().includes(lq))),
      hosts:    (data?.hosts    ||[]).filter(h=>[h.name,h.ip,h.type,h.status].some(v=>(v||'').toLowerCase().includes(lq))),
      zones:    (data?.zones    ||[]).filter(z=>[z.fqdn,z.view].some(v=>(v||'').toLowerCase().includes(lq))),
      feeds:    (data?.feeds    ||[]).filter(f=>[f.name,f.cat,f.level].some(v=>(v||'').toLowerCase().includes(lq))),
      policies: (data?.secPolicies||[]).filter(p=>[p.name,p.action].some(v=>(v||'').toLowerCase().includes(lq))),
      leases:   (data?.leases   ||[]).filter(l=>[l.addr,l.host,l.subnet].some(v=>(v||'').toLowerCase().includes(lq))),
    };

    /* ── MCP entity search ── */
    let entities = [];
    try {
      const r = await fetch(`/api/threat-lookup?q=${encodeURIComponent(q)}`);
      if(r.ok) { const d = await r.json(); entities = d.entities||[]; }
    } catch {}

    setSrchRes({local, entities, q});
    setSrching(false);
  };

  const onKey = e => { if(e.key==='Enter') run(srchQ); };

  const totalLocal = srchRes ? Object.values(srchRes.local).reduce((a,v)=>a+v.length,0) : 0;

  return (
    <div>
      {searchHistory.length>0&&(
        <div style={{marginBottom:10}}>
          <div style={{fontSize:10,color:'var(--gray-400)',marginBottom:5}}>Recent searches:</div>
          <div className="chip-bar">
            {searchHistory.map((q,i)=>(
              <button key={i} className="chip" onClick={()=>run(q)}>{q}</button>
            ))}
            <button className="chip" style={{color:'var(--sev-red-t)'}} onClick={()=>{setSearchHistory([]); LS.set('sh',[]);}}>✕ clear</button>
          </div>
        </div>
      )}
      {/* Search input */}
      <div className="card mb20" style={{padding:'18px 20px'}}>
        <div style={{fontSize:13,fontWeight:700,color:'var(--teal)',marginBottom:12}}>Search your network</div>
        <div style={{display:'flex',gap:8}}>
          <input
            style={{flex:1,background:'var(--surface-2)',border:'1px solid var(--border)',borderRadius:7,
              color:'var(--ink)',fontSize:13,padding:'10px 14px',outline:'none',transition:'border-color .12s'}}
            placeholder="IP address, hostname, subnet, domain, zone…"
            value={srchQ} onChange={e=>setSrchQ(e.target.value)} onKeyDown={onKey}
            autoFocus
            onFocus={e=>e.target.style.borderColor='var(--focus-border)'}
            onBlur={e=>e.target.style.borderColor='var(--border)'}
          />
          <button
            onClick={()=>run(srchQ)}
            disabled={!srchQ.trim()||srching}
            style={{background:'var(--teal)',border:'none',borderRadius:7,color:'var(--blue-dark)',
              fontSize:13,fontWeight:700,padding:'10px 22px',cursor:'pointer',opacity:(!srchQ.trim()||srching)?0.4:1,
              transition:'opacity .15s',whiteSpace:'nowrap'}}>
            {srching ? '…' : 'Search'}
          </button>
        </div>
        <div style={{fontSize:10,color:'var(--gray-400)',marginTop:8}}>
          Searches loaded data instantly + queries network entities via MCP
        </div>
      </div>

      {/* Empty state */}
      {!srchRes&&!srching&&(
        <div className="no-data" style={{paddingTop:80}}>
          <div style={{fontSize:32,marginBottom:12,opacity:.3}}>⊕</div>
          <div style={{color:'var(--gray-400)',fontSize:13}}>Enter a search term and press Search or Enter</div>
          <div style={{color:'var(--gray-400)',fontSize:11,marginTop:6}}>Searches subnets, hosts, zones, feeds, policies, leases, and network entities</div>
        </div>
      )}

      {/* Loading */}
      {srching&&<div className="spinner"/>}

      {/* Results */}
      {srchRes&&!srching&&(
        <>
          <div style={{fontSize:11,color:'var(--gray-400)',marginBottom:14}}>
            Results for <b style={{color:'var(--teal)'}}>{srchRes.q}</b>
            {' — '}{totalLocal} local match{totalLocal!==1?'es':''}{srchRes.entities.length>0?`, ${srchRes.entities.length} network entit${srchRes.entities.length!==1?'ies':'y'}`:''}
          </div>

          {totalLocal===0&&srchRes.entities.length===0&&(
            <div className="no-data">No matches found for "{srchRes.q}"</div>
          )}

          {/* Local groups */}
          {[
            {key:'subnets',  label:'Subnets',         cols:['name','addr','cidr','util','site'], fmt:(s)=>`${s.name} — ${s.addr}/${s.cidr} (${s.util}%) ${s.site}`},
            {key:'hosts',    label:'Hosts',            cols:['name','ip','type','status'],        fmt:(h)=>`${h.name} — ${h.ip} [${h.type}] ${h.status}`},
            {key:'zones',    label:'DNS Zones',        cols:['fqdn','view'],                      fmt:(z)=>`${z.fqdn} (${z.view})`},
            {key:'leases',   label:'DHCP Leases',      cols:['addr','host','subnet','state'],     fmt:(l)=>`${l.addr} — ${l.host||'—'} (${l.state})`},
            {key:'feeds',    label:'Threat Feeds',     cols:['name','level','cat'],               fmt:(f)=>`${f.name} [${f.level}]`},
            {key:'policies', label:'Security Policies',cols:['name','action'],                    fmt:(p)=>`${p.name} — ${p.action}`},
          ].filter(g=>srchRes.local[g.key]?.length>0).map(g=>(
            <div key={g.key} className="card mb14">
              <div className="card-title">
                <div className="dot"/>
                {g.label}
                <span style={{marginLeft:6,background:'var(--surface-3)',borderRadius:4,padding:'1px 7px',fontSize:10,color:'var(--teal)',fontWeight:700}}>
                  {srchRes.local[g.key].length}
                </span>
                <button className="col-btn" style={{marginLeft:'auto'}} title="Export these matches as CSV"
                  onClick={()=>downloadCSV(`search-${g.key}.csv`, srchRes.local[g.key], g.cols.map(k=>({key:k,label:k})))}>CSV</button>
              </div>
              <div className="scroll" style={{maxHeight:220}}>
                <table className="tbl">
                  <tbody>
                    {srchRes.local[g.key].map((item,i)=>{
                      const txt=g.fmt(item);
                      const lo=txt.toLowerCase();
                      const qi=lo.indexOf(srchRes.q.toLowerCase());
                      return (
                        <tr key={i}>
                          <td style={{fontFamily:'monospace',fontSize:11}}>
                            {qi>=0
                              ?<>{txt.slice(0,qi)}<mark style={{background:'rgba(214,210,203,.25)',color:'var(--teal-bright)',borderRadius:2}}>{txt.slice(qi,qi+srchRes.q.length)}</mark>{txt.slice(qi+srchRes.q.length)}</>
                              :txt}
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          ))}

          {/* MCP Network Entities */}
          {srchRes.entities.length>0&&(
            <div className="card">
              <div className="card-title">
                <div className="dot" style={{background:'var(--green)'}}/>
                Network Entities
                <span style={{marginLeft:6,background:'var(--surface-3)',borderRadius:4,padding:'1px 7px',fontSize:10,color:'var(--green)',fontWeight:700}}>
                  {srchRes.entities.length}
                </span>
              </div>
              {srchRes.entities.map((e,i)=>{
                const name=e.name||e.object_information?.name||'—';
                const type=e.resource_name||e.resource||'—';
                const app=e.application_name||e.application||'';
                const ip=e.object_information?.['Host IP Address']||e.object_information?.['IP Address']||'';
                return (
                  <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 0',borderBottom:'1px solid var(--border)'}}>
                    <div>
                      <div style={{fontSize:12,fontWeight:600}}>{name}</div>
                      <div style={{fontSize:10,color:'var(--gray-400)',marginTop:2}}>{app}{ip&&` · ${ip}`}</div>
                    </div>
                    <span className="badge b-teal">{type}</span>
                  </div>
                );
              })}
            </div>
          )}
        </>
      )}
    </div>
  );
}

function ChatPanel({open, onClose, data, messages, setMessages, queryMode, setQueryMode, searchQuery, setSearchQuery}) {
  const [input, setInput] = useState('');
  const [thinking, setThinking] = useState(false);
  const [cmdHistory, setCmdHistory] = useState([]);
  const [histIdx, setHistIdx] = useState(-1);
  const endRef = useRef(null);
  useEffect(()=>{ if(endRef.current) endRef.current.scrollIntoView({behavior:'smooth'}); },[messages,thinking]);

  const fillAndSend = (q) => {
    setMessages(m=>[...m,{id:Date.now(),role:'u',content:q}]);
    setThinking(true);
    fetch('/api/query',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q})})
      .then(r=>r.ok?r.json():null)
      .then(json=>{
        const ans=(json&&typeof json.answer==='string')?json.answer:'! Query failed.';
        const sugs=(json&&Array.isArray(json.suggestions))?json.suggestions:[];
        const trace=(json&&Array.isArray(json.trace))?json.trace:[];
        setMessages(m=>[...m,{id:Date.now(),role:'a',content:ans,suggestions:sugs,trace}]);
        setThinking(false);
      })
      .catch(()=>{
        setMessages(m=>[...m,{id:Date.now(),role:'a',content:'! Server unavailable. Start with: python3 server.py'}]);
        setThinking(false);
      });
  };

  const send = async () => {
    const q = input.trim();
    if(!q) return;
    setInput('');
    setCmdHistory(h=>[q,...h.filter(x=>x!==q)].slice(0,50));
    setHistIdx(-1);
    if(queryMode==='filter') {
      setSearchQuery(q);
      setMessages(m=>[...m,
        {id:Date.now(),role:'u',content:q},
        {id:Date.now()+1,role:'a',content:`Filtering dashboard for "${q}" — matching results shown in each section.`}
      ]);
      return;
    }
    setMessages(m=>[...m,{id:Date.now(),role:'u',content:q}]);
    setThinking(true);
    try {
      const r = await fetch('/api/query', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({question: q}),
      });
      const json = r.ok ? await r.json() : null;
      const ans = (json && typeof json.answer === 'string') ? json.answer : '! Query failed — server returned an error. Check server logs.';
      const sugs = (json && Array.isArray(json.suggestions)) ? json.suggestions : [];
      const trace = (json && Array.isArray(json.trace)) ? json.trace : [];
      setMessages(m=>[...m,{id:Date.now(),role:'a',content:ans,suggestions:sugs,trace}]);
    } catch(e) {
      setMessages(m=>[...m,{id:Date.now(),role:'a',content:'! Server unavailable. Start with: python3 server.py'}]);
    }
    setThinking(false);
  };

  const onKey = e => {
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();return;}
    if(e.key==='ArrowUp'&&cmdHistory.length>0){
      e.preventDefault();
      const idx=Math.min(histIdx+1,cmdHistory.length-1);
      setHistIdx(idx);setInput(cmdHistory[idx]);
    }
    if(e.key==='ArrowDown'){
      e.preventDefault();
      const idx=histIdx-1;
      if(idx<0){setHistIdx(-1);setInput('');}
      else{setHistIdx(idx);setInput(cmdHistory[idx]);}
    }
  };

  return (
    <div className={`chat-panel${open?' open':''}`}>
      <div className="chat-head">
        <div>
          <div className="chat-head-title">⊕ Query Assistant</div>
          {searchQuery&&queryMode==='filter'&&(
            <div style={{fontSize:10,color:'var(--teal)',marginTop:2}}>
              Filter active: "{searchQuery}"
            </div>
          )}
        </div>
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          <button style={{background:'none',border:'1px solid var(--border)',borderRadius:5,color:'var(--gray-400)',cursor:'pointer',fontSize:10,fontWeight:600,padding:'3px 8px',letterSpacing:'.04em'}}
            onClick={()=>setMessages([{id:0,role:'a',content:'Cleared. Ask anything about your network.'}])}>Clear</button>
          <button className="close-btn" onClick={onClose} aria-label="Close query panel">✕</button>
        </div>
      </div>

      <div className="chat-msgs">
        {messages.map(m=>(
          <div key={m.id}>
            <div className={m.role==='u'?'msg-u':'msg-a'}>{m.content}</div>
            {m.role==='a'&&m.trace&&m.trace.length>0&&(
              <div className="trace-tl">
                <div className="trace-hd">Agent checked {m.trace.length} source{m.trace.length>1?'s':''}</div>
                {m.trace.map((t,i)=>{
                  const args=Object.values(t.args||{}).filter(v=>v!=null&&v!=='');
                  return (
                    <div key={i} className="trace-step">
                      <span className="trace-n">{i+1}</span>
                      <span className="trace-tool">{t.tool.replace(/^get_|^search_/,'')}</span>
                      {args.length>0&&<span style={{color:'var(--gray-400)',fontSize:10}}>({args.join(', ')})</span>}
                    </div>
                  );
                })}
              </div>
            )}
            {m.role==='a'&&m.suggestions&&m.suggestions.length>0&&(
              <div className="suggestion-chips">
                {m.suggestions.map((s,i)=>(
                  <button key={i} className="suggestion-chip" onClick={()=>fillAndSend(s)}>{s}</button>
                ))}
              </div>
            )}
          </div>
        ))}
        {thinking&&(
          <div className="msg-a">
            <div className="thinking">
              <div className="t-dot"/><div className="t-dot"/><div className="t-dot"/>
            </div>
          </div>
        )}
        <div ref={endRef}/>
      </div>

      <div className="chat-foot">
        <div className="chat-row">
          <textarea className="chat-in" rows={2} aria-label="Query input"
            placeholder="Ask about your network — try 'who is sending the most queries'…"

// ── Alert-rules engine: fire when a live metric crosses a threshold ──────────
const ALERT_METRICS = [
  {key:'offline_hosts',    label:'Offline / error hosts',      get:d=>d.hosts.filter(h=>h.status==='error'||h.status==='offline').length},
  {key:'critical_subnets', label:'Subnets ≥90% utilization',   get:d=>d.subnets.filter(s=>s.util>=90).length},
  {key:'ttl_anomalies',    label:'DNS zones w/ TTL anomalies',  get:d=>d.zones.filter(z=>z.anomaly).length},
  {key:'audit_failures',   label:'Failed audit events',        get:d=>d.auditLogs.filter(l=>l.result==='failure').length},
  {key:'active_feeds',     label:'Active threat feeds',         get:d=>d.feeds.filter(f=>f.active).length},
  {key:'total_hosts',      label:'Total hosts',                 get:d=>d.hosts.length},
];
const ALERT_OPS = {'>=':(a,b)=>a>=b, '>':(a,b)=>a>b, '<=':(a,b)=>a<=b, '<':(a,b)=>a<b, '==':(a,b)=>a===b};
// which section a firing alert metric points at (drives the nav badge)
const ALERT_SECTION = {offline_hosts:'hosts', critical_subnets:'ipam', ttl_anomalies:'dns', audit_failures:'audit', active_feeds:'threats', total_hosts:'hosts'};
const metricLabel = k => (ALERT_METRICS.find(m=>m.key===k)||{}).label || k;
function evalAlerts(data, rules){
  if(!data) return [];
  return rules.map(r=>{
    const m = ALERT_METRICS.find(x=>x.key===r.metric);
    const val = m ? m.get(data) : 0;
    const op = ALERT_OPS[r.op] || (()=>false);
    return {...r, value:val, firing: op(val, Number(r.threshold))};
  });
}
// snapshot of headline counts, for change-detection between refreshes
function snapMetrics(data){
  if(!data) return {};
  const o={}; ALERT_METRICS.forEach(m=>{o[m.key]=m.get(data);});
  o.total_subnets=data.subnets.length; o.total_zones=data.zones.length; o.total_leases=data.leases.length;
  return o;
}

      {evald.length===0

        : <div className="scroll"><table className="tbl" style={{width:'100%',fontSize:12,borderCollapse:'collapse'}}>
            <thead><tr style={{textAlign:'left',color:'var(--gray-400)'}}>
              <th style={{padding:'6px 8px'}}>Status</th><th style={{padding:'6px 8px'}}>Metric</th>
              <th style={{padding:'6px 8px'}}>Condition</th><th style={{padding:'6px 8px'}}>Current</th><th></th></tr></thead>

}

function VaultGate() {
  const [st,setSt]=useState(null);
  const refresh=useCallback(()=>fetch('/api/vault/status').then(r=>r.json()).then(setSt).catch(()=>setSt({vaultMode:false})),[]);
  useEffect(()=>{refresh();},[refresh]);
  if(!st) return <div style={{display:'flex',height:'100vh',alignItems:'center',justifyContent:'center'}}><div className="spinner" style={{width:44,height:44}}/></div>;
  if(!st.vaultMode) return <App vault={st}/>;              // env-key mode — unchanged
  if(st.ready)       return <App vault={st} onVaultChange={refresh}/>;
  if(!st.exists)     return <VaultSetup onDone={refresh}/>;
  if(!st.unlocked)   return <VaultUnlock onDone={refresh}/>;
  return <VaultAddTenant first onDone={refresh}/>;
}

  const tenants=vault.tenants||[];
  const active=tenants.find(t=>t.id===vault.active);
  const activeAcctName=(accounts.find(a=>a.id===activeAcct)||{}).name;

  const keyDiffers=active&&active.label&&activeAcctName&&active.label!==activeAcctName;
  const reload=()=>window.location.reload();
  const close=()=>{ setOpen(false); setView('main'); setConfirmRm(null); setRenameId(null); setAcctSearch&&setAcctSearch(''); };
  const switchAccount=id=>{ close(); switchAcct&&switchAcct(id); };
  const switchKey=async id=>{ if(id===vault.active){setView('main');return;} await vpost('/api/vault/active',{id}); reload(); };
  const remove=async (id,label)=>{ await vpost('/api/vault/tenant-remove',{id}); toast('Removed '+label,'ok'); reload(); };
  const doRename=async (id)=>{ const lbl=renameVal.trim(); if(!lbl){setRenameId(null);return;} await vpost('/api/vault/tenant-update',{id,label:lbl,key:''}); reload(); };
  const refreshNames=async()=>{ close(); await vpost('/api/vault/refresh-names',{}); window.location.reload(); };
  const testConn=async()=>{ setTesting(true);
    const {ok,data}=await vpost('/api/vault/conn-test',{}); setTesting(false); close();
    toast(ok&&data.ok ? ('Infoblox OK — '+(data.name||'connected')) : ('Infoblox connection failed: '+((data&&data.error)||'unreachable')), ok&&data.ok?'ok':'err');
  };
  if(adding) return <VaultAddTenant onCancel={()=>setAdding(false)} onDone={reload}/>;
  if(editTenant) return <VaultAddTenant editId={editTenant.id} editLabel={editTenant.label} onCancel={()=>setEditTenant(null)} onDone={reload}/>;
  if(settings) return <VaultSettings llm={vault.llm} onCancel={()=>setSettings(false)} onDone={reload}/>;
  return (

      <div className="ctx-head">
        <span className="ctx-cap" title="The CSP account you're viewing. Switch accounts (and manage keys) with ⇄.">Account</span>
