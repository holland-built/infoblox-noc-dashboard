      <div className="ctx-val">{headline}</div>
      {keyDiffers&&(
        <div className="ctx-acct" title="The stored key (login) backing this account">via <b style={{color:'var(--gray-400)'}}>{active.label}</b></div>
      )}
      {open&&(<>
        <div className="acct-overlay" onClick={close}/>
        <div className="acct-menu">
          {view==='keys' ? (<>
            {/* ── Keys sub-view: stored logins (identities) ── */}
            <div className="keys-back" onClick={()=>{setView('main');setConfirmRm(null);setRenameId(null);}}>‹ Keys</div>
            <div className="acct-sec-divider"/>
            {tenants.map(t=>( confirmRm===t.id ? (
              <div key={t.id} className="tenant-confirm" title="This permanently removes the stored key from the vault.">
                <span className="tenant-confirm-q">Remove {t.label}?</span>
                <button className="tenant-confirm-yes" title="Remove permanently" onClick={()=>remove(t.id,t.label)}>✓</button>
                <button className="tenant-confirm-no" title="Keep" onClick={()=>setConfirmRm(null)}>✕</button>
              </div>
            ) : renameId===t.id ? (
              <div key={t.id} className="tenant-row">
                <input className="acct-search" autoFocus style={{flex:1,marginBottom:0}} value={renameVal}
                  onChange={e=>setRenameVal(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')doRename(t.id);if(e.key==='Escape')setRenameId(null);}}/>
                <button className="tenant-confirm-yes" title="Save name" onClick={()=>doRename(t.id)}>✓</button>
                <button className="tenant-confirm-no" title="Cancel" onClick={()=>setRenameId(null)}>✕</button>
              </div>
            ) : (
              <div key={t.id} className="tenant-row">
                <button className={`acct-menu-item${t.id===vault.active?' active':''}`} style={{flex:1}} title="Make this the active login" onClick={()=>switchKey(t.id)}>
                  {t.id===vault.active?'● ':'○ '}{t.label}
                </button>
                <button className="tenant-mini" title="Rename" onClick={()=>{setRenameId(t.id);setRenameVal(t.label);}}>Aa</button>
                <button className="tenant-mini" title="Replace this key (e.g. if expired)" onClick={()=>{setOpen(false);setEditTenant(t);}}>key</button>
                <button className="tenant-rm" title="Remove key" onClick={()=>setConfirmRm(t.id)}>✕</button>
              </div>
            )))}
            <div className="acct-sec-divider"/>
            <button className="menu-item" onClick={()=>{close();setAdding(true);}}>
              <span className="menu-lbl">+ Add key</span>
              <span className="menu-desc">Store another Infoblox login</span>
            </button>
            <button className="menu-item" onClick={refreshNames}>
              <span className="menu-lbl">Refresh names</span>
              <span className="menu-desc">Re-fetch account names from CSP</span>
            </button>
          </>) : (<>
            {/* ── Main view: vault tenants first (when >1 key stored), then CSP sub-accounts ── */}
            {tenants.length>1&&(<>
              <div className="acct-sec-label" title="Switch between stored Infoblox connections (each uses its own API key).">Connection</div>
              <div style={{maxHeight:220,overflowY:'auto'}}>
                {tenants.map(t=>(
                  <button key={t.id} className={`acct-menu-item${t.id===vault.active?' active':''}`} title={t.label} onClick={()=>switchKey(t.id)}>
                    {t.id===vault.active?'● ':'○ '}{t.label}
                  </button>
                ))}
              </div>
              <div className="acct-sec-divider"/>
            </>)}
            {multiAcct&&(<>
              <div className="acct-sec-label" title="CSP accounts the active key can act in. The filled ● is in view.">Account</div>
              <>
                {accounts.length>6&&(
                  <input className="acct-search" autoFocus placeholder="Search accounts…"
                    value={acctSearch} onChange={e=>setAcctSearch&&setAcctSearch(e.target.value)}/>
                )}
                <div style={{maxHeight:220,overflowY:'auto'}}>
                  {accounts.filter(a=>a.name.toLowerCase().includes(acctSearch.toLowerCase())).map(a=>(
                    <button key={a.id} className={`acct-menu-item${a.id===activeAcct?' active':''}`} title={a.name} onClick={()=>switchAccount(a.id)}>
                      {a.id===activeAcct?'● ':'○ '}{a.name}
                    </button>
                  ))}
                </div>
              </>
              <div className="acct-sec-divider"/>
            </>)}
            <div className="acct-sec-label">Manage</div>
            <button className="menu-item" onClick={()=>setView('keys')}>
              <span className="menu-lbl">Keys ({tenants.length})<span className="menu-chev">›</span></span>
              <span className="menu-desc">Stored logins — one reaches all its accounts</span>
            </button>
            <button className="menu-item" disabled={testing} onClick={testConn}>
              <span className="menu-lbl">{testing?'Testing…':'Test Infoblox connection'}</span>
              <span className="menu-desc">Verify the active key reaches CSP</span>
            </button>
            <button className="menu-item" onClick={async()=>{await vpost('/api/vault/lock',{});window.location.reload();}}>
              <span className="menu-lbl">Lock vault</span>
              <span className="menu-desc">Hide your saved keys behind the passphrase. Use when you step away</span>
            </button>
            <div className="acct-sec-divider"/>
            <div className="acct-sec-label">AI</div>
            <button className="menu-item" onClick={()=>{close();setSettings(true);}}>
              <span className="menu-lbl">AI provider</span>
              <span className="menu-desc">LLM for the query box (vault-wide)</span>
            </button>
          </>)}
        </div>
      </>)}
    </div>
  );
}

function App({vault, onVaultChange}={}) {
  const [data,setData]         = useState(null);
  const [loading,setLoading]   = useState(true);
  const [refreshing,setRefreshing] = useState(false);
  const [lastUpd,setLastUpd]   = useState(null);
  const [section,setSection]   = useState('overview');
  const [hostFilt,setHostFilt] = useState(null);
  const [subFilt,setSubFilt]   = useState(null);
  const [chatOpen,setChatOpen]       = useState(false);
  const [queryMode,setQueryMode]     = useState('ask');
  const [searchQuery,setSearchQuery] = useState('');
  const [messages,setMessages]       = useState([{id:0,role:'a',content:'Ask anything about your network in plain English:\n\n• "who is sending the most queries"\n• "show me offline hosts"\n• "any critical subnets"\n• "DNS TTL problems"\n• "what\'s the network status"\n• "who changed things recently"\n\nFor finding IPs or hostnames, use the Search tab.'}]);
  const [dnsAnalytics, setDnsAnalytics] = useState(null);
  const [insights, setInsights]         = useState(null);
  const [actions, setActions]           = useState(null);
  const [hostMetrics, setHostMetrics]   = useState(null);
  const [lazyErr, setLazyErr]           = useState({}); // per-panel fetch error flags
  const [usingMock, setUsingMock]       = useState(false);
  const [demoDismiss, setDemoDismiss]   = useState(()=>LS.get('noc.demoDismiss',false));
  const [sidebarOpen, setSidebarOpen]   = useState(false);
  const [srchQ, setSrchQ]       = useState('');
  const [srchRes, setSrchRes]   = useState(null);
  const [srching, setSrching]   = useState(false);
  const [autoRefresh, setAutoRefresh] = useState(()=>LS.get('ar',0));
  const [arCountdown, setArCountdown] = useState(0);
  const [refreshFrozen, setRefreshFrozen] = useState(false);   // pause auto-refresh (demos)
  const [showShortcuts, setShowShortcuts] = useState(false);
  const [ipamChip, setIpamChip] = useState(()=>LS.get('noc.ipamChip',null));
  const [ipamShowTiny, setIpamShowTiny] = useState(false);   // reveal single-IP /32 subnets (transient)
  const [hostChip, setHostChip] = useState(()=>LS.get('noc.hostChip',null));
  const [searchHistory, setSearchHistory] = useState(()=>LS.get('sh',[]));
  const [zoneFilt, setZoneFilt] = useState(null);
  const [rowLimits, setRowLimits]       = useState(()=>LS.get('rl',{}));
  const [collapsed, setCollapsed]       = useState(()=>LS.get('cl',{}));
  const DEFAULT_ORDER=['hosts','subnets','ttl','audit','pols','feeds'];
  const [overviewOrder, setOverviewOrder] = useState(()=>{
    const saved=LS.get('noc.widgetOrder', null) || LS.get('oo', null) || DEFAULT_ORDER;
    // keep only known ids + append any missing defaults (forward-compatible)
    const known=saved.filter(id=>DEFAULT_ORDER.includes(id));
    return [...known, ...DEFAULT_ORDER.filter(id=>!known.includes(id))];
  });
  const [vizMode, setVizMode]           = useState(()=>LS.get('noc.viz',{}));
  const [fullscreen, setFullscreen]     = useState(null);
  const [dragOver, setDragOver]         = useState(null);
  const [dragging, setDragging]         = useState(null);
  const [dragArmed, setDragArmed]       = useState(null);

  const getViz = (id, def='table') => vizMode[id] || def;
  const setViz = (id, v) => { const n={...vizMode,[id]:v}; setVizMode(n); LS.set('noc.viz',n); };
  const [alertRules, setAlertRules] = useState(()=>LS.get('noc.alertRules',[]));
  const [deltas, setDeltas] = useState(null);
  const [theme, setTheme]           = useState(()=>LS.get('noc.theme','system')); // 'system'|'light'|'dark'
  const [density, setDensity]       = useState(()=>LS.get('noc.density','comfortable')); // 'comfortable'|'compact'
  const [cmdkOpen, setCmdkOpen]     = useState(false);
  const [notifyOn, setNotifyOn]     = useState(()=>LS.get('noc.notify',false));
  const [alertsDismissed, setAlertsDismissed] = useState(false);  // session-only banner dismiss
  const [noticesExpanded, setNoticesExpanded] = useState(false);  // collapse extras past the cap
  const [updPop, setUpdPop]         = useState(false);            // version-chip popover
  const [updBusy, setUpdBusy]       = useState(false);            // "Check now" in flight
  const [updApplying, setUpdApplying] = useState(false);          // "Update now" self-update in flight
  const [updInfo, setUpdInfo]       = useState(()=>(vault&&vault.update)||null);
  const prevFiringRef               = useRef(new Set());
  const [accounts, setAccounts]     = useState([]);
  const [activeAcct, setActiveAcct] = useState('');   // CSP account id
  const [showAcctMenu, setShowAcctMenu] = useState(false);
  const [switchingAcct, setSwitchingAcct] = useState(false);
  const [acctSearch, setAcctSearch] = useState('');

  const rl = (key, def=25) => rowLimits[key]||def;
  const setRl = (key, val) => { const n={...rowLimits,[key]:val}; setRowLimits(n); LS.set('rl',n); };
  const toggleCollapse = (key) => { const n={...collapsed,[key]:!collapsed[key]}; setCollapsed(n); LS.set('cl',n); };
  const toggleFs = (key) => setFullscreen(f=>f===key?null:key);

  const onDragStart = (e, id) => { e.dataTransfer.setData('card',id); e.dataTransfer.effectAllowed='move'; setDragging(id); };
  const onDragOver  = (e, id) => { e.preventDefault(); e.dataTransfer.dropEffect='move'; if(dragOver!==id) setDragOver(id); };
  const onDragEnd   = () => { setDragOver(null); setDragging(null); };
  const onDrop      = (e, id) => {
    e.preventDefault(); setDragOver(null); setDragging(null);
    const from = e.dataTransfer.getData('card');
    if(from===id) return;
    const arr=[...overviewOrder];
    const fi=arr.indexOf(from), ti=arr.indexOf(id);
    if(fi<0||ti<0) return;
    arr.splice(fi,1); arr.splice(ti,0,from);
    setOverviewOrder(arr); LS.set('noc.widgetOrder',arr);
  };

  // props for a draggable bento wrapper; whole card is the drop target but
  // dragging only initiates from the handle (so inner buttons/text still work)
  const wrapProps = (id, extra='') => ({
    draggable: dragArmed===id,
    className:`drag-card${extra?' '+extra:''}${dragging===id?' dragging':''}${dragOver===id?' drag-over':''}`,
    onDragStart:e=>onDragStart(e,id),
    onDragOver:e=>onDragOver(e,id),
    onDrop:e=>onDrop(e,id),
    onDragEnd:()=>{onDragEnd(); setDragArmed(null);}
  });
  const DragHandle = ({id}) => (
    <span className="drag-handle" title="Drag to reorder" aria-label="Drag to reorder"
      onMouseDown={()=>setDragArmed(id)} onMouseUp={()=>setDragArmed(null)}>⠿</span>
  );
  const VIZ_OPTS=[['table','Table'],['bar','Bar'],['line','Line'],['raw','Raw']];
  const VizSelect = ({id, def='table', opts=VIZ_OPTS}) => (
    <select className="viz-sel" value={getViz(id,def)} onChange={e=>setViz(id,e.target.value)}
      onMouseDown={e=>e.stopPropagation()} title="Change visualization">
      {opts.map(([v,l])=><option key={v} value={v}>{l}</option>)}
    </select>
  );

  const load = useCallback(async (bustCache=false)=>{
    // Show stale data immediately so UI isn't blank
    if(!data) {
      const stale = LS.get('_dc', null);
      if(stale) { setData(stale); setLoading(false); }
    }
    setRefreshing(true);
    if(bustCache) { try { await fetch('/api/cache-bust'); } catch{} }
    try {
      const resp = await fetch('/api/data');
      if(resp.ok) {
        const d = await resp.json();
        /* fall back to MOCK for any missing arrays so the UI never breaks */
        const merged = {
          subnets:     d.subnets?.length     ? d.subnets     : MOCK.subnets,
          leases:      d.leases?.length      ? d.leases      : MOCK.leases,
          dnsViews:    d.dnsViews?.length    ? d.dnsViews    : MOCK.dnsViews,
          zones:       d.zones?.length       ? d.zones       : MOCK.zones,
          hosts:       d.hosts?.length       ? d.hosts       : MOCK.hosts,
          secPolicies: d.secPolicies?.length ? d.secPolicies : MOCK.secPolicies,
          feeds:       d.feeds?.length       ? d.feeds       : MOCK.feeds,
          auditLogs:   d.auditLogs?.length   ? d.auditLogs   : MOCK.auditLogs,
        };
        setData(merged);
        setUsingMock(!(d.subnets?.length||d.hosts?.length||d.zones?.length));
        LS.set('_dc', {subnets:merged.subnets||[],leases:merged.leases||[],dnsViews:merged.dnsViews||[],zones:merged.zones||[],hosts:merged.hosts||[],secPolicies:merged.secPolicies||[],feeds:merged.feeds||[],auditLogs:merged.auditLogs||[]});
        // change-detection: diff headline counts vs the previous refresh
        const _prev = LS.get('noc.prevSnap', null);
        const _cur  = snapMetrics(merged);
        if(_prev) setDeltas(Object.keys(_cur).reduce((a,k)=>{const dv=_cur[k]-(k in _prev?_prev[k]:_cur[k]); if(dv!==0)a[k]=dv; return a;},{}));
        LS.set('noc.prevSnap', _cur);
      } else {
        setData(MOCK); setUsingMock(true); /* server error — use mock */
      }
    } catch(e) {
      setData(MOCK); setUsingMock(true); /* no server running — use mock */
    }
    setLastUpd(new Date());
    setLoading(false);
    setRefreshing(false);
  },[]);

  useEffect(()=>{load();},[]);

  // CSP accounts this API key's user can act in (portal-style sandbox switch)
  useEffect(()=>{
    fetch('/api/accounts').then(r=>r.json()).then(d=>{
      setAccounts(d.accounts||[]);
      setActiveAcct(d.active||'');
    }).catch(()=>{});
  },[]);
  const switchAcct = async (id) => {
    setShowAcctMenu(false); setAcctSearch('');
    if(id===activeAcct) return;
    setSwitchingAcct(true);
    try {
      const r = await fetch('/api/switch-account', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({id})
      });
      const d = await r.json();
      if(d.ok){
        setActiveAcct(d.active);
        LS.set('_dc', null);   // stale cache belongs to the previous tenant
        LS.set('noc.prevSnap', null);
        setData(null); setLoading(true);
        await load(true);
        const nm=(accounts.find(a=>a.id===d.active)||{}).name||'account';
        toast(`Switched to ${nm} — showing its data`,'ok');
      } else {
        toast('Account switch failed'+(d.error?`: ${d.error}`:''),'err');
      }
    } catch{ toast('Account switch failed — bridge unreachable','err'); }
    setSwitchingAcct(false);
  };

  // deep-link: section + open drill-down <-> URL hash (shareable, Back-able).
  // Hash format: #<section> or #overview?host=<status> / ?sub=<id>.
  const buildHash=(sec,hf,sf)=>{ const p=[]; if(sec==='overview'){ if(hf)p.push('host='+encodeURIComponent(hf)); if(sf)p.push('sub='+encodeURIComponent(sf)); } return '#'+sec+(p.length?('?'+p.join('&')):''); };
  useEffect(()=>{
    const apply=()=>{ const h=location.hash.replace(/^#/,''); const qi=h.indexOf('?');
      const id=decodeURIComponent(qi>=0?h.slice(0,qi):h);
      if(id && SECTIONS.some(s=>s.id===id)){ setSection(id);
        const q=new URLSearchParams(qi>=0?h.slice(qi+1):'');
        setHostFilt(id==='overview'?(q.get('host')||null):null);
        setSubFilt(id==='overview'?(q.get('sub')||null):null); } };
    apply();
    window.addEventListener('hashchange',apply);
    return ()=>window.removeEventListener('hashchange',apply);
  },[]);
  // Push each section / drill change as a history entry so the browser & mouse
  // Back button navigate within the app (close a drill, then step back through
  // sections) instead of leaving it. The hashchange handler above restores state
  // on Back; that path already matches the hash, so it won't re-push. First
  // render uses replaceState so Back never lands on a blank entry.
  const navInitRef = useRef(false);
  useEffect(()=>{
    const target=buildHash(section,hostFilt,subFilt);
    if(location.hash!==target){
      if(navInitRef.current) history.pushState(null,'',target);
      else history.replaceState(null,'',target);
    }
    navInitRef.current=true;
  },[section,hostFilt,subFilt]);
  // Close a drill via history when it's reflected in the URL, so Back/forward
  // stay clean (no stranded "reopen on Back" entry); otherwise just clear it.
  const closeDrill=which=>{
    if(navInitRef.current && new RegExp('[?&]'+which+'=').test(location.hash)) history.back();
    else (which==='host'?setHostFilt(null):setSubFilt(null));
  };

  // auto-tooltip: set title=full value on any table cell/badge that is actually truncated
  useEffect(()=>{
    const t=setTimeout(()=>{
      document.querySelectorAll('.tbl td, .tbl td .badge').forEach(el=>{
        if(el.scrollWidth>el.clientWidth+1){ if(!el.title) el.title=el.textContent; }
        else if(el.title&&el.title===el.textContent){ el.removeAttribute('title'); }
      });
    },120);
    return ()=>clearTimeout(t);
  });

  useEffect(()=>{
    if(!autoRefresh) { setArCountdown(0); return; }
    if(refreshFrozen) return;            // paused: hold the countdown, no fetch
    setArCountdown(autoRefresh);
    const tick = setInterval(()=>{
      setArCountdown(c=>{
        if(c<=1){ load(); return autoRefresh; }
        return c-1;
      });
    },1000);
    return ()=>clearInterval(tick);
  },[autoRefresh,refreshFrozen]);

  useEffect(()=>{
    const handler = e => {
      if((e.metaKey||e.ctrlKey)&&(e.key==='k'||e.key==='K')){ e.preventDefault(); setCmdkOpen(o=>!o); return; }
      if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT'||e.target.isContentEditable) return;
      if(e.key==='?') { setShowShortcuts(s=>!s); return; }
      if(e.key==='Escape') {
        setChatOpen(false); setShowShortcuts(false); setCmdkOpen(false);
        setUpdPop(false); setSidebarOpen(false); setFullscreen(null); setShowAcctMenu(false);
        if(/[?&](host|sub)=/.test(location.hash)) history.back();   // close an open drill via history
        else { setSubFilt(null); setHostFilt(null); }
        return;
      }
      if(e.key==='r'&&!e.metaKey&&!e.ctrlKey) { load(); return; }
      if(e.key==='/'){ e.preventDefault(); setSection('search'); return; }
      const idx = parseInt(e.key);
      if(idx>=1&&idx<=9) { const s=SECTIONS[idx-1]; if(s) setSection(s.id); }
    };
    document.addEventListener('keydown', handler);
    return ()=>document.removeEventListener('keydown', handler);
  },[load]);

  useEffect(()=>{
    document.body.classList.toggle('chat-open', chatOpen);
    return ()=>document.body.classList.remove('chat-open');
  },[chatOpen]);

  // theme: resolve 'system' via OS preference, apply to <html>, persist, react to OS changes
  useEffect(()=>{
    const mq = window.matchMedia('(prefers-color-scheme: light)');
    const apply = () => {
      const resolved = theme==='system' ? (mq.matches?'light':'dark') : theme;
      document.documentElement.setAttribute('data-theme', resolved);
    };
    apply();
    LS.set('noc.theme', theme);
    if(theme==='system'){ mq.addEventListener('change', apply); return ()=>mq.removeEventListener('change', apply); }
  },[theme]);
  const THEME_CYCLE = {system:'light', light:'dark', dark:'system'};
  const THEME_ICON  = {system:'◐', light:'○', dark:'●'};
  const THEME_LABEL = {system:'System theme', light:'Light theme', dark:'Dark theme'};

  useEffect(()=>{ document.documentElement.setAttribute('data-density', density); LS.set('noc.density', density); },[density]);
  useEffect(()=>{ LS.set('noc.ipamChip', ipamChip); },[ipamChip]);
  useEffect(()=>{ LS.set('noc.hostChip', hostChip); },[hostChip]);

  // browser notifications when an alert rule transitions into FIRING
  useEffect(()=>{
    const firingNow=evalAlerts(data,alertRules).filter(a=>a.firing);
    if(!notifyOn || typeof Notification==='undefined' || Notification.permission!=='granted'){
      // track current firing while disabled so re-enabling doesn't replay them
      prevFiringRef.current=new Set(firingNow.map(a=>a.id)); return;
    }
    const firing=firingNow;
    firing.forEach(a=>{ if(!prevFiringRef.current.has(a.id)){
      try{ new Notification('Infoblox MCP — alert firing',{body:`${metricLabel(a.metric)} ${a.op} ${a.threshold} (now ${a.value})`,tag:'noc-'+a.id}); }catch(e){}
    }});
    prevFiringRef.current=new Set(firing.map(a=>a.id));
  },[data,alertRules,notifyOn]);
  const toggleNotify=()=>{
    if(notifyOn){ setNotifyOn(false); LS.set('noc.notify',false); return; }
    if(typeof Notification==='undefined'){ alert('This browser does not support notifications.'); return; }
    Notification.requestPermission().then(p=>{ const on=p==='granted'; setNotifyOn(on); LS.set('noc.notify',on); if(!on) alert('Notification permission denied.'); });
  };

  useEffect(()=>{
    document.title = 'Infoblox MCP · Portal (CSP)';   // static name, no count
  },[data]);

  const lazyFetch = useCallback((key,url,set)=>{
    setLazyErr(e=>({...e,[key]:false}));
    fetch(url).then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
      .then(d=>set(d))
      .catch(()=>setLazyErr(e=>({...e,[key]:true})));
  },[]);
  useEffect(()=>{
    if(section==='dns-analytics'&&!dnsAnalytics&&!lazyErr['dns-analytics']) lazyFetch('dns-analytics','/api/dns-analytics',setDnsAnalytics);
    if(section==='insights'&&!insights&&!lazyErr.insights) lazyFetch('insights','/api/insights',setInsights);
    if(section==='actions'&&!actions&&!lazyErr.actions) lazyFetch('actions','/api/actions',setActions);
    if(section==='hosts'&&!hostMetrics&&!lazyErr.hostMetrics) lazyFetch('hostMetrics','/api/host-metrics',setHostMetrics);
  },[section]);

  // Resolve + apply the theme during render (before children render) so chart
  // colors (CK/isLight, baked into SVG fill attrs) use the CURRENT theme in the
  // same commit as a toggle, not one render late. Effect below keeps the OS
  // listener + persistence.
  const resolvedTheme = theme==='system'
    ? ((typeof window!=='undefined' && window.matchMedia('(prefers-color-scheme: light)').matches)?'light':'dark')
    : theme;
  if(typeof document!=='undefined') document.documentElement.setAttribute('data-theme', resolvedTheme);

  if(loading&&!data) return (
    <div style={{display:'flex',height:'100vh',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:14}}>
      <div className="spinner" style={{width:44,height:44}}/>
      <div style={{color:'var(--teal)',fontSize:14,fontWeight:600}}>Connecting to Infoblox</div>
      <div style={{color:'var(--gray-400)',fontSize:12}}>Loading network data…</div>
    </div>
  );

  const {subnets,leases,dnsViews,zones,hosts,secPolicies,feeds,auditLogs}=data;

  /* search filter — only active when queryMode==='filter' and searchQuery set */
  const sq = (queryMode==='filter'&&searchQuery) ? searchQuery.toLowerCase() : '';
  const s_subnets  = sq ? subnets.filter(s=>[s.name,s.addr,s.site].some(v=>v.toLowerCase().includes(sq)))  : subnets;
  const s_leases   = sq ? leases.filter(l=>[l.addr,l.host,l.subnet].some(v=>v.toLowerCase().includes(sq))) : leases;
  const s_zones    = sq ? zones.filter(z=>[z.fqdn,z.view].some(v=>v.toLowerCase().includes(sq)))           : zones;
  const s_hosts    = sq ? hosts.filter(h=>[h.name,h.ip,h.type,h.status].some(v=>v.toLowerCase().includes(sq))) : hosts;
  const s_policies = sq ? secPolicies.filter(p=>[p.name,p.action].some(v=>v.toLowerCase().includes(sq)))   : secPolicies;
  const s_feeds    = sq ? feeds.filter(f=>[f.name,f.cat,f.level].some(v=>v.toLowerCase().includes(sq)))    : feeds;
  const s_logs     = sq ? auditLogs.filter(l=>[l.user,l.action,l.resource].some(v=>v.toLowerCase().includes(sq))) : auditLogs;

  const critSubs  = subnets.filter(s=>s.util>=90);
  const onlineH   = hosts.filter(h=>h.status==='online');
  const ttlBad    = zones.filter(z=>z.anomaly);
  const activeF   = feeds.filter(f=>f.active);
  const leaseCt   = leases.reduce((a,l)=>{a[l.subnet_id]=(a[l.subnet_id]||0)+1;return a},{});
  const filtHosts = (hostFilt||hostChip) ? s_hosts.filter(h=>h.status===(hostFilt||hostChip)) : s_hosts;
  const firingAlerts = evalAlerts(data, alertRules).filter(a=>a.firing);
  const firingSecs = new Set(firingAlerts.map(a=>ALERT_SECTION[a.metric]).filter(Boolean));
  const shareView = () => { const url=location.origin+location.pathname+'#'+section;
    if(navigator.clipboard) navigator.clipboard.writeText(url).catch(()=>{}); };

  // ── app-update (notify only; the server checks GitHub, the browser never does) ──
  const upd = updInfo || (vault&&vault.update) || {};
  const checkUpdate = () => { setUpdBusy(true);
    fetch('/api/update/check').then(r=>r.json()).then(u=>setUpdInfo(u)).catch(()=>{}).finally(()=>setUpdBusy(false)); };
  // one-click self-update: ask Watchtower to recreate us, then poll until the app
  // returns on a newer build and reload. The container restarts mid-request, so a
  // dropped fetch during polling is expected, not an error.
  const verN = v => { const m=/(\d+)\.(\d+)\.(\d+)/.exec(v||''); return m?+m[3]:-1; };
  const [updPhase, setUpdPhase] = useState('');   // 'restarting' | 'downloading' | 'timeout'
  const applyUpdate = () => {
    setUpdApplying(true); setUpdPhase('restarting');
    const from = verN(upd.current||(vault&&vault.version));
    let stopped=false; const t0=Date.now();
    // Poll independently of the apply response: the container is recreated
    // mid-request, so that fetch may simply never resolve. Keep polling until
    // the app comes back on a newer build, then reload.
    // Timeout 300s: first pull can take 2-3 min on slow connections (image ~200 MB).
    const TIMEOUT=300000;
    const poll=()=>{ if(stopped) return;
      const elapsed=Date.now()-t0;
      if(elapsed>30000) setUpdPhase('downloading');
      fetch('/api/update/check',{cache:'no-store'}).then(r=>r.json())
        .then(u=>{ if(verN(u.current)>from){ location.reload(); }
          else if(elapsed<TIMEOUT){ setTimeout(poll,2500); }
          else { setUpdApplying(false); setUpdPhase('timeout'); } })
        .catch(()=>{ if(elapsed<TIMEOUT){ setTimeout(poll,2500); }
          else { setUpdApplying(false); setUpdPhase('timeout'); } }); };
    fetch('/api/update/apply',{method:'POST'}).then(r=>r.json()).catch(()=>null)
      .then(res=>{ if(res&&res.ok===false){ stopped=true; setUpdApplying(false); setUpdPhase(''); toast('Update failed: '+(res.error||'unknown'),'err'); } });
    setTimeout(poll,4000);   // give Watchtower a head start before polling
  };

  const commands = [
    ...SECTIONS.map(s=>({id:'go-'+s.id, icon:s.icon, label:'Go to '+s.label, keywords:s.id, hint:'Section', run:()=>setSection(s.id)})),
    {id:'refresh', icon:'↻', label:'Refresh data',                         keywords:'reload update', run:()=>load(true)},
    {id:'theme',   icon:'◐', label:'Cycle theme (system / light / dark)',  keywords:'dark light mode', run:()=>setTheme(t=>THEME_CYCLE[t]||'system')},
    {id:'density', icon:'☰', label:'Toggle row density',                   keywords:'compact comfortable', run:()=>setDensity(d=>d==='compact'?'comfortable':'compact')},
    {id:'query',   icon:'⊕', label:'Open query assistant',                 keywords:'ai chat ask llm', run:()=>setChatOpen(true)},
    {id:'notify',  icon:'▲', label:(notifyOn?'Disable':'Enable')+' alert notifications', keywords:'alert notification', run:toggleNotify},
    {id:'share',   icon:'◳', label:'Copy link to this view',              keywords:'share url link', run:shareView},
  ];

  return (
    <div style={{display:'flex',minHeight:'100vh'}}>

      {/* SIDEBAR */}
      {sidebarOpen&&<div className="sidebar-backdrop" onClick={()=>setSidebarOpen(false)}/>}
      <div className={`sidebar${sidebarOpen?' open':''}`}>
        <div className="logo">
          <img className="logo-mark" src={IB_LOGO} alt="Infoblox" width="26" height="26"/>
          <div>
            <div className="logo-text">Infoblox MCP</div>
            <div className="logo-sub">for Infoblox Portal (CSP)</div>
          </div>
        </div>

        <nav className="sidebar-nav">
          <div className="nav-sec">Navigation</div>
          {SECTIONS.map(s=>{
            let badge = null;
            if(data&&s.id==='ipam') { const c=data.subnets.filter(x=>x.util>=90).length; if(c>0) badge=<span className="badge-pill">{c}</span>; }
            if(data&&s.id==='hosts') { const c=data.hosts.filter(h=>h.status==='error'||h.status==='offline').length; if(c>0) badge=<span className="badge-pill">{c}</span>; }
            if(data&&s.id==='dns') { const c=data.zones.filter(z=>z.anomaly).length; if(c>0) badge=<span className="badge-pill badge-pill-amber">{c}</span>; }
            if(data&&s.id==='audit') { const c=data.auditLogs.filter(l=>l.result==='failure').length; if(c>0) badge=<span className="badge-pill badge-pill-amber">{c}</span>; }
            if(s.id==='alerts'&&firingAlerts.length>0) badge=<span className="badge-pill">{firingAlerts.length}</span>;
            const firingHere = firingSecs.has(s.id);
            return (
              <button key={s.id} className={`nav-item${section===s.id?' active':''}`} onClick={()=>{setSection(s.id);setSidebarOpen(false);}}>
                <span className="nav-icon">{s.icon}</span>{s.label}{badge}
                {firingHere&&<span className="badge-pill" title="Alert firing for this section">!</span>}
              </button>
            );
          })}
        </nav>

        <div className="sidebar-foot">
          <div style={{color:'var(--green)',display:'flex',alignItems:'center',gap:5}}>
            <span className="pulse">●</span> API Connected
            {vault&&vault.version&&(
              <span className={`ver-badge${upd.available?' upd':''}`} role="button" tabIndex={0}
                title={upd.available?`Update available: v${upd.latest}`:'App version — click to check for updates'}
                onClick={()=>setUpdPop(v=>!v)} onKeyDown={e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();setUpdPop(v=>!v);}}}
                style={{marginLeft:'auto'}}>v{vault.version}{upd.available&&<><span className="ver-up-arrow">↑</span>{String(upd.latest||'').replace(/^v/,'')}</>}</span>)}
          </div>
          {updPop&&(
            <>
            <div className="acct-overlay" onClick={()=>setUpdPop(false)}/>
            <div className="upd-pop" role="dialog" aria-label="App version">
              <div className="ver-line">{upd.available
                ? <>v{vault.version} → <span className="to">{upd.latest} available</span></>
                : <>v{vault.version} · {upd.checkDisabled?'update checks disabled':(upd.latest?'up to date':'version')}</>}</div>
              {upd.url&&<div><a href={upd.url} target="_blank" rel="noopener noreferrer">View release notes ↗</a></div>}
              {upd.available&&(upd.selfUpdate ? (
                updApplying ? <>
                  <div className="upd-actions"><button className="primary" disabled><span className="upd-spin"/>
                    {updPhase==='downloading'?'Downloading…':'Updating…'}
                  </button></div>
                  <div className="upd-note">{updPhase==='downloading'
                    ? 'Pulling image — first update can take 2–3 min. Hang tight…'
                    : 'Pulling the new image and restarting. Reconnecting when it\'s back…'}</div>
                </> : updPhase==='timeout' ? <>
                  <div className="upd-actions"><button className="primary" onClick={applyUpdate}>Try again</button></div>
                  <div className="upd-note">Timed out waiting for restart. Watchtower may still be downloading — try again or run: <code>docker compose pull &amp;&amp; docker compose up -d</code></div>
                </> : <>
                  <div className="upd-actions">
                    <button className="primary" onClick={applyUpdate}>Update now</button>
                  </div>
                  <div className="upd-note">Pulls the new image and restarts automatically. Your vault stays intact.</div>
                </>
              ) : <>
                <div className="upd-actions">
                  <button onClick={checkUpdate} disabled={updBusy||upd.checkDisabled}>{updBusy?'Checking…':'Check now'}</button>
                </div>
                <div className="upd-note">One-click update isn't enabled on this install. Re-run the installer once to turn it on; updates then apply from here.</div>
              </>)}
              {!upd.available&&(
                <div className="upd-actions">
                  <button onClick={checkUpdate} disabled={updBusy||upd.checkDisabled}>{updBusy?'Checking…':'Check now'}</button>
                </div>
              )}
            </div>
            </>
          )}
          <div className="ctx-panel">
          {vault&&vault.vaultMode
            ? <TenantManager vault={vault} accounts={accounts} activeAcct={activeAcct}
                switchAcct={switchAcct} switchingAcct={switchingAcct}
                acctSearch={acctSearch} setAcctSearch={setAcctSearch}/>
            : accounts.length>0&&(
            <div className="ctx-block">
              <div className="ctx-head">
                <span className="ctx-cap">Account</span>
                {accounts.length>1&&<button className="ctx-swap" title="Switch CSP account" disabled={switchingAcct} onClick={()=>setShowAcctMenu(m=>!m)}>
                  {switchingAcct?'⟳':'⇄'}
                </button>}
              </div>
              <div className="ctx-val">{(accounts.find(a=>a.id===activeAcct)||{}).name||'—'}</div>
              {accounts.length===1&&(
                <div className="ctx-note"
                  title="This API key's user belongs to a single CSP account. Use an interactive User API Key (portal → user menu → User API Keys) to enable switching.">
                  single-account key — switching off
                </div>
              )}
              {showAcctMenu&&(
                <>
                  <div className="acct-overlay" onClick={()=>{setShowAcctMenu(false);setAcctSearch('');}}/>
                  <div className="acct-menu">
                    {accounts.length>6&&(
                      <input className="acct-search" autoFocus placeholder="Search accounts…"
                        value={acctSearch} onChange={e=>setAcctSearch(e.target.value)}/>
                    )}
                    <div style={{maxHeight:240,overflowY:'auto'}}>
                      {accounts.filter(a=>a.name.toLowerCase().includes(acctSearch.toLowerCase())).map(a=>(
                        <button key={a.id} className={`acct-menu-item${a.id===activeAcct?' active':''}`}
                          title={a.name} onClick={()=>switchAcct(a.id)}>
                          {a.id===activeAcct?'● ':'○ '}{a.name}
                        </button>
                      ))}
                    </div>
                  </div>
                </>
              )}
            </div>
          )}
          </div>
        </div>
      </div>

      {/* MAIN */}
      <div className="main">
        <div className="sr-only" role="status" aria-live="polite">
          {refreshing?'Refreshing data':(lastUpd?`Data updated ${lastUpd.toLocaleTimeString()}`:'')}{firingAlerts.length>0?`. ${firingAlerts.length} alert${firingAlerts.length>1?'s':''} firing`:''}
        </div>
        <div className="topbar">
          <div style={{display:'flex',alignItems:'center',minWidth:0}}>
            <button className="menu-btn" aria-label="Open navigation" onClick={()=>setSidebarOpen(o=>!o)}>☰</button>
            <div style={{minWidth:0}}>
              <h1 className="page-title">{SECTIONS.find(s=>s.id===section)?.label}</h1>
              <div className="page-sub" style={{display:'flex',alignItems:'center'}}>
                {refreshing?'Refreshing…':'Live data'}<FreshnessPill lastUpd={lastUpd}/>
              </div>
            </div>
          </div>
          <div className="topbar-controls">
            <div className="topbar-group">
              <RefreshControl autoRefresh={autoRefresh} setAutoRefresh={setAutoRefresh}
                refreshFrozen={refreshFrozen} setRefreshFrozen={setRefreshFrozen}
                arCountdown={arCountdown} refreshing={refreshing} onRefresh={()=>load(true)}/>
              <button className={`chat-toggle-btn${chatOpen?' on':''}`} onClick={()=>setChatOpen(o=>!o)}>
                ⊕ {chatOpen?'Close Query':'Query'}
              </button>
              <button className="theme-btn" onClick={()=>setTheme(t=>THEME_CYCLE[t]||'system')}
                title={`${THEME_LABEL[theme]} (click to change)`} aria-label={THEME_LABEL[theme]}>{THEME_ICON[theme]}</button>
              <PresetMenu section={section}/>
              <button className="theme-btn" onClick={()=>setCmdkOpen(true)} title="Command palette (⌘K)" aria-label="Open command palette">⌘K</button>
              <MoreMenu onShare={shareView} density={density} setDensity={setDensity} onShortcuts={()=>setShowShortcuts(true)}/>
            </div>
          </div>
        </div>
        {/* ── unified notice rail (one vocabulary; severity-sorted; collapses past 2) ── */}
        {(()=>{
          const notices=[];
          if(firingAlerts.length>0&&!alertsDismissed) notices.push({
            id:'alerts', sev:'n-red', ico:'!',
            msg:<><b>{firingAlerts.length} alert{firingAlerts.length>1?'s':''} firing</b> — {firingAlerts.slice(0,2).map(a=>`${metricLabel(a.metric)} (${a.value})`).join(', ')}{firingAlerts.length>2?`, +${firingAlerts.length-2} more`:''}</>,
            acts:<>{section!=='alerts'&&<button className="n-btn" onClick={()=>setSection('alerts')}>View</button>}<button className="n-x" aria-label="Dismiss alerts" onClick={()=>setAlertsDismissed(true)}>×</button></>,
          });
          if(usingMock&&!demoDismiss) notices.push({
            id:'demo', sev:'n-info', ico:'i',
            msg:<><b>Demo data</b> — the bridge couldn't reach Infoblox, so sample data is shown. Set <b>INFOBLOX_API_KEY</b> and restart the server to see live data (see the README).</>,
            acts:<button className="n-x" aria-label="Dismiss demo notice" onClick={()=>{setDemoDismiss(true);LS.set('noc.demoDismiss',true);}}>×</button>,
          });
          if(sq) notices.push({
            id:'filter', sev:'n-info', ico:'i',
            msg:<>Filtering: "<b>{searchQuery}</b>" — results narrowed in all sections</>,
            acts:<button className="n-btn" onClick={()=>setSearchQuery('')}>Clear</button>,
          });
          if(!notices.length) return null;
          const CAP=2, hidden=notices.length-CAP;
          const shown=noticesExpanded?notices:notices.slice(0,CAP);
          return (
            <div className="notice-rail" role="status">
              {shown.map(n=>(
                <div key={n.id} className={`notice ${n.sev}`}>
                  <span className="n-ico" aria-hidden="true">{n.ico}</span>
                  <span className="n-msg">{n.msg}</span>
                  <span className="n-acts">{n.acts}</span>
                </div>
              ))}
              {hidden>0&&<button className="n-more" onClick={()=>setNoticesExpanded(v=>!v)}>{noticesExpanded?'Show fewer ⌃':`+${hidden} more notice${hidden>1?'s':''} ⌄`}</button>}
            </div>
          );
        })()}

        {/* ── OVERVIEW ── */}
        {section==='overview'&&(
          <>
            {/* Status-tile matrix — one tile per domain, tinted by worst severity */}
            {(()=>{
              const errHosts = hosts.filter(h=>h.status==='error'||h.status==='offline').length;
              const feedCrit = feeds.filter(f=>f.level==='critical'&&f.active).length;
              const auditFail = auditLogs.filter(l=>l.result==='failure').length;
              const tiles = [
                {cat:'Hosts',   n:errHosts,       tot:hosts.length,    sev:errHosts>0 ?'crit':'ok', desc:'offline / error',  section:'hosts'},
                {cat:'Subnets', n:critSubs.length,tot:subnets.length,  sev:critSubs.length>0?'warn':'ok', desc:'≥90% utilization', section:'ipam'},
                {cat:'DNS',     n:ttlBad.length,  tot:zones.length,    sev:ttlBad.length>0?'warn':'ok', desc:'TTL anomalies',    section:'dns'},
                {cat:'Threats', n:feedCrit,       tot:feeds.length,    sev:feedCrit>0 ?'warn':'ok', desc:'critical feeds',   section:'threats'},
                {cat:'Audit',   n:auditFail,      tot:auditLogs.length,sev:auditFail>0?'crit':'ok', desc:'failed events',    section:'audit'},
              ];
              const ST={crit:'CRIT',warn:'WARN',ok:'OK'};
              const BAR={crit:'var(--red)',warn:'var(--amber)',ok:'var(--green)'};
              return (
                <div className="stiles" role="group" aria-label="Tenant status by domain">
                  {tiles.map(t=>(
                    <button key={t.cat} className={`stile ${t.sev}`} onClick={()=>setSection(t.section)}
                            title={`${t.cat}: ${t.n}${t.tot>0?(' of '+t.tot):''} ${t.desc} — open ${t.section.toUpperCase()}`}>
                      <div className="stile-top"><span className="stile-cat">{t.cat}</span><span className="stile-st">{ST[t.sev]}</span></div>
                      <span className="stile-big">{t.n}{t.tot>0&&<span className="stile-of"> / {t.tot}</span>}</span>
                      <span className="stile-desc">{t.desc}</span>
                      <div className="stile-track"><div className="stile-fill" style={{width:t.tot>0?`${Math.min(t.n/t.tot*100,100)}%`:'0%',background:BAR[t.sev]}}/></div>
                    </button>
                  ))}
                </div>
              );
            })()}
            {deltas&&Object.keys(deltas).length>0&&(
              <div className="card mb14">
                <div className="card-title"><div className="dot"/>Changes since last refresh</div>
                <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
                  {Object.entries(deltas).map(([k,v])=>(
                    <div key={k} style={{fontSize:12,color:'var(--gray-200)'}}>
                      {({total_subnets:'Total subnets',total_zones:'Total zones',total_leases:'Total leases'}[k])||metricLabel(k)}:{' '}
                      <span style={{fontWeight:700,color:v>0?'var(--red)':'var(--green)'}}>{v>0?('▲ +'+v):('▼ '+v)}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
            <div className="bento">
            {overviewOrder.map(id=>{
              if(id==='hosts') return (
                <div key="hosts" {...wrapProps('hosts')}>
                  <div className={`card${fullscreen==='hosts'?' fs':''}`}>
                    <div className="card-title">
                      <DragHandle id="hosts"/>
                      <div className="dot"/>Host Status Distribution
                      <div style={{marginLeft:'auto',display:'flex',gap:6,alignItems:'center'}}>
                        <VizSelect id="hosts" def="donut" opts={[['donut','Donut'],['table','Table'],['bar','Bar'],['raw','Raw']]}/>
                        <button className="collapse-btn" style={{margin:0}} onClick={()=>toggleCollapse('hosts')} title={collapsed['hosts']?'Expand':'Collapse'}>{collapsed['hosts']?'▶':'▼'}</button>
                        <button className="fs-btn" onClick={()=>toggleFs('hosts')} title="Fullscreen">⤢</button>
                      </div>
                    </div>
                    {!collapsed['hosts']&&(()=>{
                      const filteredH = hostFilt ? hosts.filter(h=>h.status===hostFilt) : [];
                      const statusColor = {online:CK.green(),degraded:CK.amber(),offline:'var(--gray-400)',error:CK.red(),pending:'var(--teal)'};
                      const hv=getViz('hosts','donut');
                      const statusRows=['online','degraded','offline','error','pending']
                        .map(st=>({status:st,count:hosts.filter(h=>h.status===st).length})).filter(r=>r.count>0);
                      const statusColors={online:CK.green(),degraded:CK.amber(),offline:'var(--gray-400)',error:CK.red(),pending:'var(--teal)'};
                      return (
                        <>
                          {hv==='donut'?<>
                          <div style={{fontSize:9,color:'var(--gray-400)',marginBottom:6,textAlign:'right'}}>Click a segment to drill down</div>
                          <Donut hosts={hosts} filter={hostFilt} onSlice={s=>{hostFilt===s?closeDrill('host'):setHostFilt(s);}}/>
                          </>:<WidgetViz data={statusRows} viz={hv==='line'?'bar':hv} columns={[{key:'status',label:'Status'},{key:'count',label:'Hosts'}]} labelKey="status" valueKey="count" rowColor={r=>statusColors[r.status]} defaultRows={6}/>}
                          {hostFilt&&(
                            <div className="drill-panel">
                              <div className="drill-header">
                                <span className="drill-title" style={{color:statusColor[hostFilt]||'var(--teal)'}}>
                                  ⊞ {hostFilt.charAt(0).toUpperCase()+hostFilt.slice(1)} Hosts ({filteredH.length})
                                </span>
                                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                                  <button className="drill-see-all" onClick={()=>setSection('hosts')}>See all in Hosts tab →</button>
                                  <button className="drill-close" onClick={()=>closeDrill('host')} aria-label="Close drill-down">×</button>
                                </div>
                              </div>
                              <div className="scroll" style={{maxHeight:220}}>
                                <table className="tbl">
                                  <colgroup><col style={{width:'52%'}}/><col style={{width:'30%'}}/><col style={{width:'18%'}}/></colgroup>
                                  <thead><tr><th>Hostname</th><th>IP</th><th>Type</th></tr></thead>
                                  <tbody>
                                    {filteredH.slice(0,15).map(h=>(
                                      <tr key={h.id}>
                                        <td style={{fontSize:11,fontWeight:500}} title={h.name}>{h.name}</td>
                                        <td style={{fontFamily:'monospace',fontSize:10,color:'var(--gray-400)'}} title={h.ip}>{h.ip||'—'}</td>
                                        <td style={{fontSize:10,color:'var(--gray-400)'}}>{h.type}</td>
                                      </tr>
                                    ))}
                                  </tbody>
                                </table>
                                {filteredH.length>15&&<div style={{textAlign:'center',fontSize:10,color:'var(--teal)',marginTop:4}}>{filteredH.length-15} more → <button className="drill-see-all" onClick={()=>setSection('hosts')}>Hosts tab</button></div>}
                              </div>
                            </div>
                          )}
                        </>
                      );
                    })()}
                  </div>
                </div>
              );
              if(id==='subnets') return (
                <div key="subnets" {...wrapProps('subnets','b-wide')}>
                  <div className={`card${fullscreen==='subnets'?' fs':''}`}>
                    <div className="card-title">
                      <DragHandle id="subnets"/>
                      <div className="dot"/>Top Subnets by DHCP Utilization
                      <div style={{marginLeft:'auto',display:'flex',gap:6,alignItems:'center'}}>
                        <VizSelect id="subnets" def="subnetbars" opts={[['subnetbars','Bars'],['table','Table'],['line','Line'],['raw','Raw']]}/>
                        <button className="collapse-btn" style={{margin:0}} onClick={()=>toggleCollapse('subnets')} title={collapsed['subnets']?'Expand':'Collapse'}>{collapsed['subnets']?'▶':'▼'}</button>
                        <button className="fs-btn" onClick={()=>toggleFs('subnets')} title="Fullscreen">⤢</button>
                      </div>
                    </div>
                    {!collapsed['subnets']&&(()=>{
                      const drillSub = subFilt ? subnets.find(s=>s.id===subFilt) : null;
                      const drillLeases = drillSub ? leasesInSubnet(leases, drillSub) : [];
                      const sv=getViz('subnets','subnetbars');
                      const subRows=[...subnets].filter(s=>s.total>1).sort((a,b)=>b.util-a.util).slice(0,10)
                        .map(s=>({...s, name: s.name!==s.addr?s.name:'—', addr: `${s.addr}/${s.cidr}`}));
                      const subHasSite=subRows.some(s=>s.site&&s.site!=='–'&&s.site!=='—');
                      const subCols=[{key:'name',label:'Subnet'},{key:'addr',label:'Network'},{key:'util',label:'Util %'},{key:'used',label:'Used'},
                        ...(subHasSite?[{key:'site',label:'Site'}]:[])];
                      return (
                        <>
                          {sv==='subnetbars'?<>
                          <div style={{fontSize:9,color:'var(--gray-400)',marginBottom:6,textAlign:'right'}}>Click a row to drill down</div>
                          <SubnetBars subnets={subnets} highlight={subFilt} onBar={id=>{subFilt===id?closeDrill('sub'):setSubFilt(id);}}/>
                          </>:<WidgetViz data={subRows} viz={sv}
                            columns={subCols}
                            labelKey="name" valueKey="util" rowColor={r=>utilColor(r.util)} defaultRows={10}/>}
                          {drillSub&&(
                            <div className="drill-panel">
                              <div className="drill-header">
                                <span className="drill-title">⊞ {drillSub.name} — {drillSub.addr}/{drillSub.cidr}</span>
                                <button className="drill-close" onClick={()=>closeDrill('sub')} aria-label="Close drill-down">×</button>
                              </div>
                              <div style={{display:'flex',gap:16,marginBottom:10,flexWrap:'wrap'}}>
                                {[
                                  {l:'Utilization', v:`${drillSub.util}%`, c:utilColor(drillSub.util)},
                                  {l:'Used IPs',    v:`${drillSub.used} / ${drillSub.total}`, c:'var(--gray-200)'},
                                  {l:'Site',        v:drillSub.site||'—', c:'var(--gray-400)'},
                                  {l:'Leases found',v:drillLeases.length, c:'var(--teal)'},
                                ].map((x,i)=>(
                                  <div key={i} style={{fontSize:11}}>
                                    <div style={{color:'var(--gray-400)',marginBottom:1,fontSize:9,textTransform:'uppercase',letterSpacing:'.08em'}}>{x.l}</div>
                                    <div style={{color:x.c,fontWeight:700}}>{x.v}</div>
                                  </div>
                                ))}
                              </div>
                              {drillLeases.length>0?(
                                <div className="scroll" style={{maxHeight:160}}>
                                  <table className="tbl">
                                    <thead><tr><th>IP Address</th><th>Hostname</th><th>State</th></tr></thead>
                                    <tbody>
                                      {drillLeases.slice(0,20).map((l,i)=>(
                                        <tr key={i}>
                                          <td style={{fontFamily:'monospace',fontSize:11}}>{l.addr}</td>
                                          <td style={{fontSize:11,color:'var(--gray-200)'}}>{l.host||'—'}</td>
                                          <td><span className={`badge ${l.state==='active'?'b-green':'b-gray'}`}>{l.state}</span></td>
                                        </tr>
                                      ))}
                                    </tbody>
                                  </table>
                                  {drillLeases.length>20&&<div style={{textAlign:'center',fontSize:10,color:'var(--teal)',marginTop:4}}>{drillLeases.length-20} more — <button className="drill-see-all" onClick={()=>setSection('dhcp')}>See all in DHCP tab</button></div>}
                                </div>
                              ):(
                                <div style={{fontSize:11,color:'var(--gray-400)'}}>No lease data loaded for this subnet. <button className="drill-see-all" onClick={()=>setSection('ipam')}>View in IPAM tab →</button></div>
                              )}
                            </div>
                          )}
                        </>
                      );
                    })()}
                  </div>
                </div>
              );
              if(id==='ttl') return (
                <div key="ttl" {...wrapProps('ttl','b-wide')}>
                  <div className={`card${fullscreen==='ttl'?' fs':''}`}>
                    <div className="card-title">
                      <DragHandle id="ttl"/>
                      <div className="dot" style={{background:'var(--amber)'}}/>Zones with TTL Issues
                      <div style={{marginLeft:'auto',display:'flex',gap:6,alignItems:'center'}}>
                        <VizSelect id="ttl"/>
                        <button className="collapse-btn" style={{margin:0}} onClick={()=>toggleCollapse('ttl')} title={collapsed['ttl']?'Expand':'Collapse'}>{collapsed['ttl']?'▶':'▼'}</button>
                        <button className="fs-btn" onClick={()=>toggleFs('ttl')} title="Fullscreen">⤢</button>
                      </div>
                    </div>
                    {!collapsed['ttl']&&(getViz('ttl')==='table'
                      ?<TTLTable zones={zones}/>
                      :<WidgetViz data={zones.filter(z=>z.anomaly)} viz={getViz('ttl')}
                        columns={[{key:'fqdn',label:'Zone'},{key:'view',label:'View'},{key:'ttl',label:'TTL'},{key:'neg_ttl',label:'Neg TTL'},{key:'records',label:'Records'}]}
                        labelKey="fqdn" valueKey="ttl" defaultRows={10}/>)}
                  </div>
                </div>
              );
              if(id==='audit') return (
                <div key="audit" {...wrapProps('audit','b-wide')}>
                  <div className={`card${fullscreen==='audit'?' fs':''}`}>
                    <div className="card-title">
                      <DragHandle id="audit"/>
                      <div className="dot"/>Recent Audit Activity
                      <div style={{marginLeft:'auto',display:'flex',gap:6,alignItems:'center'}}>
                        <VizSelect id="audit"/>
                        <button className="collapse-btn" style={{margin:0}} onClick={()=>toggleCollapse('audit')} title={collapsed['audit']?'Expand':'Collapse'}>{collapsed['audit']?'▶':'▼'}</button>
                        <button className="fs-btn" onClick={()=>toggleFs('audit')} title="Fullscreen">⤢</button>
                      </div>
                    </div>
                    {!collapsed['audit']&&(getViz('audit')==='table'
                      ?<AuditTable logs={auditLogs} limit={rl('audit-ov',10)}/>
                      :(()=>{
                        const cnt=auditLogs.reduce((a,l)=>{a[l.action]=(a[l.action]||0)+1;return a},{});
                        const actRows=Object.entries(cnt).map(([action,count])=>({action,count}));
                        return <WidgetViz data={getViz('audit')==='raw'?auditLogs:actRows} viz={getViz('audit')}
                          columns={[{key:'action',label:'Action'},{key:'count',label:'Events'}]}
                          labelKey="action" valueKey="count" rowColor={r=>actionColor(r.action)} defaultRows={10}/>;
                      })())}
                  </div>
                </div>
              );
              if(id==='pols') return (
                <div key="pols" {...wrapProps('pols')}>
                  <div className={`card${fullscreen==='pols'?' fs':''}`}>
                    <div className="card-title">
                      <DragHandle id="pols"/>
                      <div className="dot" style={{background:'var(--gray-400)'}}/>Security Policies
                      <div style={{marginLeft:'auto',display:'flex',gap:6,alignItems:'center'}}>
                        <VizSelect id="pols" def="panel" opts={[['panel','Panel'],['table','Table'],['bar','Bar'],['raw','Raw']]}/>
                        <button className="collapse-btn" style={{margin:0}} onClick={()=>toggleCollapse('pols')} title={collapsed['pols']?'Expand':'Collapse'}>{collapsed['pols']?'▶':'▼'}</button>
                        <button className="fs-btn" onClick={()=>toggleFs('pols')} title="Fullscreen">⤢</button>
                      </div>
                    </div>
                    {!collapsed['pols']&&(getViz('pols','panel')==='panel'
                      ?<PoliciesPanel policies={secPolicies}/>
                      :<WidgetViz data={secPolicies} viz={getViz('pols','panel')}
                        columns={[{key:'name',label:'Policy'},{key:'action',label:'Action'},{key:'rules',label:'Rules'},{key:'active',label:'Active',render:p=>p.active?'Yes':'No'}]}
                        labelKey="name" valueKey="rules" defaultRows={10}/>)}
                  </div>
                </div>
              );
              if(id==='feeds') return (
                <div key="feeds" {...wrapProps('feeds','b-wide')}>
                  <div className={`card${fullscreen==='feeds'?' fs':''}`}>
                    <div className="card-title">
                      <DragHandle id="feeds"/>
                      <div className="dot" style={{background:'var(--red)'}}/>Top Threat Feeds by Severity
                      <div style={{marginLeft:'auto',display:'flex',gap:6,alignItems:'center'}}>
                        <VizSelect id="feeds"/>
                        <button className="collapse-btn" style={{margin:0}} onClick={()=>toggleCollapse('feeds')} title={collapsed['feeds']?'Expand':'Collapse'}>{collapsed['feeds']?'▶':'▼'}</button>
                        <button className="fs-btn" onClick={()=>toggleFs('feeds')} title="Fullscreen">⤢</button>
                      </div>
                    </div>
                    {!collapsed['feeds']&&(getViz('feeds')==='table'
                      ?<FeedsTable feeds={feeds}/>
                      :<WidgetViz data={[...feeds].sort((a,b)=>b.entries-a.entries)} viz={getViz('feeds')}
                        columns={[{key:'name',label:'Feed'},{key:'cat',label:'Category'},{key:'level',label:'Level'},{key:'entries',label:'Entries'}]}
                        labelKey="name" valueKey="entries" rowColor={r=>levelColor(r.level)} defaultRows={10}/>)}
                  </div>
                </div>
              );
              return null;
            })}
            </div>
          </>
        )}

        {/* ── IPAM ── */}
        {section==='ipam'&&(()=>{
          // Single-IP /32 subnets are trivially 100% and flood the table; hide them
          // by default (revealable). One pool drives the title, chip counts, and rows.
          const ipamPool = ipamShowTiny ? s_subnets : s_subnets.filter(s=>s.total>1);
          const tinyCount = s_subnets.length - ipamPool.length;
          return (
          <div className="card">
            <div className="card-title"><div className="dot"/>All Subnets — DHCP Utilization ({ipamPool.length}{sq&&` of ${subnets.length}`})</div>
            <RowLimitBar limit={rl('ipam')} setLimit={v=>setRl('ipam',v)}/>
              <div className="chip-bar">
                {[
                  {label:'All', val:null, count:ipamPool.length},
                  {label:'Critical ≥90%', val:'critical', count:ipamPool.filter(s=>s.util>=90).length},
                  {label:'Warning 75–89%', val:'warning', count:ipamPool.filter(s=>s.util>=75&&s.util<90).length},
                  {label:'Healthy <75%', val:'healthy', count:ipamPool.filter(s=>s.util<75).length},
                ].map(c=>(
                  <button key={c.val} className={`chip${ipamChip===c.val?' on':''}`}
                    onClick={()=>setIpamChip(c.val)}>
                    {c.label} <span style={{opacity:.6}}>({c.count})</span>
                  </button>
                ))}
                {tinyCount>0&&(
                  <button className="sr-toggle" style={{marginTop:0}} onClick={()=>setIpamShowTiny(v=>!v)}>
                    {ipamShowTiny?`Hide ${tinyCount} single-IP`:`+ ${tinyCount} single-IP subnet${tinyCount>1?'s':''} hidden — show`}
                  </button>
                )}
              </div>
            <IPAMTable subnets={ipamPool} ipamChip={ipamChip} rowLimit={rl('ipam')} leaseCt={leaseCt}/>
          </div>
          );
        })()}

        {/* ── DHCP ── */}
        {section==='dhcp'&&(
          <>
            <div className="g3 mb20">
              {[
                {v:s_leases.filter(l=>l.state==='active').length, l:'Active Leases',  c:'var(--teal)'},
                {v:s_leases.filter(l=>l.state==='expired').length,l:'Expired Leases', c:'var(--amber)'},
                {v:Object.keys(leaseCt).length,                   l:'Subnets w/ Leases',c:'var(--gray-200)'},
              ].map((x,i)=>(
                <div key={i} className="card" style={{textAlign:'center'}}>
                  <div style={{fontSize:30,fontWeight:800,color:x.c}}>{x.v}</div>
                  <div style={{fontSize:10,color:'var(--gray-400)',marginTop:4,textTransform:'uppercase',letterSpacing:'.1em'}}>{x.l}</div>
                </div>
              ))}
            </div>
            <div className="card">
              <div className="card-title"><div className="dot"/>DHCP Leases{sq?` — filtered (${s_leases.length})`:` (showing ${rl('dhcp')} of ${s_leases.length})`}</div>
              <RowLimitBar limit={rl('dhcp')} setLimit={v=>setRl('dhcp',v)}/>
              <DhcpTable leases={s_leases} rowLimit={rl('dhcp')}/>
            </div>
          </>
        )}

        {/* ── DNS ── */}
        {section==='dns'&&(
          <>
            <div className="g3 mb20">
              {[
                {v:dnsViews.length,  l:'DNS Views',     c:'var(--teal)'},
                {v:zones.length,     l:'Auth Zones',    c:'var(--gray-200)'},
                {v:ttlBad.length,    l:'TTL Anomalies', c:'var(--amber)'},
              ].map((x,i)=>(
                <div key={i} className="card" style={{textAlign:'center'}}>
                  <div style={{fontSize:30,fontWeight:800,color:x.c}}>{x.v}</div>
                  <div style={{fontSize:10,color:'var(--gray-400)',marginTop:4,textTransform:'uppercase',letterSpacing:'.1em'}}>{x.l}</div>
                </div>
              ))}
            </div>
            <div className="g2">
              <div className="card">
                <div className="card-title"><div className="dot" style={{background:'var(--amber)'}}/>Zones with TTL Issues</div>
                <TTLTable zones={s_zones}/>
                {(()=>{
                  const drillZone = zoneFilt ? (s_zones.find(z=>z.id===zoneFilt)||zones.find(z=>z.id===zoneFilt)) : null;
                  return drillZone&&(
                    <div className="drill-panel">
                      <div className="drill-header">
                        <span className="drill-title" style={{fontFamily:'monospace'}}>⊞ {drillZone.fqdn}</span>
                        <button className="drill-close" onClick={()=>setZoneFilt(null)} aria-label="Close drill-down">×</button>
                      </div>
                      <div style={{display:'flex',gap:20,flexWrap:'wrap'}}>
                        {[
                          {l:'View', v:drillZone.view},
                          {l:'TTL', v:drillZone.ttl+'s', c:drillZone.ttl<60||drillZone.ttl>86400?'var(--sev-red-t)':'var(--gray-200)'},
                          {l:'Neg TTL', v:drillZone.neg_ttl+'s', c:drillZone.neg_ttl>3600?'var(--sev-amber-t)':'var(--gray-200)'},
                          {l:'Records', v:drillZone.records},
                          {l:'Anomaly', v:drillZone.anomaly?'Yes':'No', c:drillZone.anomaly?'var(--sev-red-t)':'var(--green)'},
                        ].map((x,i)=>(
                          <div key={i} style={{fontSize:11}}>
                            <div style={{color:'var(--gray-400)',fontSize:9,textTransform:'uppercase',letterSpacing:'.08em',marginBottom:2}}>{x.l}</div>
                            <div style={{color:x.c||'var(--gray-200)',fontWeight:600}}>{x.v}</div>
                          </div>
                        ))}
                      </div>
                      {drillZone.anomaly&&drillZone.issues.length>0&&(
                        <div style={{marginTop:8,display:'flex',gap:5,flexWrap:'wrap'}}>
                          {drillZone.issues.map((iss,i)=><span key={i} className={`badge ${iss.includes('High')||iss.includes('Too High')?'b-amber':'b-red'}`}>{iss}</span>)}
                        </div>
                      )}
                    </div>
                  );
                })()}
              </div>
              <div className="card">
                <div className="card-title"><div className="dot"/>Top NXDOMAINs</div>
                <NXProxy zones={s_zones}/>
              </div>
            </div>
          </>
        )}

        {/* ── HOSTS ── */}
        {section==='hosts'&&(
          <div className="g2">
            <div className="card">
              <div className="card-title"><div className="dot"/>Status Breakdown</div>
              <Donut hosts={hosts} filter={hostFilt} onSlice={s=>setHostFilt(f=>f===s?null:s)}/>
              {hostFilt&&<div style={{textAlign:'center',fontSize:11,color:'var(--teal)',marginTop:8}}>Filtered: <b>{hostFilt}</b> — click segment to clear</div>}
            </div>
            <div className="card">
              <div className="card-title"><div className="dot"/>Host List {hostFilt&&`— ${hostFilt} (${filtHosts.length})`}</div>
              <RowLimitBar limit={rl('hosts')} setLimit={v=>setRl('hosts',v)}/>
              <div className="chip-bar">
                {['online','degraded','offline','error','pending'].map(st=>{
                  const cnt=hosts.filter(h=>h.status===st).length;
                  if(!cnt) return null;
                  const colors={online:CK.green(),degraded:CK.amber(),offline:'var(--gray-400)',error:CK.red(),pending:'var(--teal)'};
                  return (
                    <button key={st} className={`chip${hostChip===st?' on':''}`}
                      style={hostChip===st?{borderColor:colors[st],color:colors[st]}:{}}
                      onClick={()=>setHostChip(h=>h===st?null:st)}>
                      {st} ({cnt})
                    </button>
                  );
                })}
                {hostChip&&<button className="chip" onClick={()=>setHostChip(null)}>✕ clear</button>}
              </div>
              <HostsTable hosts={filtHosts} rowLimit={rl('hosts')}/>
            </div>
            <div className="card b-full">
              <div className="card-title"><div className="dot"/>Host Performance Metrics — avg, last hour</div>
              {lazyErr.hostMetrics
                ? <PanelError what="host metrics" onRetry={()=>lazyFetch('hostMetrics','/api/host-metrics',setHostMetrics)}/>
                : <HostMetricsPanel data={hostMetrics}/>}
            </div>
          </div>
        )}

        {/* ── SECURITY ── */}
        {section==='security'&&(
          <div className="card">
            <div className="card-title"><div className="dot"/>Security Policies ({s_policies.length}{sq&&` of ${secPolicies.length}`})</div>
            <PoliciesPanel policies={s_policies}/>
          </div>
        )}

        {/* ── THREATS ── */}
        {section==='threats'&&(
          <div className="card">
            <div className="card-title"><div className="dot" style={{background:'var(--red)'}}/>All Threat Feeds by Severity{sq&&` (${s_feeds.length} of ${feeds.length})`}</div>
            <RowLimitBar limit={rl('threats')} setLimit={v=>setRl('threats',v)}/>
            <FeedsTable feeds={s_feeds.slice(0,rl('threats'))}/>
          </div>
        )}

        {/* ── AUDIT ── */}
        {section==='audit'&&(
          <div className="card">
            <div className="card-title"><div className="dot"/>Audit Log — {sq?`${s_logs.length} of `:'Last '}{auditLogs.length} Entries</div>
            <RowLimitBar limit={rl('audit')} setLimit={v=>setRl('audit',v)}/>
            <AuditTable logs={s_logs} limit={rl('audit')}/>
          </div>
        )}

        {/* ── DNS ANALYTICS ── */}
        {section==='dns-analytics'&&(
          lazyErr['dns-analytics']
            ? <div className="card"><PanelError what="DNS analytics" onRetry={()=>lazyFetch('dns-analytics','/api/dns-analytics',setDnsAnalytics)}/></div>
            : <DnsAnalyticsPanel data={dnsAnalytics} rowLimit={rl('dns-clients')} setRowLimit={v=>setRl('dns-clients',v)}/>
        )}

        {/* ── SOC INSIGHTS ── */}
        {section==='insights'&&(
          lazyErr.insights
            ? <div className="card"><PanelError what="SOC insights" onRetry={()=>lazyFetch('insights','/api/insights',setInsights)}/></div>
            : <InsightsPanel data={insights} rowLimit={rl('insights')} setRowLimit={v=>setRl('insights',v)}/>
        )}

        {/* ── IQ ACTIONS ── */}
        {section==='actions'&&(
          <div className="card">
            <div className="card-title"><div className="dot"/>IQ Actions — recent automated actions</div>
            {lazyErr.actions
              ? <PanelError what="IQ actions" onRetry={()=>lazyFetch('actions','/api/actions',setActions)}/>
              : <ActionsPanel data={actions} rowLimit={rl('actions')} setRowLimit={v=>setRl('actions',v)}/>}
          </div>
        )}

        {/* ── THREAT LOOKUP ── */}
        {section==='alerts'&&(
          <AlertsPanel data={data} rules={alertRules} setRules={setAlertRules}/>
        )}
        {section==='threat-lookup'&&(
          <div className="card">
            <div className="card-title"><div className="dot" style={{background:'var(--red)'}}/>Entity & Threat Lookup</div>
            <ThreatLookupPanel/>
          </div>
        )}

        {section==='search'&&(
          <SearchSection
            data={data}
            srchQ={srchQ} setSrchQ={setSrchQ}
            srchRes={srchRes} setSrchRes={setSrchRes}
            srching={srching} setSrching={setSrching}
            searchHistory={searchHistory} setSearchHistory={setSearchHistory}
          />
        )}

      </div>

      {showShortcuts&&(
        <div className="shortcut-overlay" onClick={()=>setShowShortcuts(false)}>
          <div className="shortcut-box" onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:14,fontWeight:700,color:'var(--teal)',marginBottom:14}}>Keyboard Shortcuts</div>
            {[
              ['⌘K','Command palette'],['1–9','Navigate sections'],['r','Refresh data'],['/','Jump to Search'],
              ['?','Toggle this help'],['Esc','Close panels / clear filters'],
            ].map(([k,d])=>(
              <div key={k} style={{display:'flex',alignItems:'center',marginBottom:8,fontSize:12}}>
                <span className="kbd">{k}</span><span style={{color:'var(--gray-200)'}}>{d}</span>
              </div>
            ))}
            <div style={{marginTop:12,fontSize:10,color:'var(--gray-400)'}}>Click anywhere to close</div>
          </div>
        </div>
      )}
      <CommandPalette open={cmdkOpen} onClose={()=>setCmdkOpen(false)} commands={commands}/>
      <Toasts/>
      <ChatPanel
        open={chatOpen} onClose={()=>setChatOpen(false)}
        data={data}
        messages={messages} setMessages={setMessages}
        queryMode={queryMode} setQueryMode={setQueryMode}
        searchQuery={searchQuery} setSearchQuery={setSearchQuery}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<VaultGate/>);
</script>
</body>
</html>
