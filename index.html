<script>
/* apply saved theme before first paint (no flash) */
(function(){try{
  var t=JSON.parse(localStorage.getItem('noc.theme')||'"system"');
  var resolved=(t==='system'||!t)?(window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark'):t;
  document.documentElement.setAttribute('data-theme',resolved);
}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();
window.onerror = function(msg,src,line,col,err) {
  var pre = document.createElement('pre');
  pre.style.cssText = 'background:#131312;color:#FCA5A5;padding:24px;font-size:13px;white-space:pre-wrap';
  pre.textContent = 'DASHBOARD ERROR\n\n' + msg + '\n\nSource: ' + src + '\nLine: ' + line + '\n\n' + ((err && err.stack) || '');
  document.body.innerHTML = '';
  document.body.appendChild(pre);
};
</script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* surfaces */
  --blue-deep:#1e2420;--blue-mid:#161a18;--blue-dark:#0d0f0e;
  --surface:#161a18;--surface-2:#1e2420;--surface-3:#242b26;
  --border:rgba(240,240,236,0.08);
  /* accent — New Relic blue replaces teal */
  --teal:#e86340;--teal-bright:#f07850;
  /* text ramp */
  --gray-100:#e8e8ea;--gray-200:#e8e8ea;--gray-400:#75767b;--gray-500:#75767b;--gray-600:#5a5b60;
  --ink:#f0f0ec;--ink-dim:rgba(240,240,236,0.50);--muted:#848783;
  /* semantic status */
  --red:#e85050;--amber:#e8a030;--green:#38c06c;
  --red-bg:rgba(232,80,80,0.10);--red-border:rgba(232,80,80,0.35);--red-text:#e85050;
  --amber-bg:rgba(232,160,48,0.10);--amber-border:rgba(232,160,48,0.35);--amber-text:#e8a030;
  --green-bg:rgba(56,192,108,0.10);--green-border:rgba(56,192,108,0.35);--green-text:#38c06c;
  /* type scale */
  --fs-2xs:10px;--fs-xs:11px;--fs-sm:12px;--fs-base:13px;--fs-md:14px;--fs-lg:20px;--fs-xl:28px;--fs-2xl:48px;
  /* interaction */
  --hover:rgba(240,240,236,.04);
  --hover-strong:rgba(240,240,236,.10);
  --tint:rgba(232,99,64,.12);
  --tint-border:rgba(232,99,64,.35);
  --row-border:rgba(240,240,236,.07);
  --svg-track:rgba(240,240,236,.04);
  --svg-grid:rgba(240,240,236,.07);
  --focus-border:rgba(232,99,64,.55);
  /* severity badge tints */
  --sev-red-t:#e85050;--sev-amber-t:#e8a030;--sev-green-t:#38c06c;
  --badge-red-bg:rgba(232,80,80,0.10);--badge-red-bd:rgba(232,80,80,0.35);
  --badge-amber-bg:rgba(232,160,48,0.10);--badge-amber-bd:rgba(232,160,48,0.35);
  --badge-green-bg:rgba(56,192,108,0.10);--badge-green-bd:rgba(56,192,108,0.35);
  --badge-gray-bg:rgba(240,240,236,.06);--badge-gray-bd:rgba(240,240,236,.12);--badge-gray-tx:var(--gray-200);
  --shadow-card:0 1px 3px rgba(0,0,0,.4),0 1px 2px rgba(0,0,0,.3);
  --brand:#e86340;--latch-bg:rgba(232,80,80,0.08);--latch-border:rgba(232,80,80,0.35);
  /* fonts */
  --font-ui:"DM Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --font-data:"JetBrains Mono","SF Mono",ui-monospace,monospace;
  --font-mono:var(--font-data);
  --font-serif:Georgia,"Times New Roman",serif;
  /* new alias names (v5 token spec) */
  --background:#0d0f0e;--text:#f0f0ec;--accent:#e86340;
  --danger:#e85050;--warning:#e8a030;--success:#38c06c;--info:#e86340;
  --danger-bg:rgba(232,80,80,0.10);--warning-bg:rgba(232,160,48,0.10);
  --success-bg:rgba(56,192,108,0.10);--info-bg:rgba(232,99,64,0.10);
  --radius:3px;
  color-scheme:dark;
}
:root[data-theme="light"]{
  /* surfaces — New Relic light palette */
  --blue-deep:#e3ddd7;--blue-mid:#ede9e3;--blue-dark:#f5f2ed;
  --surface:#ede9e3;--surface-2:#e3ddd7;--surface-3:#d8d2cb;
  --border:rgba(26,24,20,0.09);
  /* accent */
  --teal:#b54218;--teal-bright:#c85020;
  /* text ramp */
  --gray-100:#232429;--gray-200:#232429;--gray-400:#6b6c71;--gray-500:#6b6c71;--gray-600:#a8a9ad;
  --ink:#1a1814;--ink-dim:rgba(26,24,20,0.35);--muted:#5e5c57;
  /* semantic status */
  --red:#a82020;--amber:#8a4a0e;--green:#1f7a42;
  --red-bg:rgba(168,32,32,0.08);--red-border:rgba(168,32,32,0.42);--red-text:#a82020;
  --amber-bg:rgba(138,74,14,0.09);--amber-border:rgba(138,74,14,0.42);--amber-text:#8a4a0e;
  --green-bg:rgba(31,122,66,0.09);--green-border:rgba(31,122,66,0.42);--green-text:#1f7a42;
  /* interaction */
  --hover:rgba(26,24,20,.03);
  --hover-strong:rgba(26,24,20,.07);
  --tint:rgba(181,66,24,.10);
  --tint-border:rgba(181,66,24,.30);
  --row-border:rgba(26,24,20,.07);
  --svg-track:rgba(26,24,20,.05);
  --svg-grid:rgba(26,24,20,.08);
  --focus-border:rgba(181,66,24,.55);
  /* severity badge tints */
  --sev-red-t:#a82020;--sev-amber-t:#8a4a0e;--sev-green-t:#1f7a42;
  --badge-red-bg:rgba(168,32,32,0.08);--badge-red-bd:rgba(168,32,32,0.42);
  --badge-amber-bg:rgba(138,74,14,0.09);--badge-amber-bd:rgba(138,74,14,0.42);
  --badge-green-bg:rgba(31,122,66,0.09);--badge-green-bd:rgba(31,122,66,0.42);
  --badge-gray-bg:rgba(26,24,20,.06);--badge-gray-bd:rgba(26,24,20,.16);--badge-gray-tx:var(--gray-200);
  --shadow-card:0 1px 2px rgba(35,36,41,.08),0 1px 3px rgba(35,36,41,.06);
  --brand:#b54218;--latch-bg:rgba(168,32,32,.06);--latch-border:rgba(168,32,32,.32);
  /* new alias names (v5 token spec) */
  --background:#f5f2ed;--text:#1a1814;--accent:#b54218;
  --danger:#a82020;--warning:#8a4a0e;--success:#1f7a42;--info:#b54218;
  --danger-bg:rgba(168,32,32,0.08);--warning-bg:rgba(138,74,14,0.09);
  --success-bg:rgba(31,122,66,0.09);--info-bg:rgba(181,66,24,0.07);
  color-scheme:light;
}
body{background:var(--blue-dark);color:var(--ink);font-family:var(--font-ui);margin:0;padding-left:var(--sbw,44px);padding-top:48px;overflow-x:hidden;line-height:1.5;transition:background .2s,color .2s,padding-left .2s}
body.chat-open{padding-right:340px}
@media(max-width:760px){body.chat-open{padding-right:0}}
.sidebar{width:224px;min-width:224px;background:var(--blue-mid);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:stretch;position:fixed;top:48px;left:0;bottom:0;height:calc(100vh - 48px);z-index:100;overflow:hidden;transition:width .2s cubic-bezier(.4,0,.2,1)}
.logo{padding:18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:flex-start;gap:10px;width:100%}
.logo-mark{width:26px;height:26px;border-radius:5px;background:#fff;padding:1px;flex-shrink:0}
.logo-text{font-size:12px;font-weight:700;color:var(--teal);letter-spacing:.04em}
.logo-sub{font-size:10px;color:var(--gray-400);letter-spacing:.1em;margin-top:1px}
.sidebar-nav{flex:1;padding:6px 0;overflow-y:auto;width:100%}
.nav-item.active{background:var(--tint);color:var(--ink);font-weight:600}
.nav-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;height:100%;background:var(--teal);border-radius:0 2px 2px 0}
.nav-icon{width:18px;height:18px;display:flex;align-items:center;justify-content:center;color:var(--gray-400);transition:color .12s;flex-shrink:0;font-size:16px}
.nav-item:hover .nav-icon,.nav-item.active .nav-icon{color:var(--teal)}
.sidebar-foot{display:block}
/* collapsed state */
.sidebar.collapsed{width:44px;min-width:44px;align-items:center}
.sidebar.collapsed .logo{padding:10px 0;justify-content:center}
.sidebar.collapsed .logo-text,.sidebar.collapsed .logo-sub{display:none}
.sidebar.collapsed .nav-sec{display:none}
.sidebar.collapsed .nav-item{justify-content:center;gap:0;padding:10px 0;font-size:0;width:44px}
.sidebar.collapsed .nav-lbl{display:none}
.sidebar.collapsed .nav-badge-wrap{position:absolute;top:3px;right:3px}
.sidebar.collapsed .sidebar-foot{display:none}
/* collapse toggle button */
.sidebar-collapse-btn{display:flex;align-items:center;justify-content:center;width:100%;padding:8px;background:none;border:none;border-top:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:18px;line-height:1;flex-shrink:0;transition:color .12s,background .12s}
.sidebar-collapse-btn:hover{color:var(--ink);background:var(--hover)}
.sidebar.collapsed .sidebar-collapse-btn{padding:8px 0;width:44px}
/* mobile drawer — sidebar slides in at full 224px */
.sidebar.open{width:224px;min-width:224px;align-items:stretch}
.sidebar.open .logo{padding:18px 16px;justify-content:flex-start}
.sidebar.open .logo-text,.sidebar.open .logo-sub{display:block}
.sidebar.open .nav-sec{display:block}
.sidebar.open .nav-item{justify-content:flex-start;gap:9px;padding:8px 10px;font-size:13px;width:100%}
.sidebar.open .nav-lbl{display:inline}
.sidebar.open .nav-badge-wrap{position:static}
.sidebar.open .sidebar-foot{display:block}
/* sidebar becomes off-canvas settings drawer — nav moves to topbar */
.sidebar{transform:translateX(-100%);transition:transform .2s cubic-bezier(.4,0,.2,1),width .2s cubic-bezier(.4,0,.2,1);box-shadow:none}
.sidebar.open{transform:translateX(0);box-shadow:0 0 40px rgba(0,0,0,.35);width:224px;min-width:224px}
.sidebar-collapse-btn{display:none}
body{padding-left:0!important}
.sidebar-icon-strip .theme-btn{margin-left:0}
.sf-menu{padding:4px 0}
.sf-row{display:flex;align-items:center;gap:8px;padding:5px 14px;cursor:pointer;font-size:11px;color:var(--gray-200);background:none;border:none;width:100%;text-align:left;font-family:inherit;line-height:1}
.sf-row:hover{background:var(--hover)}
.sf-row:focus-visible{outline:2px solid var(--teal);outline-offset:-2px}
.sf-ico{width:14px;text-align:center;font-size:12px;color:var(--gray-400);flex-shrink:0}
.sf-lbl{flex:1}
.sf-val{font-size:9px;color:var(--gray-500);background:var(--surface-2);border:1px solid var(--border);border-radius:3px;padding:1px 5px;white-space:nowrap}
.sf-hint{font-size:9px;color:var(--gray-600)}
.sf-sep{height:1px;background:var(--border);margin:3px 0}
.sidebar-foot{padding:10px 0 4px;border-top:1px solid var(--border);font-size:11px;color:var(--gray-400);position:relative}
.sf-status{padding:0 14px 8px;}
.rb-badge{display:flex;align-items:center;gap:6px;padding:8px 10px;background:var(--red-bg);border:1px solid var(--red-border);border-radius:var(--radius);margin-top:6px}
.rb-badge-ico{font-size:11px;color:var(--red);flex-shrink:0}
.rb-badge-body{flex:1;min-width:0}
.rb-badge-title{font-size:10px;font-weight:600;color:var(--red-text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rb-badge-sub{font-size:10px;color:var(--gray-400);margin-top:1px}
.rb-badge-actions{display:flex;align-items:center;gap:3px;flex-shrink:0}
.rb-btn-retry{font-size:10px;padding:2px 6px;border-radius:3px;border:1px solid var(--red-border);background:rgba(239,68,68,.15);color:var(--red-text);cursor:pointer;transition:background .12s}
.rb-btn-retry:hover{background:rgba(239,68,68,.25)}
.rb-btn-x{background:none;border:none;color:var(--gray-400);cursor:pointer;font-size:13px;line-height:1;padding:0 2px;display:flex;align-items:center;transition:color .12s}
.rb-btn-x:hover{color:var(--gray-200)}
.main{padding:0 20px 40px;flex:1;min-width:0;max-width:100%;width:100%;overflow:visible}
.topbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:nowrap;margin-bottom:16px;padding:0 14px 0 14px;height:48px;border-bottom:1px solid var(--border);position:fixed;top:0;left:0;right:0;z-index:150;background:var(--blue-mid)}
.page-title{font-size:15px;font-weight:700;line-height:1.15}
.page-sub{font-size:12px;color:var(--muted);margin-top:0;margin-left:8px}
.refresh-btn{display:flex;align-items:center;gap:8px;background:var(--blue-deep);border:1px solid var(--teal);color:var(--teal);padding:8px 14px;border-radius:var(--radius);cursor:pointer;font-size:12px;font-weight:600;transition:background .12s,border-color .12s}
.refresh-btn:hover{background:var(--hover-strong)}.refresh-btn:disabled{opacity:.5;cursor:default}
/* nav clock */
.nav-clock{font-family:var(--font-mono);font-size:13px;color:var(--muted);letter-spacing:.05em;min-width:62px;text-align:right;margin-right:4px}
.spin{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;scroll-behavior:auto!important}}
/* ── status strip ── */
.status-strip{position:fixed;top:0;left:0;right:0;height:32px;z-index:160;display:flex;align-items:center;gap:4px;padding:0 12px;background:var(--blue-deep);border-bottom:1px solid var(--border);font-family:var(--font-mono);font-size:11px}
.ss-logo{display:flex;align-items:center;gap:8px;padding:0 10px 0 0;border-right:1px solid var(--border);margin-right:4px;flex-shrink:0}
.ss-logo-mark{width:18px;height:18px;border-radius:3px;background:var(--brand);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:#fff;flex-shrink:0}
.ss-logo-img{width:18px;height:18px;border-radius:3px;object-fit:contain;flex-shrink:0;background:#fff;padding:1px}
.ss-logo-name{font-size:11px;font-weight:700;color:var(--teal);letter-spacing:.04em}
.ss-pill{display:flex;align-items:center;gap:5px;padding:3px 8px;border-radius:3px;background:var(--surface-2);border:1px solid var(--border);color:var(--gray-200);cursor:pointer;white-space:nowrap;transition:background .12s,border-color .12s;font-size:10px;font-family:var(--font-mono)}
.ss-pill:hover{background:var(--hover-strong);border-color:var(--teal)}
.ss-pill .ss-lbl{color:var(--gray-400);letter-spacing:.08em;font-size:9px}
.ss-pill .ss-cnt{font-weight:700}
.ss-pill.crit{color:var(--sev-red-t);border-color:var(--badge-red-bd)}
.ss-pill.warn{color:var(--sev-amber-t);border-color:var(--badge-amber-bd)}
.ss-pill.ok{color:var(--sev-green-t)}
.ss-div{width:1px;height:16px;background:var(--border);margin:0 4px;flex-shrink:0}
.ss-clock{margin-left:auto;color:var(--muted);letter-spacing:.05em;font-size:11px;flex-shrink:0}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow-card);min-width:0;transition:border-color .15s,opacity .15s}
.card:not(.crit-state):not(.warn-state):hover{border-color:var(--teal);box-shadow:var(--shadow-card)}
.card.dim{opacity:.70}.card.dim:hover{opacity:.85}
.card.warn-state{opacity:1;border-left:3px solid var(--amber);box-shadow:var(--shadow-card)}
.card.warn-state:hover{border-color:rgba(210,153,34,.55)}
.card.crit-state{opacity:1;border-left:3px solid var(--red);box-shadow:var(--shadow-card)}
.card.crit-state:hover{border-color:rgba(248,81,73,.55)}
.card-title{font-size:var(--fs-sm);font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--gray-200);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--teal);flex-shrink:0}
.g4{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
.g2{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px}
.g3{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
@media(max-width:900px){.g3-2{grid-template-columns:1fr}}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}
.kpi-val{font-family:var(--font-mono);font-size:28px;font-weight:400;font-variant-numeric:tabular-nums;color:var(--ink);line-height:1.1;letter-spacing:-.01em;margin-bottom:6px}
.kpi-val.crit{color:var(--red);font-weight:700}
.kpi-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.kpi-delta{font-size:11px;color:var(--muted);font-family:var(--font-mono);margin-top:4px}
.bento{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;align-items:start}
.section-view .bento{display:none!important}
.bento>*{min-width:0}
.b-wide{grid-column:span 2}
.b-full{grid-column:1/-1}
.ov-bento{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;align-items:start;margin-top:14px}
.ov-bento>*{min-width:0}
.ov-bento>.b-wide{grid-column:span 2}
.ov-bento>.b-full{grid-column:1/-1}
.ov-bento>.drag-card>.card{height:100%;box-sizing:border-box;max-height:none;overflow:auto}
.g2>*,.g3>*,.g4>*{min-width:0}
@media(max-width:900px){.b-wide,.b-full{grid-column:span 1}}
.mb14{margin-bottom:14px}
.mb20{margin-bottom:20px}
/* gauges */
/* tables */
.tbl{width:100%;border-collapse:collapse;table-layout:fixed}
.tbl th{text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--gray-400);padding:8px 10px;border-bottom:1px solid var(--border);white-space:normal}
.tbl td{padding:8px 10px;font-size:12px;line-height:1.4;border-bottom:1px solid var(--row-border)}
.tbl tr:hover td{background:var(--hover);border-left:2px solid var(--teal)}.tbl tr:hover td+td{border-left:none}
.tbl tr:last-child td{border-bottom:none}
.scroll{overflow-y:auto;overflow-x:auto;max-width:100%}
/* ── normalize overview widget heights: cap tall cards, scroll the body, keep header pinned ── */
.bento>.drag-card>.card{max-height:520px;overflow:auto}
.card.fs{max-height:none!important}
.bento>.drag-card>.card>.card-title{position:sticky;top:0;background:var(--surface);padding:2px 0 8px;margin-top:-2px;z-index:3}
/* ── tables FIT the card: fixed columns divide the width, no sideways scroll ── */
/* headers wrap naturally; title attr provides tooltip for long labels */
.tbl td{overflow-wrap:anywhere;word-break:break-word}
/* badges size to their full content */
.tbl td .badge{display:inline-block;vertical-align:middle;white-space:nowrap}
/* fixed layout means no horizontal scroll is needed; keep the header row visible while scrolling */
.scroll{overflow-x:hidden}
.scroll .tbl thead th{position:sticky;top:0;background:var(--surface);z-index:1}
/* badges */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.b-red{background:var(--badge-red-bg);color:var(--sev-red-t);border:1px solid var(--badge-red-bd)}
.b-amber{background:var(--badge-amber-bg);color:var(--sev-amber-t);border:1px solid var(--badge-amber-bd)}
.b-green{background:var(--badge-green-bg);color:var(--sev-green-t);border:1px solid var(--badge-green-bd)}
.b-teal{background:var(--tint);color:var(--teal);border:1px solid var(--tint-border)}
.b-gray{background:var(--badge-gray-bg);color:var(--badge-gray-tx);border:1px solid var(--badge-gray-bd)}
.show-more-btn{display:block;width:100%;padding:8px;border:none;background:none;color:var(--teal);font-size:11px;font-weight:600;cursor:pointer;text-align:center;border-top:1px solid var(--border);margin-top:4px;transition:background .12s}
.show-more-btn:hover{background:var(--hover)}
/* spinner / loading */
.spinner{width:30px;height:30px;border:3px solid var(--surface-3);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;margin:36px auto}
.no-data{text-align:center;padding:48px 36px;color:var(--gray-400);font-size:12px;line-height:1.6}
/* latch strip — ATC-style critical alert bar */
.latch-strip{height:36px;background:var(--latch-bg);border-bottom:1px solid var(--latch-border);display:flex;align-items:center;padding:0 14px;gap:0;overflow:hidden;margin-bottom:0}
.latch-text{font-family:var(--font-mono);font-size:12px;display:flex;align-items:center;flex:1;white-space:nowrap;overflow:hidden;gap:0}
.latch-crit{color:var(--red);margin-right:10px;font-weight:600}
.latch-sep{color:var(--latch-border);margin:0 8px}
.latch-label{color:var(--ink)}
.latch-stats{color:var(--muted);margin-left:6px}
.latch-spacer{flex:1}
/* alert banner */
.alert{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:var(--radius);padding:9px 13px;font-size:12px;color:var(--sev-red-t);display:flex;align-items:center;gap:8px}
/* status-tile matrix — one tile per domain, tinted by worst severity, glanceable across a room */
.health-banner.ok .hb-label{color:var(--sev-green-t)}.health-banner.issues-warn .hb-label{color:var(--sev-amber-t)}.health-banner.issues-crit .hb-label{color:var(--sev-red-t)}
.hb-pill.ok{background:var(--badge-green-bg);border:1px solid var(--badge-green-bd);color:var(--sev-green-t)}
.hb-pill.warn{background:var(--badge-amber-bg);border:1px solid var(--badge-amber-bd);color:var(--sev-amber-t)}
.hb-pill.crit{background:var(--badge-red-bg);border:1px solid var(--badge-red-bd);color:var(--sev-red-t)}
@media(max-width:1100px){.stiles{grid-template-columns:repeat(3,1fr)}}
@media(max-width:760px){.stiles{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.stiles{grid-template-columns:1fr}}
.stile.crit{background:rgba(239,68,68,.08);border-color:var(--badge-red-bd)}.stile.crit .stile-big{color:var(--sev-red-t)}.stile.crit .stile-st{background:var(--badge-red-bg);color:var(--sev-red-t)}
.stile.warn{background:rgba(245,158,11,.07);border-color:var(--badge-amber-bd)}.stile.warn .stile-big{color:var(--sev-amber-t)}.stile.warn .stile-st{background:var(--badge-amber-bg);color:var(--sev-amber-t)}
.stile.ok{background:var(--surface-2);border-color:var(--border)}.stile.ok .stile-big{color:var(--sev-green-t)}.stile.ok .stile-st{background:var(--badge-green-bg);color:var(--sev-green-t)}
/* policy items */
.pol-item{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.pol-item:last-child{border-bottom:none}
/* status dots */
.s-dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
/* inline bar */
.bar-track{width:72px;height:5px;background:var(--surface-3);border-radius:3px;display:inline-block;vertical-align:middle}
.bar-fill{height:100%;border-radius:3px}
/* top-subnets ranked list (compact, severity-colored) */
.subnet-rank-list{display:flex;flex-direction:column;gap:2px}
.subnet-rank-row{display:flex;align-items:center;gap:8px;width:100%;background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:4px;text-align:left;transition:background .12s,opacity .12s}
.subnet-rank-row:hover{background:var(--hover)}
.subnet-rank-row.active{background:var(--tint)}
.sr-num{flex:0 0 16px;text-align:right;font-size:10px;color:var(--gray-500);font-variant-numeric:tabular-nums}
.sr-name{flex:0 0 118px;font-size:11px;color:var(--gray-200);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-ut{flex:0 0 72px;text-align:right;font-size:10px;color:var(--gray-400);font-family:monospace;font-variant-numeric:tabular-nums}
.sr-bar{flex:1;height:6px;min-width:40px;background:var(--svg-track);border-radius:3px;overflow:hidden}
.sr-fill{display:block;height:100%;border-radius:3px;width:100%;transform-origin:left;transform:scaleX(0);transition:transform .35s cubic-bezier(.22,1,.36,1);will-change:transform}
.sr-pct{flex:0 0 38px;text-align:right;font-size:11px;font-weight:700;font-variant-numeric:tabular-nums}
.sr-collapse{display:flex;align-items:center;gap:6px;width:100%;text-align:left;background:var(--surface-2);border:1px dashed var(--border);border-radius:6px;padding:6px 8px;margin-bottom:4px;font-size:11px;color:var(--gray-400);cursor:pointer;font-family:inherit}
.sr-collapse b{color:var(--gray-200);font-weight:600}
.sr-collapse:hover{border-color:var(--gray-600)}
.sr-toggle{background:none;border:1px solid var(--border);border-radius:5px;color:var(--teal);font-size:10px;padding:3px 8px;margin-top:8px;cursor:pointer;font-family:inherit}
.sr-toggle:hover{border-color:var(--teal)}
.sr-empty{font-size:11px;color:var(--gray-400);padding:12px 4px;text-align:center}
/* tooltip */
.tt{background:var(--blue-mid);border:1px solid var(--border);border-radius:6px;padding:9px 13px;font-size:12px}
/* global tooltip layer */
.gtip{position:fixed;pointer-events:none;z-index:10000;background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:8px 12px;font-size:11px;color:var(--gray-100);line-height:1.45;max-width:240px;white-space:normal;box-shadow:0 4px 16px rgba(0,0,0,.45);animation:gtipIn .12s ease;font-weight:400;text-transform:none;letter-spacing:normal}
@keyframes gtipIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.gtip b{color:var(--teal);font-weight:600}
/* pulse */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.65}}
.pulse{animation:pulse 3s ease-in-out infinite}
/* scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--surface-2)}
::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--gray-600)}
/* chat panel */
.chat-panel{position:fixed;top:0;right:0;bottom:0;width:340px;background:var(--blue-mid);border-left:1px solid var(--border);display:flex;flex-direction:column;z-index:200;transform:translateX(100%);transition:transform .22s cubic-bezier(.4,0,.2,1)}
.chat-panel.open{transform:translateX(0)}
.chat-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.chat-head-title{font-size:13px;font-weight:700;color:var(--teal)}
.close-btn{background:none;border:none;color:var(--gray-400);cursor:pointer;font-size:18px;line-height:1;padding:2px 4px}
.close-btn:hover{color:var(--ink)}
.chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.msg-u{align-self:flex-end;background:var(--tint);border:1px solid var(--tint-border);border-radius:10px 10px 2px 10px;padding:9px 13px;font-size:12px;max-width:87%;line-height:1.5}
.msg-a{align-self:flex-start;background:var(--surface);border:1px solid var(--border);border-radius:10px 10px 10px 2px;padding:9px 13px;font-size:12px;max-width:92%;white-space:pre-wrap;line-height:1.5}
.chat-foot{padding:12px;border-top:1px solid var(--border);flex-shrink:0}
.mode-row{display:flex;gap:4px;background:var(--blue-dark);border-radius:var(--radius);padding:3px;margin-bottom:8px}
.mode-btn{flex:1;padding:4px 0;border-radius:4px;border:none;font-size:11px;font-weight:600;cursor:pointer;letter-spacing:.04em;transition:background .15s,color .15s}
.mode-btn.on{background:var(--surface-3);color:var(--teal)}
.mode-btn:not(.on){background:none;color:var(--gray-400)}
.chat-row{display:flex;gap:6px;align-items:flex-end}
.chat-in{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--ink);font-size:12px;padding:8px 11px;resize:none;font-family:inherit;max-height:90px;line-height:1.4}
.chat-in:focus{border-color:var(--focus-border)}
.send-b{background:var(--teal);border:none;border-radius:var(--radius);color:var(--blue-dark);font-size:16px;font-weight:900;padding:8px 12px;cursor:pointer;transition:background .15s;line-height:1;flex-shrink:0}
.send-b:hover{background:var(--teal-bright)}
.send-b:disabled{opacity:.35;cursor:default}
.chat-toggle-btn{display:flex;align-items:center;gap:8px;background:var(--blue-deep);border:1px solid var(--border);color:var(--gray-200);padding:8px 12px;border-radius:var(--radius);cursor:pointer;font-size:12px;font-weight:600;margin-left:8px;transition:background .12s,border-color .12s,color .12s}
.chat-toggle-btn:hover,.chat-toggle-btn.on{border-color:var(--teal);color:var(--teal);background:var(--hover-strong)}
/* unified notice rail — one vocabulary for alerts / demo / filter (severity-sorted) */
.notice-rail{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.notice{display:flex;align-items:center;gap:10px;border-radius:var(--radius);padding:8px 12px;font-size:12px;line-height:1.4;border:1px solid;animation:noticeIn .2s cubic-bezier(.16,1,.3,1) both}
.notice .n-ico{flex-shrink:0;width:15px;height:15px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border-radius:50%}

.notice .n-acts{display:flex;gap:6px;flex-shrink:0;align-items:center}

.n-btn{background:none;border:1px solid;border-radius:5px;font-size:11px;font-weight:600;padding:3px 10px;cursor:pointer;color:inherit;font-family:inherit}
.n-x{background:none;border:none;cursor:pointer;font-size:15px;line-height:1;flex-shrink:0;color:var(--gray-400);padding:0 2px}
.n-x:hover{color:var(--ink)}
.notice.n-red{background:rgba(239,68,68,.1);border-color:var(--badge-red-bd);color:var(--sev-red-t)}

.notice.n-amber{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.4);color:var(--sev-amber-t)}

[data-theme="light"] .notice.n-amber .n-ico{background:rgba(183,121,31,.12);color:var(--sev-amber-t)}
[data-theme="light"] .notice.n-amber b{color:var(--sev-amber-t)}
[data-theme="light"] .notice.n-amber .n-btn{border-color:rgba(183,121,31,.35);color:var(--sev-amber-t)}
[data-theme="light"] .notice.n-amber .n-btn:hover{background:rgba(183,121,31,.12)}
.n-more{align-self:flex-start;background:none;border:none;color:var(--gray-400);font-size:11px;font-weight:600;cursor:pointer;padding:2px 0;font-family:inherit}
.n-more:hover{color:var(--teal)}

.noc-layout{display:flex;gap:0}

.alert-col-header{padding:12px 14px 10px;border-bottom:1px solid var(--border);flex-shrink:0}

/* topbar grouping: primary actions | utility cluster */
.topbar-controls{display:flex;align-items:center;gap:12px;flex-wrap:nowrap;justify-content:flex-end;flex-shrink:0}
.topbar-group{display:flex;align-items:center;gap:6px}
.topbar-group .theme-btn,.topbar-group .chat-toggle-btn{margin-left:0}
.refresh-split{display:inline-flex}
.refresh-split .refresh-btn{border-top-right-radius:0;border-bottom-right-radius:0}
.refresh-split .theme-btn{border-radius:0 6px 6px 0;margin-left:0;border-left:none;font-size:11px;padding:8px 8px}
/* ── column controls ── */
.col-btn{background:none;border:1px solid var(--border);color:var(--gray-400);font-size:11px;border-radius:5px;padding:2px 8px;cursor:pointer;flex-shrink:0;line-height:1.4;transition:background .12s,border-color .12s,color .12s}
.col-btn:hover{border-color:var(--teal);color:var(--teal)}
.col-btn:focus-visible{outline:2px solid var(--teal);outline-offset:-2px}
.col-menu{position:absolute;right:0;top:calc(100% + 4px);background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px;min-width:230px;z-index:310;box-shadow:0 8px 24px rgba(0,0,0,.35)}
.col-menu-head{display:flex;justify-content:space-between;align-items:center;padding:4px 6px 8px;border-bottom:1px solid var(--border);margin-bottom:4px}
.col-menu-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--gray-400)}
.col-row{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:5px;font-size:12px;color:var(--gray-200)}
.col-row:hover{background:var(--hover)}
.col-row.col-hidden{opacity:.5}
.col-row input[type=checkbox]{accent-color:var(--teal);cursor:pointer;width:13px;height:13px;flex-shrink:0}
.col-row.col-dragging{opacity:.4}
.col-grip{cursor:grab;color:var(--gray-600);font-size:11px;flex-shrink:0;user-select:none}
.col-grip:active{cursor:grabbing}
/* ── command palette ── */
.cmdk-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:600;display:flex;align-items:flex-start;justify-content:center;padding-top:12vh;animation:cmkdOverlayIn .15s ease}
.cmdk-box{width:min(560px,92vw);background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:0 16px 48px rgba(0,0,0,.45);overflow:hidden;animation:cmkdBoxIn .2s cubic-bezier(.25,1,.5,1) both}
.cmdk-input{width:100%;background:none;border:none;border-bottom:1px solid var(--border);color:var(--ink);font-size:15px;padding:15px 18px;outline:none;font-family:inherit}
.cmdk-list{max-height:50vh;overflow-y:auto;padding:6px}
.cmdk-item{display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--gray-200)}
.cmdk-item .cmdk-icon{width:18px;text-align:center;color:var(--gray-400)}
.cmdk-item .cmdk-hint{margin-left:auto;font-size:10px;color:var(--gray-600);text-transform:uppercase;letter-spacing:.08em}
.cmdk-item.sel{background:var(--tint);color:var(--teal)}
.cmdk-item.sel .cmdk-icon{color:var(--teal)}
.cmdk-empty{padding:20px;text-align:center;color:var(--gray-400);font-size:12px}
.cmdk-foot{display:flex;gap:14px;padding:8px 14px;border-top:1px solid var(--border);font-size:10px;color:var(--gray-600)}
/* ── freshness pill ── */
.fresh-pill{display:inline-flex;align-items:center;gap:5px;font-size:10px;color:var(--gray-400);background:var(--surface-2);border:1px solid var(--border);border-radius:20px;padding:2px 9px;margin-left:8px;white-space:nowrap}
.fresh-dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.fresh-stale .fresh-dot{background:var(--amber)}
/* ── trace timeline (LLM tool calls) ── */
.trace-tl{margin:3px 0 8px;padding:8px 10px;background:var(--surface-2);border:1px solid var(--border);border-radius:7px}
.trace-hd{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--gray-400);margin-bottom:5px}
.trace-step{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--gray-200);padding:1px 0}
.trace-step .trace-tool{font-family:monospace;color:var(--teal)}
.trace-step .trace-n{width:15px;height:15px;border-radius:50%;background:var(--surface-3);color:var(--gray-400);font-size:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
/* ── toasts ── */
.toasts{position:fixed;bottom:16px;right:16px;z-index:650;display:flex;flex-direction:column;gap:8px;max-width:340px}
.toast{display:flex;align-items:flex-start;gap:9px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 13px;box-shadow:0 6px 20px rgba(0,0,0,.3);font-size:12px;color:var(--gray-200);animation:toastIn .2s cubic-bezier(.2,.8,.2,1)}
.toast-dot{width:8px;height:8px;border-radius:50%;margin-top:3px;flex-shrink:0;background:var(--teal)}
.toast.ok .toast-dot{background:var(--green)}.toast.err .toast-dot{background:var(--red)}.toast.warn .toast-dot{background:var(--amber)}
.toast-close{margin-left:auto;background:none;border:none;color:var(--gray-400);cursor:pointer;font-size:14px;line-height:1;padding:0 2px}
.toast-close:hover{color:var(--ink)}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
/* ── onboarding / demo banner ── */
/* version chip: amber when a newer build is available (notify only, no self-update) */
.ver-badge.upd{color:var(--sev-amber-t);background:var(--badge-amber-bg);border-color:var(--badge-amber-bd);cursor:pointer}
.ver-badge.upd:hover{background:rgba(245,158,11,.22)}
.ver-up-arrow{font-weight:700;margin:0 2px}
.upd-pop{margin:0 0 4px;background:var(--surface-2);border:1px solid var(--border);border-left:2px solid var(--amber);padding:10px 12px;font-size:11px;border-radius:4px}
.upd-pop .ver-line{font-size:12px;font-weight:600;color:var(--gray-100);margin-bottom:6px}
.upd-pop .ver-line .to{color:var(--sev-amber-t)}
.upd-pop a{color:var(--teal);font-size:11px;text-decoration:none}
.upd-pop a:hover{text-decoration:underline}
.upd-actions{display:flex;gap:6px;margin-top:8px}
.upd-actions button{flex:1;background:var(--blue-deep);border:1px solid var(--border);border-radius:5px;color:var(--teal);font-size:11px;font-weight:600;padding:5px 8px;cursor:pointer;font-family:inherit}
.upd-actions button:hover{border-color:var(--teal)}
.upd-actions button:disabled{opacity:.6;cursor:default}
.upd-actions button.primary{background:var(--sev-amber-t);border-color:var(--sev-amber-t);color:var(--blue-dark)}
.upd-actions button.primary:hover{background:var(--amber);border-color:var(--amber)}
.upd-spin{display:inline-block;width:11px;height:11px;border:2px solid rgba(0,0,0,.3);border-top-color:var(--blue-dark);border-radius:50%;vertical-align:-2px;margin-right:6px;animation:spin .8s linear infinite}
.upd-note{font-size:10px;color:var(--gray-400);margin-top:6px}
.ver-badge.updating{color:var(--sev-amber-t);background:var(--badge-amber-bg);border-color:var(--badge-amber-bd);display:inline-flex;align-items:center;gap:4px;padding:3px 8px;white-space:nowrap;max-width:none;cursor:default}
.ver-badge.updating .upd-spin{border:2px solid rgba(245,158,11,.25);border-top-color:var(--amber);width:10px;height:10px;border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
.ver-badge.upd-done{color:var(--sev-green-t);background:var(--badge-green-bg);border-color:var(--badge-green-bd);display:inline-flex;align-items:center;gap:4px;padding:3px 8px;white-space:nowrap;cursor:default}
.ver-upd-elapsed{font-size:9px;color:rgba(245,158,11,.7);font-variant-numeric:tabular-nums;flex-shrink:0}
/* ── panel error state ── */
.panel-error{text-align:center;padding:40px 24px;color:var(--gray-400);font-size:12px;line-height:1.6}
.panel-error .retry-btn{margin-top:12px;background:var(--blue-deep);border:1px solid var(--teal);color:var(--teal);border-radius:6px;padding:6px 16px;font-size:12px;font-weight:600;cursor:pointer}
.panel-error .retry-btn:hover{background:var(--hover-strong)}
/* ── a11y + mobile ── */
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
.sr-only-focusable:focus{position:fixed;top:8px;left:8px;z-index:9999;width:auto;height:auto;padding:8px 16px;clip:auto;white-space:normal;background:var(--surface);color:var(--ink);border:2px solid var(--teal);border-radius:6px;font-size:13px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.4)}
.menu-btn{display:inline-flex;align-items:center;background:var(--blue-deep);border:1px solid var(--border);color:var(--gray-200);border-radius:6px;cursor:pointer;font-size:16px;padding:6px 11px;margin-right:8px;line-height:1}
.menu-btn{display:inline-flex!important}
.sidebar-backdrop{display:none}
@media(max-width:760px){
  body{padding-left:0!important;padding-left:env(safe-area-inset-left,0)!important}
  .sidebar{transform:translateX(-100%);transition:transform .22s cubic-bezier(.25,1,.5,1);box-shadow:0 0 40px rgba(0,0,0,.5);padding-bottom:env(safe-area-inset-bottom,0)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-backdrop{display:block;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
  .menu-btn{display:inline-flex;align-items:center}
  .topbar{flex-wrap:nowrap;gap:0 4px} .nav-clock{display:none} .nav-breadcrumb{display:none} .nav-brand-name{display:none}
  .main{padding:0 14px max(40px,env(safe-area-inset-bottom,40px))}
  .chat-panel{width:100%}
  .page-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:calc(100vw - 180px)}
  .global-search{width:max(120px,30vw)!important}
}
/* tablet: keep topbar single-line, hide low-priority controls */
@media(max-width:1100px){ .topbar{flex-wrap:nowrap;gap:0 6px} .topbar-controls{gap:8px} .nav-clock{display:none} }
@media(max-width:1100px){ .topbar-controls .pill-select{padding:4px 6px;max-width:96px;font-size:10px} }
@media(max-width:480px){ .topbar-controls .pill-select{display:none} }
/* ── skeleton loaders ── */
.skel{background:linear-gradient(90deg,var(--surface-2) 25%,var(--surface-3) 37%,var(--surface-2) 63%);background-size:400% 100%;animation:skel 1.4s ease infinite;border-radius:5px}
@keyframes skel{0%{background-position:100% 0}100%{background-position:-100% 0}}
.skel-row{height:13px;margin:9px 0}
/* ── overview card entrance (staggered) ── */
@keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.bento>.drag-card{animation:cardIn .32s cubic-bezier(.2,.8,.2,1) both}
.bento>.drag-card:nth-child(2){animation-delay:.04s}
.bento>.drag-card:nth-child(3){animation-delay:.08s}
.bento>.drag-card:nth-child(4){animation-delay:.12s}
.bento>.drag-card:nth-child(5){animation-delay:.16s}
.bento>.drag-card:nth-child(6){animation-delay:.2s}
.bento>.drag-card:nth-child(7){animation-delay:.24s}
/* clearer drag drop indicator */
.drag-card.drag-over{outline:2px dashed var(--teal);outline-offset:4px;border-radius:10px;background:var(--hover)}
.col-row .col-lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.col-iconbtn{background:none;border:none;color:var(--gray-600);cursor:pointer;font-size:11px;padding:1px 3px;line-height:1;border-radius:3px;flex-shrink:0}
.col-iconbtn:hover{color:var(--teal);background:var(--hover-strong)}
.col-iconbtn:disabled{opacity:.25;cursor:default}
.col-iconbtn.on{color:var(--teal)}
.col-reset{background:none;border:none;color:var(--teal);font-size:10px;font-weight:600;cursor:pointer;padding:0}
.tbl td.exp,.tbl th.exp{white-space:normal;overflow:visible;text-overflow:clip;word-break:break-word}
.col-overlay{position:fixed;inset:0;z-index:309}
/* ── density (compact mode), persisted ── */
:root[data-density="compact"] .tbl td{padding:4px 8px}
:root[data-density="compact"] .tbl th{padding:4px 8px}
:root[data-density="compact"] .card{padding:13px}
:root[data-density="compact"] .bento{gap:12px}
:root[data-density="compact"] .g2,:root[data-density="compact"] .g3,:root[data-density="compact"] .g4{gap:10px}
:root[data-density="compact"] .pol-item{padding:6px 0}
[data-wall="on"] .bento{grid-template-columns:repeat(3,minmax(0,1fr))}
[data-wall="on"] .tbl td{font-size:14px}
[data-wall="on"] .tbl th{font-size:11px}
[data-wall="on"] .card-title{font-size:14px}
[data-wall="on"] .badge{font-size:11px}
[data-wall="on"] .bento>.drag-card>.card{max-height:640px}
@media(max-width:1100px){[data-wall="on"] .bento{grid-template-columns:repeat(2,minmax(0,1fr))}}
.wall-span-btn{background:none;border:1px solid var(--border);border-radius:4px;color:var(--gray-400);font-size:10px;line-height:1;padding:2px 5px;cursor:pointer;margin-left:4px;min-height:44px;min-width:44px;display:inline-flex;align-items:center;justify-content:center}
.wall-span-btn:hover{color:var(--teal);border-color:var(--teal)}
.wall-span-btn:focus-visible{outline:2px solid var(--teal);outline-offset:2px}
.wall-clock{margin-left:18px;font-family:monospace;font-size:20px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums;letter-spacing:.04em;white-space:nowrap}
.sec-changed{margin-left:8px;font-size:10px;color:var(--gray-400)}
.drill-sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:499}
.drill-sheet{position:fixed;top:0;right:0;bottom:0;width:360px;max-width:90vw;background:var(--surface-2);border-left:1px solid var(--border);z-index:500;display:flex;flex-direction:column;box-shadow:-8px 0 24px rgba(0,0,0,.35);animation:drillIn .2s cubic-bezier(.4,0,.2,1)}
@keyframes drillIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.drill-sheet-hd{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.drill-sheet-bd{padding:16px;overflow-y:auto;flex:1;font-size:12px}
.drill-kv{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)}
.drill-kv .k{color:var(--gray-400);font-size:10px;text-transform:uppercase;letter-spacing:.07em}
@media(prefers-reduced-motion:reduce){.drill-sheet{animation:none}}
.wiz-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:120}
.wiz-modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:min(440px,92vw);max-height:84vh;overflow:auto;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;z-index:121;box-shadow:0 12px 40px rgba(0,0,0,.5);animation:wizardIn .22s cubic-bezier(.16,1,.3,1) both}
.wiz-hd{padding:16px 18px;border-bottom:1px solid var(--border)}
.wiz-title{font-size:15px;font-weight:700;color:var(--ink)}
.wiz-sub{font-size:11px;color:var(--gray-400);margin-top:4px;line-height:1.4}
.wiz-list{padding:8px 10px}
.wiz-row{display:flex;align-items:center;gap:10px;padding:8px 8px;border-bottom:1px solid var(--border)}
.wiz-ord{display:flex;flex-direction:column;gap:1px}
.wiz-ordbtn{background:none;border:none;color:var(--gray-400);cursor:pointer;font-size:9px;line-height:1;padding:1px}
.wiz-ordbtn:disabled{opacity:.25;cursor:default}
.wiz-ordbtn:hover:not(:disabled){color:var(--teal)}
.wiz-nav-icon{color:var(--gray-400);width:18px;display:flex;align-items:center;justify-content:center}
.wiz-lbl{flex:1;font-size:13px;color:var(--gray-200)}
.wiz-vis{font-size:10px;font-weight:700;border-radius:4px;padding:3px 9px;border:1px solid var(--border);background:none;color:var(--gray-400);cursor:pointer;text-transform:uppercase;letter-spacing:.05em}
.wiz-vis.on{color:var(--sev-green-t);border-color:var(--green);background:rgba(34,197,94,.10)}
.wiz-foot{display:flex;justify-content:flex-end;gap:8px;padding:12px 18px;border-top:1px solid var(--border)}
.wiz-skip{background:none;border:1px solid var(--border);color:var(--gray-400);border-radius:6px;padding:6px 14px;font-size:12px;cursor:pointer}
.wiz-done{background:var(--teal);border:none;color:var(--blue-dark);border-radius:6px;padding:6px 16px;font-size:12px;font-weight:700;cursor:pointer}
/* ─── HelpPage v6 editorial ─── */
.help-page{padding:0;max-width:none;margin:0}
.help-search{position:sticky;top:0;z-index:100;width:100%;background:rgba(13,17,23,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:none;border-bottom:1px solid rgba(240,246,252,0.1);color:var(--ink);font-size:13px;padding:11px 48px;font-family:var(--font-mono);letter-spacing:0.03em;outline:none}
.help-search::placeholder{color:var(--muted)}
.help-chapter{position:relative;padding:72px 48px 64px;overflow:hidden}
.help-chapter+.help-chapter{border-top:1px solid rgba(240,246,252,0.08)}
.help-chapter.help-hidden{display:none}
.help-watermark{position:absolute;top:32px;left:20px;font-size:64px;font-weight:100;color:rgba(216,217,218,0.06);font-family:var(--font-mono);line-height:1;pointer-events:none;user-select:none;letter-spacing:-0.04em}
.help-chapter-label{display:flex;align-items:baseline;gap:12px;margin-bottom:48px}
.help-section-name{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--amber);font-family:var(--font-mono)}
.help-section-count{font-size:11px;color:var(--muted);font-family:var(--font-mono)}
.help-feature-grid{display:grid;grid-template-columns:1fr 1fr;gap:32px 56px}
.help-feature-pair{display:contents}
.help-feature-pair.help-hidden .help-feature-left,.help-feature-pair.help-hidden .help-feature-right{display:none}
.help-feature-name{font-size:17px;font-weight:500;color:var(--teal);font-family:var(--font-mono);line-height:1.3;margin-bottom:6px}
.help-feature-tag{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.14em;color:var(--muted);font-family:var(--font-mono)}
.help-eli5{font-size:13px;color:var(--ink);line-height:1.65;margin-bottom:10px}
.help-steps{list-style:none;padding:0;counter-reset:hsteps}
.help-steps li{counter-increment:hsteps;display:flex;gap:10px;font-size:11px;color:var(--muted);font-family:var(--font-mono);margin-bottom:3px;line-height:1.5}
.help-steps li::before{content:counter(hsteps,decimal-leading-zero);flex-shrink:0;color:rgba(88,166,255,0.4);font-size:10px;padding-top:1px}
.help-no-match{text-align:center;padding:60px 0;color:var(--muted);font-size:13px;font-family:var(--font-mono)}
.help-search-bar{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:12px;padding:0 48px}
.help-search-count{font-size:11px;color:var(--muted);font-family:var(--font-mono);white-space:nowrap;flex-shrink:0}
</style>
</head>
<body>
<a href="#main-content" class="sr-only sr-only-focusable">Skip to main content</a>

/* Returns leases whose IP falls inside subnet addr/cidr */
function leasesInSubnet(leases, subnet) {
  const parts = (subnet.addr||'').split('.').map(Number);
  const cidr = subnet.cidr || 24;
  // Build prefix to match: /8→1 octet, /16→2, /24→3, /32→4
  const octets = cidr <= 8 ? 1 : cidr <= 16 ? 2 : cidr <= 24 ? 3 : 4;
  const prefix = parts.slice(0, octets).join('.');
  return leases.filter(l => (l.addr || '').startsWith(prefix + '.') ||
                            (octets === 4 && l.addr === subnet.addr));
}

function downloadCSV(filename, rows, columns) {
  const header = columns.map(c=>JSON.stringify(c.label||c)).join(',');
  const body = rows.map(r=>columns.map(c=>JSON.stringify(r[c.key]??'')).join(',')).join('\n');
  const blob = new Blob([header+'\n'+body], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

// Ordered logo sources tried by BrandLogoImg — browser <img> sends Referer so Brandfetch works
function buildLogoSources(domain){
  return [
    '/api/logo',
    `https://cdn.brandfetch.io/${domain}/w/128/h/128`,
    `https://www.google.com/s2/favicons?domain=${domain}&sz=128`,
    `https://icons.duckduckgo.com/ip3/${domain}.ico`,
  ];
}
// BrandLogoImg: tries sources in order via onError waterfall, falls back to IB_LOGO
function BrandLogoImg({domain, fallback, alt, className, style, onClick, title}){
  const sources = domain ? buildLogoSources(domain) : [];
  const [idx, setIdx] = React.useState(0);
  React.useEffect(()=>{ setIdx(0); }, [domain]);
  const src = idx < sources.length ? sources[idx] : (fallback||IB_LOGO);
  return <img className={className} src={src} alt={alt||''} style={style}
    title={title} onClick={onClick}
    referrerPolicy="no-referrer-when-downgrade"
    onError={()=>setIdx(i=>i+1)}/>;
}

function downloadLogo(src){
  if(src.startsWith('data:')){
    const a=document.createElement('a');
    a.href=src; a.download='infoblox-logo.png'; a.click();
  } else {
    fetch(src)
      .then(r=>r.blob())
      .then(blob=>{
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');
        a.href=url; a.download='infoblox-logo.png';
        document.body.appendChild(a); a.click();
        document.body.removeChild(a); URL.revokeObjectURL(url);
      })
      .catch(()=>window.open(src,'_blank'));
  }
}

function extractDomain(url){
  // strip any protocol/slashes/www noise then parse cleanly
  const s=url.trim().replace(/^https?:\/?\/?/i,'').replace(/^www\./i,'').split('/')[0].split('?')[0];
  try{ return new URL('https://'+s).hostname.replace(/^www\./i,''); }
  catch(e){ return s; }
}

function timeAgo(iso) {
  const sec = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if(sec < 60)  return 'just now';
  if(sec < 3600) return Math.floor(sec/60)+'m ago';
  if(sec < 86400) return Math.floor(sec/3600)+'h ago';
  return Math.floor(sec/86400)+'d ago';
}

function copyToClip(text, setDone) {
  navigator.clipboard.writeText(text).then(()=>{
    if(setDone){ setDone(true); setTimeout(()=>setDone(false),1500); }
  }).catch(()=>{});
}

const levelBadge = l => ({critical:'b-red',high:'b-amber',medium:'b-teal',low:'b-gray'})[l]||'b-gray';
const levelColor = l => ({critical:CK.red(),high:CK.amber(),medium:'var(--teal)',low:CK.slate()})[l]||'var(--gray-400)';
const actionColor = a => ({CREATE:'var(--teal)',UPDATE:CK.amber(),DELETE:CK.red(),READ:'var(--gray-400)',
  LOGIN:CK.green(),LOGOUT:'var(--gray-400)',EXPORT:CK.amber(),IMPORT:'var(--teal)',ENABLE:CK.green(),DISABLE:CK.red()})[a]||'var(--gray-200)';
const utilColor = p => p>=90?CK.red():p>=75?CK.amber():CK.green();

function mockMCPQuery(q, data) {
  const ql = q.toLowerCase();
  const {subnets,leases,zones,hosts,secPolicies,feeds,auditLogs,dnsViews} = data;

  /* ── intent helpers ── */
  const isTop    = ql.match(/top|most|highest|busiest|rank|who is|who's |who are|which.*(most|high|busy)|biggest|largest|most active/);
  const isDNSctx = ql.match(/dns|resolv|lookup|quer|nxdomain|send|traffic|domain|name.server/);
  const isDHCPctx= ql.match(/dhcp|lease|ip.usage|address.usage/);

  /* ── compound / analytic intents first ── */
  if(isTop) {
    if(isDNSctx)
      return 'Fetching top DNS clients from live data… (use the DNS Analytics tab for the full chart, or ask in the Query panel with the server running)';
    if(isDHCPctx) {
      const top=[...subnets].sort((a,b)=>b.used-a.used).slice(0,5);
      return `Top 5 subnets by active DHCP usage:\n${top.map(s=>`• ${s.name} (${s.addr}/${s.cidr}): ${s.used}/${s.total} IPs (${s.util}%)`).join('\n')}\n\nNote: per-client request counts require DHCP log access, not in API data.`;
    }
    if(ql.match(/subnet|network/)) {
      return `Top subnets by utilization:\n${[...subnets].sort((a,b)=>b.util-a.util).slice(0,5).map((s,i)=>`${i+1}. ${s.name}: ${s.util}% (${s.used}/${s.total})`).join('\n')}`;
    }
    if(ql.match(/threat|feed|malware/)) {
      const top=[...feeds].filter(f=>f.active).sort((a,b)=>b.entries-a.entries).slice(0,5);
      return `Top feeds by entry count:\n${top.map(f=>`• ${f.name}: ${f.entries.toLocaleString()} (${f.level})`).join('\n')}`;
    }
    if(ql.match(/user|admin|audit/)) {
      const cnt=auditLogs.reduce((a,l)=>{a[l.user]=(a[l.user]||0)+1;return a},{});
      return `Most active audit users:\n${Object.entries(cnt).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([u,n])=>`• ${u}: ${n} events`).join('\n')}`;
    }
  }

  /* ── per-category intents ── */
  if(ql.match(/subnet|ipam|address.space/) && !isDNSctx && !isDHCPctx) {
    if(ql.match(/critical|full|90/)) {
      const c=subnets.filter(s=>s.util>=90);
      return c.length?`${c.length} critical subnet${c.length>1?'s':''} (≥90%):\n${c.map(s=>`• ${s.name} — ${s.addr}/${s.cidr}: ${s.util}%`).join('\n')}`:'No critical subnets.';
    }
    if(ql.match(/warn|75|80/)) {
      const w=subnets.filter(s=>s.util>=75&&s.util<90);
      return `${w.length} subnets at 75–89%:\n${w.map(s=>`• ${s.name}: ${s.util}%`).join('\n')}`;
    }
    const avg=Math.round(subnets.reduce((a,s)=>a+s.util,0)/subnets.length);
    return `${subnets.length} subnets. Avg: ${avg}%.\n• Critical (≥90%): ${subnets.filter(s=>s.util>=90).length}\n• Warning (75–89%): ${subnets.filter(s=>s.util>=75&&s.util<90).length}\n• Healthy (<75%): ${subnets.filter(s=>s.util<75).length}`;
  }

  if(ql.match(/\bhost|hosts|device|devices|router|server|servers|switch|firewall|appliance|machine\b/)) {
    if(ql.match(/offline|down/)) { const b=hosts.filter(h=>h.status==='offline'); return b.length?`${b.length} offline:\n${b.map(h=>`• ${h.name} (${h.ip})`).join('\n')}`:'No offline hosts.'; }
    if(ql.match(/error/))  { const e=hosts.filter(h=>h.status==='error');   return e.length?`${e.length} in error:\n${e.map(h=>`• ${h.name} (${h.ip})`).join('\n')}`:'No hosts in error.'; }
    if(ql.match(/degrad/)) { const d=hosts.filter(h=>h.status==='degraded'); return `${d.length} degraded:\n${d.map(h=>`• ${h.name} (${h.ip})`).join('\n')}`; }
    const cnt=hosts.reduce((a,h)=>{a[h.status]=(a[h.status]||0)+1;return a},{});
    return `${hosts.length} hosts:\n${Object.entries(cnt).sort((a,b)=>b[1]-a[1]).map(([s,n])=>`• ${s}: ${n}`).join('\n')}`;
  }

  if(ql.match(/\bdns\b|dns |zone|ttl|nxdomain|name.server|resolv/) && !isTop) {
    if(ql.match(/anomal|issue|problem|bad/)) { const b=zones.filter(z=>z.anomaly); return b.length?`${b.length} zone${b.length>1?'s':''} with TTL issues:\n${b.map(z=>`• ${z.fqdn} — ${z.issues.join(', ')}`).join('\n')}`:'No TTL anomalies.'; }
    if(ql.match(/empty|no record|zero/))    { const e=zones.filter(z=>z.records===0); return e.length?`${e.length} empty zone${e.length>1?'s':''}:\n${e.map(z=>`• ${z.fqdn} (${z.view})`).join('\n')}`:'All zones have records.'; }
    return `${zones.length} auth zones, ${dnsViews.length} views. TTL issues: ${zones.filter(z=>z.anomaly).length}. Empty: ${zones.filter(z=>z.records===0).length}.`;
  }

  if(ql.match(/threat|feed|malware|c2|ransomware|phish|exploit|dga/)) {
    if(ql.match(/critical/)) { const c=feeds.filter(f=>f.level==='critical'&&f.active); return `${c.length} active critical feeds:\n${c.map(f=>`• ${f.name} (${f.entries.toLocaleString()})`).join('\n')}`; }
    const a=feeds.filter(f=>f.active); const tot=a.reduce((x,f)=>x+f.entries,0);
    return `${a.length}/${feeds.length} feeds active, ${tot.toLocaleString()} entries.\n• Critical: ${feeds.filter(f=>f.level==='critical').length}\n• High: ${feeds.filter(f=>f.level==='high').length}\n• Medium: ${feeds.filter(f=>f.level==='medium').length}`;
  }

  if(ql.match(/polic|security rule/)) {
    const a=secPolicies.filter(p=>p.active);
    return `${a.length} active policies, ${secPolicies.reduce((x,p)=>x+p.rules,0)} total rules:\n${secPolicies.map(p=>`• ${p.name} — ${p.action}${p.active?'':' (off)'}`).join('\n')}`;
  }

  if(ql.match(/audit|log|event|recent|change|who.changed|who.did|activity|history/)) {
    const f=auditLogs.filter(l=>l.result==='failure');
    return `${auditLogs.length} events. Failures: ${f.length}.\nRecent:\n${auditLogs.slice(0,5).map(l=>`• ${l.user} — ${l.action} ${l.resource}`).join('\n')}`;
  }

  if(ql.match(/dhcp|lease/)) {
    return `${leases.length} leases.\n• Active: ${leases.filter(l=>l.state==='active').length}\n• Expired: ${leases.filter(l=>l.state==='expired').length}`;
  }

  if(ql.match(/summar|overview|status|health|how is|how.s the|all good|whats up|what.s up/)) {
    return `Network summary:\n• Subnets: ${subnets.length} (${subnets.filter(s=>s.util>=90).length} critical)\n• Hosts: ${hosts.length} (${hosts.filter(h=>h.status==='online').length} online, ${hosts.filter(h=>['offline','error'].includes(h.status)).length} down/error)\n• DNS: ${zones.length} zones (${zones.filter(z=>z.anomaly).length} TTL issues)\n• Feeds: ${feeds.filter(f=>f.active).length} active\n• Leases: ${leases.filter(l=>l.state==='active').length} active`;
  }

  return 'I can answer questions like:\n• "who is sending the most DNS queries"\n• "show me offline hosts"\n• "critical subnets"\n• "DNS TTL anomalies"\n• "active threat feeds"\n• "summary" or "how is everything"\n• "who changed things recently"\n\nOr go to the Search tab to find any IP, hostname, or subnet.';
}

/* SVG donut — no external deps */
function Donut({hosts,filter,onSlice}) {
  const counts = hosts.reduce((a,h)=>{a[h.status]=(a[h.status]||0)+1;return a},{});
  const slices=[
    {name:'Online',  val:counts.online||0,   color:CK.green()},
    {name:'Degraded',val:counts.degraded||0, color:CK.amber()},
    {name:'Offline', val:counts.offline||0,  color:'var(--gray-400)'},
    {name:'Error',   val:counts.error||0,    color:CK.red()},
    {name:'Pending', val:counts.pending||0,  color:'var(--teal)'},
  ].filter(d=>d.val>0);

  const [tip,setTip]=useState(null);
  const total=slices.reduce((a,s)=>a+s.val,0);
  const cx=100,cy=100,ro=86,ri=52,gap=0.03;

  const arcs=[];
  let angle=-Math.PI/2;
  slices.forEach((s,i)=>{
    const sweep=(s.val/total)*(2*Math.PI)-gap;
    const a1=angle+gap/2, a2=angle+gap/2+sweep;
    const lx=cx+ro*Math.cos(a1), ly=cy+ro*Math.sin(a1);
    const ex=cx+ro*Math.cos(a2), ey=cy+ro*Math.sin(a2);
    const ilx=cx+ri*Math.cos(a2),ily=cy+ri*Math.sin(a2);
    const iex=cx+ri*Math.cos(a1),iey=cy+ri*Math.sin(a1);
    const large=sweep>Math.PI?1:0;
    const d=`M${lx},${ly} A${ro},${ro} 0 ${large} 1 ${ex},${ey} L${ilx},${ily} A${ri},${ri} 0 ${large} 0 ${iex},${iey} Z`;
    const mid=(a1+a2)/2;
    const pct=Math.round(s.val/total*100);
    const lrx=cx+(ro+ri)/2*Math.cos(mid), lry=cy+(ro+ri)/2*Math.sin(mid);
    arcs.push({...s,d,mid,pct,lrx,lry,key:i});
    angle+=sweep+gap;
  });

  return (
    <>
      <div style={{position:'relative'}}>
        <svg viewBox="0 0 200 200" width="200" height="200" style={{display:'block',margin:'0 auto'}}
          role="img" aria-label={`Host status distribution: ${slices.map(s=>`${s.name} ${s.val}`).join(', ')}`}>
          {arcs.map(a=>(
            <path key={a.key} d={a.d} fill={a.color}
              opacity={filter&&filter!==a.name.toLowerCase()?0.35:1}
              stroke={filter===a.name.toLowerCase()?'var(--ink)':'none'} strokeWidth={1.5}
              style={{cursor:'pointer',transition:'opacity .2s'}}
              onClick={()=>onSlice(a.name.toLowerCase())}
              onMouseEnter={()=>setTip(a)} onMouseLeave={()=>setTip(null)}/>
          ))}
          {arcs.map(a=>a.pct>=7&&(
            <text key={a.key} x={a.lrx} y={a.lry} fill="var(--ink)" textAnchor="middle"
              dominantBaseline="central" fontSize={9} fontWeight={700} style={{pointerEvents:'none'}}>
              {a.pct}%
            </text>
          ))}
          {tip&&(
            <text x={cx} y={cy-6} fill={tip.color} textAnchor="middle" fontSize={11} fontWeight={700}>{tip.name}</text>
          )}
          {tip&&(
            <text x={cx} y={cy+10} fill="var(--ink)" textAnchor="middle" fontSize={14} fontWeight={800}>{tip.val}</text>
          )}
          {!tip&&(
            <text x={cx} y={cy+4} fill="var(--gray-400)" textAnchor="middle" fontSize={11}>{total} hosts</text>
          )}
        </svg>
      </div>
      <div style={{display:'flex',flexWrap:'wrap',gap:'6px 14px',justifyContent:'center',marginTop:4}}>
        {slices.map((d,i)=>(
          <div key={i} role="button" tabIndex={0}
            aria-pressed={filter===d.name.toLowerCase()}
            style={{display:'flex',alignItems:'center',gap:5,fontSize:11,cursor:'pointer'}}
            onClick={()=>onSlice(d.name.toLowerCase())}
            onKeyDown={e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();onSlice(d.name.toLowerCase());}}}>
            <div style={{width:7,height:7,borderRadius:'50%',background:d.color,opacity:filter&&filter!==d.name.toLowerCase()?0.4:1}}/>
            <span style={{color:filter===d.name.toLowerCase()?d.color:'var(--gray-200)'}}>{d.name}</span>
            <span style={{color:'var(--gray-400)'}}>{d.val}</span>
          </div>
        ))}
      </div>
    </>
  );
}

/* SVG horizontal bars — no external deps */
function SubnetBars({subnets,highlight,onBar}) {
  // Compact ranked list (not giant bars): rank · name · used/total · severity bar · %.
  // Reuses utilColor + the same bar vocabulary as the IPAM table — dense, glanceable.
  // Single-IP (/32) subnets are trivially 100% and flood the ranking, so hide them
  // by default and collapse any 100%-saturated run — each revealable via a toggle.
  const [showTiny,setShowTiny]=useState(false);
  const [show100,setShow100]=useState(false);
  const tinyCount=subnets.filter(s=>s.total<=1).length;
  const pool=showTiny?subnets:subnets.filter(s=>s.total>1);
  const sorted=[...pool].sort((a,b)=>b.util-a.util);
  const hundreds=sorted.filter(s=>s.util>=100);
  const top10=(show100?sorted:sorted.filter(s=>s.util<100)).slice(0,10);
  return (
    <div className="subnet-rank-list" role="list"
      aria-label={`Top subnets by utilization: ${top10.map(s=>`${s.name} ${s.util} percent`).join(', ')}`}>
      {hundreds.length>0&&(
        <button className="sr-collapse" onClick={()=>setShow100(v=>!v)}
          title={show100?'Collapse the 100% subnets':'Show the subnets at 100%'}>
          {show100?'▾':'▸'} <b>{hundreds.length} subnet{hundreds.length>1?'s':''} at 100%</b>{show100?' — hide':' — show'}
        </button>
      )}
      {top10.map((s,i)=>{
        const col=utilColor(s.util);
        const hl=highlight===s.id;
        const dim=highlight&&!hl;
        return (
          <button key={s.id} role="listitem" className={`subnet-rank-row${hl?' active':''}`}
            style={{opacity:dim?0.4:1}} onClick={()=>onBar(s.id)}
            title={`${s.name} · ${s.addr}/${s.cidr} · ${s.used}/${s.total} IPs · ${s.util}%${s.util>=90?' · critical':''}`}>
            <span className="sr-num">{i+1}</span>
            <span className="sr-name">{s.name}</span>
            <span className="sr-ut">{s.used}/{s.total}</span>
            <span className="sr-bar"><span className="sr-fill" style={{transform:`scaleX(${s.util/100})`,background:col}}/></span>
            <span className="sr-pct" style={{color:col}}>{s.util}%</span>
          </button>
        );
      })}
      {top10.length===0&&!hundreds.length&&<div className="sr-empty">No multi-IP subnets with usage.</div>}
      {tinyCount>0&&(
        <button className="sr-toggle" onClick={()=>setShowTiny(v=>!v)}>
          {showTiny?`Hide ${tinyCount} single-IP`:`+ ${tinyCount} single-IP subnet${tinyCount>1?'s':''} hidden — show`}
        </button>
      )}
    </div>
  );
}

    {key:'fqdn',label:'Zone FQDN',fixed:true,mono:true,size:11,width:'27%'},
    {key:'view',label:'View',width:'12%',render:z=><span className="badge b-teal">{z.view}</span>},
    {key:'ttl',label:'TTL',mono:true,size:11,width:'11%',sortVal:z=>z.ttl,render:z=><span style={{color:z.ttl<60||z.ttl>86400?'var(--sev-red-t)':'var(--gray-200)',fontVariantNumeric:'tabular-nums'}}>{z.ttl}s</span>},
    {key:'neg_ttl',label:'Neg TTL',mono:true,size:11,width:'11%',sortVal:z=>z.neg_ttl,render:z=><span style={{color:z.neg_ttl>3600?'var(--sev-amber-t)':'var(--gray-200)',fontVariantNumeric:'tabular-nums'}}>{z.neg_ttl}s</span>},

const THREAT_CATS = new Set(['dga','threat_insight','zero_day_dns','threat_insight_nde','c2','ransomware','exploit','phishing']);

function FeedsTable({feeds, rowLimit, demoMode, onDrill}) {
  const [feedTab, setFeedTab] = useState('intel');
  const [deltas, setDeltas] = useState({});
  useEffect(()=>{
    const prev = LS.get('noc.prevFeeds', null);
    if(prev) {
      const d = {};
      feeds.forEach(f=>{ if(prev[f.id]!=null && prev[f.id]!==f.entries) d[f.id]=f.entries-prev[f.id]; });
      setDeltas(d);
    }
    const snap = {}; feeds.forEach(f=>{ snap[f.id]=f.entries; }); LS.set('noc.prevFeeds', snap);
  },[feeds]);
  const intelFeeds  = feeds.filter(f=>THREAT_CATS.has(f.cat));
  const customFeeds = feeds.filter(f=>!THREAT_CATS.has(f.cat));
  const tab = demoMode ? 'intel' : feedTab;
  const shown = tab==='intel'?intelFeeds : tab==='custom'?customFeeds : feeds;
  const limited = rowLimit ? shown.slice(0,rowLimit) : shown;
  const ctl=useColumns('feeds',[
    {key:'name',label:'Feed Name',fixed:true,render:f=><span style={{fontWeight:500}} title={f.name}>{f.name}</span>},
    {key:'cat',label:'Category',size:11,render:f=><span style={{color:'var(--gray-400)'}}>{f.cat}</span>},
    {key:'level',label:'Threat Level',sortVal:f=>levelOrder[f.level]??9,render:f=><span className={`badge ${levelBadge(f.level)}`}>{f.level}</span>},
    {key:'conf',label:'Confidence',size:11,render:f=><span style={{color:f.conf==='high'?'var(--sev-green-t)':f.conf==='medium'?'var(--sev-amber-t)':'var(--gray-400)',fontWeight:700}}>{f.conf}</span>},
    {key:'entries',label:'Entries',mono:true,size:11,sortVal:f=>f.entries,render:f=>(
      <span style={{display:'flex',alignItems:'center',gap:4}}>
        <span style={{color:'var(--gray-200)',fontFamily:'var(--font-mono)'}}>{f.entries.toLocaleString()}</span>
        {deltas[f.id]!=null&&deltas[f.id]!==0&&(
          <span style={{fontSize:9,fontWeight:700,borderRadius:3,padding:'1px 4px',
            color:deltas[f.id]>0?'var(--sev-red-t)':'var(--sev-green-t)',
            background:deltas[f.id]>0?'rgba(239,68,68,.18)':'rgba(34,197,94,.18)'}}>
            {deltas[f.id]>0?'+':''}{deltas[f.id].toLocaleString()}
          </span>
        )}
      </span>
    )},
    {key:'active',label:'Status',sortVal:f=>f.active?1:0,render:f=>f.active?<span className="badge b-green">Active</span>:<span className="badge b-gray">Off</span>},
  ]);
  return (
    <>
      {!demoMode&&(
        <div className="chip-bar" style={{marginBottom:8}}>
          <button className={`chip${tab==='intel'?' on':''}`} onClick={()=>setFeedTab('intel')}>Threat Intel ({intelFeeds.length})</button>
          <button className={`chip${tab==='custom'?' on':''}`} onClick={()=>setFeedTab('custom')}>Custom Lists ({customFeeds.length})</button>
          <button className={`chip${tab==='all'?' on':''}`} onClick={()=>setFeedTab('all')}>All ({feeds.length})</button>
        </div>
      )}
      <DataTable ctl={ctl} rows={limited} defaultRows={10} rowKey={f=>f.id} initialSort={{key:'level',dir:'asc'}} exportName="threat-feeds" persistId="feeds" onRowClick={onDrill?f=>onDrill({type:'feed',data:f}):undefined}/>
    </>
  );
}

/* ── per-widget column autonomy: show/hide + reorder + expand, persisted ── */
function useColumns(widgetId, allCols){
  const SK='noc.cols.'+widgetId;
  const [cfg,setCfg]=React.useState(()=>LS.get(SK,null));
  const save=next=>{ setCfg(next); LS.set(SK,next); };
  const keys=allCols.map(c=>c.key);
  let order=(cfg&&Array.isArray(cfg.order))?cfg.order.filter(k=>keys.includes(k)):keys.slice();
  keys.forEach(k=>{ if(!order.includes(k)) order.push(k); });
  const hidden=(cfg&&cfg.hidden)||{};
  const expanded=(cfg&&cfg.expanded)||{};
  const byKey=k=>allCols.find(c=>c.key===k);
  const ordered=order.map(byKey).filter(Boolean);
  const visibleCols=ordered.filter(c=>!hidden[c.key]).map(c=>({...c,expanded:!!expanded[c.key]}));
  const shownCount=visibleCols.length;
  const toggleHidden=k=>{ const c=byKey(k); if(c&&c.fixed) return; if(!hidden[k]&&shownCount<=1) return; save({order,hidden:{...hidden,[k]:!hidden[k]},expanded}); };
  const toggleExpand=k=>save({order,hidden,expanded:{...expanded,[k]:!expanded[k]}});
  const move=(k,dir)=>{ const i=order.indexOf(k),j=i+dir; if(i<0||j<0||j>=order.length) return; const n=order.slice(); const t=n[i]; n[i]=n[j]; n[j]=t; save({order:n,hidden,expanded}); };
  const moveTo=(k,idx)=>{ const i=order.indexOf(k); if(i<0||idx<0||idx>=order.length||i===idx) return; const n=order.slice(); n.splice(i,1); n.splice(idx,0,k); save({order:n,hidden,expanded}); };
  const reset=()=>save(null);
  return {widgetId,allCols:ordered,visibleCols,hidden,expanded,toggleHidden,toggleExpand,move,moveTo,reset,shownCount};
}

/* CSV from column descriptors; uses c.csv(row) ?? c.sortVal(row) ?? row[key] for raw values */
function exportCols(name, cols, rows){
  const raw=v=>(v==null?'':v);

  downloadCSV((name||'export')+'.csv',
    rows.map(r=>{ const o={}; ecols.forEach(c=>{ o[c.key]=raw(c.csv?c.csv(r):(c.sortVal?c.sortVal(r):r[c.key])); }); return o; }),
    ecols.map(c=>({key:c.key,label:c.label})));

/* generic sortable table driven by column descriptors.
   col: {key,label,fixed?,render?(row),sortVal?(row),csv?(row),mono?,size?,align?,width?,nosort?,noexport?}
   Pass `ctl` (a useColumns result) to render the column menu + use its visible cols,
   `exportName` to show a CSV export button, `persistId` to remember sort across reloads. */
function DataTable({cols, ctl, rows, defaultRows=10, rowKey, initialSort, exportName, persistId, onRowClick}){
  const vcols = ctl ? ctl.visibleCols : cols;
  const PK = persistId ? 'noc.sort.'+persistId : null;
  const saved = PK ? LS.get(PK, null) : null;
  const [sk,setSk]=React.useState((saved&&saved.key)||(initialSort?initialSort.key:''));
  const [sd,setSd]=React.useState((saved&&saved.dir)||(initialSort?(initialSort.dir||'asc'):'asc'));
  const colOf=k=>vcols.find(c=>c.key===k);
  const valOf=(c,r)=>c.sortVal?c.sortVal(r):r[c.key];
  const sorted=React.useMemo(()=>{
    const c=colOf(sk); if(!c) return rows;
    return [...rows].sort((a,b)=>{
      const av=valOf(c,a), bv=valOf(c,b);
      if(av==null&&bv==null) return 0; if(av==null) return 1; if(bv==null) return -1;
      const cmp=(typeof av==='number'&&typeof bv==='number')?av-bv:String(av).localeCompare(String(bv));
      return sd==='asc'?cmp:-cmp;
    });
  },[rows,sk,sd]); // vcols intentionally omitted: identity changes each render, sort result depends only on rows/key/dir
  const toggle=k=>{ const nd=(sk===k)?(sd==='asc'?'desc':'asc'):'asc'; setSk(k); setSd(nd); if(PK) LS.set(PK,{key:k,dir:nd}); };
  return (
    <>
      {(exportName||ctl)&&(
        <div style={{display:'flex',justifyContent:'flex-end',gap:6,marginBottom:6}}>
          {exportName&&<button className="col-btn" data-export-section={exportName} aria-label="Export visible columns as CSV" title="Export visible columns as CSV"
            onClick={()=>exportCols(exportName, vcols, sorted)}>CSV</button>}
          {ctl&&<ColumnMenu ctl={ctl}/>}
        </div>
      )}
      <ShowMoreTable rows={sorted} defaultRows={defaultRows}
        tableHead={<thead><tr>{vcols.map(c=>(
          <th key={c.key} className={`${c.expanded?'exp ':''}${c.nosort?'':'sort-th'}`}
            aria-sort={!c.nosort?(sk===c.key?(sd==='asc'?'ascending':'descending'):'none'):undefined}
            onClick={c.nosort?undefined:()=>toggle(c.key)}
            title={c.label}
            style={{...(c.width&&!c.expanded?{width:c.width}:{}),...(c.align?{textAlign:c.align}:{})}}>
            {c.label}{!c.nosort&&<span className="sort-ind">{sk===c.key?(sd==='asc'?'▲':'▼'):'⇅'}</span>}
          </th>
        ))}</tr></thead>}>
        {visible=>visible.map((r,i)=>(
          <tr key={rowKey?rowKey(r):(r.id||i)}
            onClick={onRowClick?()=>onRowClick(r):undefined}
            tabIndex={onRowClick?0:undefined}
            onKeyDown={onRowClick?(e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();onRowClick(r);}}):undefined}
            aria-haspopup={onRowClick?"dialog":undefined}
            style={onRowClick?{cursor:'pointer'}:undefined}>
            {vcols.map(c=>(
              <td key={c.key} className={c.expanded?'exp':''}
                style={{fontSize:c.size||12,...(c.mono?{fontFamily:'monospace'}:{}),...(c.align?{textAlign:c.align}:{})}}>
                {c.render?c.render(r):(r[c.key]==null?'—':(typeof r[c.key]==='number'?r[c.key].toLocaleString():String(r[c.key])))}
              </td>
            ))}
          </tr>
        ))}
      </ShowMoreTable>
    </>
  );
}

/* ── freshness pill: live "updated Ns ago" with stale warning ── */
function FreshnessPill({lastUpd}) {
  const [,tick]=React.useState(0);
  React.useEffect(()=>{ const t=setInterval(()=>tick(n=>n+1),5000); return ()=>clearInterval(t); },[]);
  if(!lastUpd) return null;
  const sec=Math.floor((Date.now()-lastUpd.getTime())/1000);
  const stale=sec>120;
  const txt=sec<60?'just now':sec<3600?Math.floor(sec/60)+'m ago':Math.floor(sec/3600)+'h ago';
  return <span className={`fresh-pill${stale?' fresh-stale':''}`}
    title={`Data last refreshed ${lastUpd.toLocaleTimeString()}`}
    data-tip={stale ? `<b>Data may be stale</b><br>Last refreshed ${lastUpd.toLocaleTimeString()}` : `Data is current · refreshed ${lastUpd.toLocaleTimeString()}`}>
    <span className={`fresh-dot${stale?'':' pulse'}`}/>Updated {txt}</span>;
}

/* ── saved views: snapshot the dashboard's persisted layout/prefs as named presets ── */
const VIEW_KEYS=['noc.viz','rl','cl','noc.widgetOrder','oo','noc.density','noc.ipamChip','noc.hostChip'];
const isViewKey=k=>VIEW_KEYS.includes(k)||/^noc\.(cols|sort)\./.test(k);
function snapshotViewLS(){
  const snap={};
  try{ for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(isViewKey(k)) snap[k]=localStorage.getItem(k); } }catch(e){}
  return snap;
}
function applyViewLS(snap){
  try{
    const del=[]; for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(isViewKey(k)) del.push(k); }
    del.forEach(k=>localStorage.removeItem(k));
    Object.entries(snap||{}).forEach(([k,v])=>{ try{localStorage.setItem(k,v);}catch(e){} });
  }catch(e){}
}
