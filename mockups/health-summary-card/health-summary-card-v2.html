<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Health Summary v2 — Strip + Domain Pills</title>
  <style>
    :root {
      --surface:#1B1F28;--surface-2:#232834;--surface-3:#2E3440;
      --border:rgba(255,255,255,0.09);
      --gray-200:#C5C1BB;--gray-400:#8F949C;--ink:#F1F2F4;
      --sev-red-t:#FCA5A5;--sev-amber-t:#FCD34D;--sev-green-t:#6EE7B7;
      --badge-red-bg:rgba(239,68,68,.15);--badge-red-bd:rgba(239,68,68,.3);
      --badge-amber-bg:rgba(245,158,11,.15);--badge-amber-bd:rgba(245,158,11,.3);
      --badge-green-bg:rgba(16,185,129,.15);--badge-green-bd:rgba(16,185,129,.3);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#10131A;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--ink);padding:32px 28px;min-height:100vh}
    h3{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--gray-400);margin-bottom:10px}
    .section{margin-bottom:36px}

    .strip{display:flex;justify-content:space-between;align-items:center;border-radius:6px;padding:7px 14px;background:var(--surface-2);border:1px solid var(--border)}
    .strip-label{font-size:12px;font-weight:600}
    .label-ok{color:var(--sev-green-t)}
    .label-issues{color:var(--sev-amber-t)}
    .pills{display:flex;gap:6px;flex-wrap:wrap}
    .pill{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:4px}
    .pill-crit{background:var(--badge-red-bg);border:1px solid var(--badge-red-bd);color:var(--sev-red-t)}
    .pill-warn{background:var(--badge-amber-bg);border:1px solid var(--badge-amber-bd);color:var(--sev-amber-t)}
    .pill-ok{background:var(--badge-green-bg);border:1px solid var(--badge-green-bd);color:var(--sev-green-t)}

    .tiles{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:12px}
    .tile{background:var(--surface-2);border:1px solid var(--border);border-radius:8px;height:88px}
  </style>
</head>
<body>
  <div class="section">
    <h3>All OK</h3>
    <div class="strip">
      <span class="strip-label label-ok">✓ All systems healthy</span>
      <div class="pills">
        <span class="pill pill-ok">Hosts OK</span>
        <span class="pill pill-ok">Subnets OK</span>
        <span class="pill pill-ok">DNS OK</span>
        <span class="pill pill-ok">Threats OK</span>
        <span class="pill pill-ok">Audit OK</span>
      </div>
    </div>
    <div class="tiles">
      <div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div>
    </div>
  </div>

  <div class="section">
    <h3>Issues Detected</h3>
    <div class="strip">
      <span class="strip-label label-issues">⚠ 2 issues detected</span>
      <div class="pills">
        <span class="pill pill-crit">Hosts CRIT</span>
        <span class="pill pill-warn">Subnets WARN</span>
        <span class="pill pill-ok">DNS OK</span>
        <span class="pill pill-ok">Threats OK</span>
        <span class="pill pill-ok">Audit OK</span>
      </div>
    </div>
    <div class="tiles">
      <div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div>
    </div>
  </div>
</body>
</html>
