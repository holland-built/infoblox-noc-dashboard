<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Health Summary v3 — Left-Border Accent</title>
  <style>
    :root {
      --surface:#1B1F28;--surface-2:#232834;--surface-3:#2E3440;
      --border:rgba(255,255,255,0.09);
      --gray-200:#C5C1BB;--gray-400:#8F949C;--ink:#F1F2F4;
      --sev-red-t:#FCA5A5;--sev-amber-t:#FCD34D;--sev-green-t:#6EE7B7;
      --badge-red-bg:rgba(239,68,68,.15);--badge-red-bd:rgba(239,68,68,.3);
      --badge-amber-bg:rgba(245,158,11,.15);--badge-amber-bd:rgba(245,158,11,.3);
      --badge-green-bg:rgba(16,185,129,.15);--badge-green-bd:rgba(16,185,129,.3);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#10131A;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--ink);padding:32px 28px;min-height:100vh}
    h3{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--gray-400);margin-bottom:10px}
    .section{margin-bottom:36px}

    .strip{background:var(--surface-2);border:1px solid var(--border);border-radius:6px;padding:10px 14px;font-size:12px;font-weight:600;border-left-width:4px;border-left-style:solid}
    .strip-ok{border-left-color:#10B981;color:var(--sev-green-t)}
    .strip-warn{border-left-color:#F59E0B;color:var(--sev-amber-t)}
    .strip-crit{border-left-color:#EF4444;color:var(--sev-red-t)}
    .sub{font-size:11px;font-weight:400;color:var(--gray-400);margin-top:2px}

    .tiles{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:12px}
    .tile{background:var(--surface-2);border:1px solid var(--border);border-radius:8px;height:88px}
  </style>
</head>
<body>
  <div class="section">
    <h3>All OK</h3>
    <div class="strip strip-ok">
      ✓ All systems healthy
      <div class="sub">Hosts · Subnets · DNS · Threats · Audit — no issues</div>
    </div>
    <div class="tiles">
      <div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div>
    </div>
  </div>

  <div class="section">
    <h3>Issues Detected</h3>
    <div class="strip strip-crit">
      ⚠ 2 issues detected
      <div class="sub">Hosts CRITICAL · Subnets WARNING — DNS · Threats · Audit OK</div>
    </div>
    <div class="tiles">
      <div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div>
    </div>
  </div>
</body>
</html>
