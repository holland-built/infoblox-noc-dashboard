<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Health Summary v5 — Two-Zone</title>
  <style>
    :root {
      --surface:#1B1F28;--surface-2:#232834;--surface-3:#2E3440;
      --border:rgba(255,255,255,0.09);
      --gray-200:#C5C1BB;--gray-400:#8F949C;--ink:#F1F2F4;
      --sev-red-t:#FCA5A5;--sev-amber-t:#FCD34D;--sev-green-t:#6EE7B7;
      --badge-red-bg:rgba(239,68,68,.15);--badge-red-bd:rgba(239,68,68,.3);
      --badge-amber-bg:rgba(245,158,11,.15);--badge-amber-bd:rgba(245,158,11,.3);
      --badge-green-bg:rgba(16,185,129,.15);--badge-green-bd:rgba(16,185,129,.3);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#10131A;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--ink);padding:32px 28px;min-height:100vh}
    h3{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--gray-400);margin-bottom:10px}
    .section{margin-bottom:36px}

    .strip{display:flex;align-items:stretch;border-radius:6px;overflow:hidden;border:1px solid var(--border)}
    .icon-block{width:48px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px}
    .icon-green{background:rgba(16,185,129,.18)}
    .icon-red{background:rgba(239,68,68,.18)}
    .body-block{background:var(--surface-2);padding:9px 14px;flex:1}
    .title{font-size:12px;font-weight:600}
    .title-ok{color:var(--sev-green-t)}
    .title-issues{color:var(--sev-red-t)}
    .detail{font-size:11px;color:var(--gray-400);margin-top:2px}

    .tiles{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:12px}
    .tile{background:var(--surface-2);border:1px solid var(--border);border-radius:8px;height:88px}
  </style>
</head>
<body>
  <div class="section">
    <h3>All OK</h3>
    <div class="strip">
      <div class="icon-block icon-green">✓</div>
      <div class="body-block">
        <div class="title title-ok">All systems healthy</div>
        <div class="detail">Hosts · Subnets · DNS · Threats · Audit — no active issues</div>
      </div>
    </div>
    <div class="tiles">
      <div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div>
    </div>
  </div>

  <div class="section">
    <h3>Issues Detected</h3>
    <div class="strip">
      <div class="icon-block icon-red">⚠</div>
      <div class="body-block">
        <div class="title title-issues">2 issues detected</div>
        <div class="detail">Hosts CRITICAL · Subnets WARNING — DNS · Threats · Audit OK</div>
      </div>
    </div>
    <div class="tiles">
      <div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div>
    </div>
  </div>
</body>
</html>
