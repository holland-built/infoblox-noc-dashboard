<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Health Summary v6 — Segmented Bar</title>
  <style>
    :root {
      --surface:#1B1F28;--surface-2:#232834;--surface-3:#2E3440;
      --border:rgba(255,255,255,0.09);
      --gray-200:#C5C1BB;--gray-400:#8F949C;--ink:#F1F2F4;
      --sev-red-t:#FCA5A5;--sev-amber-t:#FCD34D;--sev-green-t:#6EE7B7;
      --badge-red-bg:rgba(239,68,68,.15);--badge-red-bd:rgba(239,68,68,.3);
      --badge-amber-bg:rgba(245,158,11,.15);--badge-amber-bd:rgba(245,158,11,.3);
      --badge-green-bg:rgba(16,185,129,.15);--badge-green-bd:rgba(16,185,129,.3);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#10131A;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--ink);padding:32px 28px;min-height:100vh}
    h3{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--gray-400);margin-bottom:10px}
    .section{margin-bottom:36px}

    .seg-bar{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:10px}
    .chip{border-radius:6px;padding:6px 10px;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;text-align:center;border:1px solid transparent}
    .chip-name{display:block;font-size:10px;font-weight:400;letter-spacing:.05em;margin-bottom:1px;opacity:.75}
    .chip-status{display:block;font-size:12px;font-weight:700}
    .chip-ok{background:var(--badge-green-bg);border-color:var(--badge-green-bd);color:var(--sev-green-t)}
    .chip-crit{background:var(--badge-red-bg);border-color:var(--badge-red-bd);color:var(--sev-red-t)}
    .chip-warn{background:var(--badge-amber-bg);border-color:var(--badge-amber-bd);color:var(--sev-amber-t)}

    .tiles{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
    .tile{background:var(--surface-2);border:1px solid var(--border);border-radius:8px;height:88px}
  </style>
</head>
<body>
  <div class="section">
    <h3>All OK</h3>
    <div class="seg-bar">
      <div class="chip chip-ok"><span class="chip-name">Hosts</span><span class="chip-status">✓ OK</span></div>
      <div class="chip chip-ok"><span class="chip-name">Subnets</span><span class="chip-status">✓ OK</span></div>
      <div class="chip chip-ok"><span class="chip-name">DNS</span><span class="chip-status">✓ OK</span></div>
      <div class="chip chip-ok"><span class="chip-name">Threats</span><span class="chip-status">✓ OK</span></div>
      <div class="chip chip-ok"><span class="chip-name">Audit</span><span class="chip-status">✓ OK</span></div>
    </div>
    <div class="tiles">
      <div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div>
    </div>
  </div>

  <div class="section">
    <h3>Issues Detected</h3>
    <div class="seg-bar">
      <div class="chip chip-crit"><span class="chip-name">Hosts</span><span class="chip-status">⚠ CRIT</span></div>
      <div class="chip chip-warn"><span class="chip-name">Subnets</span><span class="chip-status">! WARN</span></div>
      <div class="chip chip-ok"><span class="chip-name">DNS</span><span class="chip-status">✓ OK</span></div>
      <div class="chip chip-ok"><span class="chip-name">Threats</span><span class="chip-status">✓ OK</span></div>
      <div class="chip chip-ok"><span class="chip-name">Audit</span><span class="chip-status">✓ OK</span></div>
    </div>
    <div class="tiles">
      <div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div>
    </div>
  </div>
</body>
</html>
