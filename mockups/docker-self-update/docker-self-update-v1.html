<!DOCTYPE html><html><head><meta charset="utf-8">
<title>v1 — Dot stepper + inline progress</title>
<style>
:root{--blue-dark:#10131A;--blue-mid:#171A21;--surface:#1B1F28;--surface-2:#232834;--surface-3:#2E3440;--border:rgba(255,255,255,0.09);--teal:#D6D2CB;--green:#10B981;--amber:#F59E0B;--ink:#F0EDE8;--gray-400:#8A8880}
body{margin:0;background:var(--blue-dark);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--ink)}
.label{position:fixed;top:42px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--gray-400);background:var(--surface-2);padding:3px 10px;border-radius:12px;border:1px solid var(--border)}
/* v1: dot-stepper inline, progress fill on active step */
.upd-bar{position:fixed;top:0;left:0;right:0;z-index:9999;height:36px;background:rgba(245,158,11,.12);border-bottom:1px solid rgba(245,158,11,.28);display:flex;align-items:center;gap:0;padding:0 16px;font-size:11px}
.steps{display:flex;align-items:center;gap:0;flex:1}
.step{display:flex;align-items:center;gap:6px;padding:0 10px;position:relative}
.step-dot{width:8px;height:8px;border-radius:50%;border:2px solid rgba(245,158,11,.3);flex-shrink:0;transition:all .2s}
.step.done .step-dot{background:var(--green);border-color:var(--green)}
.step.active .step-dot{background:var(--amber);border-color:var(--amber);box-shadow:0 0 6px rgba(245,158,11,.5)}
.step.pending .step-dot{background:transparent;border-color:rgba(255,255,255,.15)}
.step-label{font-size:11px;font-weight:600}
.step.done .step-label{color:var(--green)}
.step.active .step-label{color:var(--amber)}
.step.pending .step-label{color:rgba(255,255,255,.25)}
.step-progress{font-size:10px;color:var(--gray-400);margin-left:4px;font-variant-numeric:tabular-nums}
.step-connector{width:24px;height:1px;background:rgba(255,255,255,.1);flex-shrink:0}
.step.done+.step-connector{background:var(--green);opacity:.4}
.elapsed{color:var(--gray-400);font-size:10px;font-variant-numeric:tabular-nums;margin-left:8px}
.cancel{margin-left:12px;background:none;border:none;color:var(--gray-400);cursor:pointer;font-size:14px;padding:4px}
.fill-wrap{position:absolute;bottom:0;left:0;right:0;height:2px;background:rgba(245,158,11,.15)}
.fill{height:100%;background:var(--amber);width:67%;transition:width .5s}
/* mock content */
.topbar-mock{padding:54px 32px 0;display:flex;align-items:center;gap:12px}
.mock-text{font-size:12px;color:rgba(255,255,255,.2)}
</style></head><body>
<div class="upd-bar">
  <div class="steps">
    <div class="step done"><div class="step-dot"></div><span class="step-label">Pull</span></div>
    <div class="step-connector"></div>
    <div class="step active">
      <div class="step-dot"></div>
      <span class="step-label">Pull</span>
      <span class="step-progress">67% · layer 4/6</span>
      <div class="fill-wrap"><div class="fill"></div></div>
    </div>
  </div>
</div>
<!-- Reset and show actual variant properly -->
<script>document.querySelector('.steps').innerHTML = ''</script>
<div class="upd-bar" style="position:fixed;top:0;left:0;right:0;height:36px;background:rgba(245,158,11,.12);border-bottom:1px solid rgba(245,158,11,.28);display:flex;align-items:center;padding:0 16px;gap:6px">
  <!-- step: Pull active -->
  <span style="width:8px;height:8px;border-radius:50%;background:var(--amber);box-shadow:0 0 6px rgba(245,158,11,.6);flex-shrink:0;display:inline-block"></span>
  <span style="font-size:11px;font-weight:700;color:var(--amber)">Pull</span>
  <span style="font-size:10px;color:var(--gray-400)">67% · layer 4/6</span>
  <!-- divider -->
  <span style="width:20px;height:1px;background:rgba(255,255,255,.12);display:inline-block;margin:0 4px"></span>
  <!-- step: Recreate pending -->
  <span style="width:8px;height:8px;border-radius:50%;border:2px solid rgba(255,255,255,.15);flex-shrink:0;display:inline-block"></span>
  <span style="font-size:11px;font-weight:600;color:rgba(255,255,255,.25)">Recreate</span>
  <span style="width:20px;height:1px;background:rgba(255,255,255,.12);display:inline-block;margin:0 4px"></span>
  <!-- step: Health pending -->
  <span style="width:8px;height:8px;border-radius:50%;border:2px solid rgba(255,255,255,.15);flex-shrink:0;display:inline-block"></span>
  <span style="font-size:11px;font-weight:600;color:rgba(255,255,255,.25)">Health</span>
  <span style="width:20px;height:1px;background:rgba(255,255,255,.12);display:inline-block;margin:0 4px"></span>
  <!-- step: Live pending -->
  <span style="width:8px;height:8px;border-radius:50%;border:2px solid rgba(255,255,255,.15);flex-shrink:0;display:inline-block"></span>
  <span style="font-size:11px;font-weight:600;color:rgba(255,255,255,.25)">Live</span>
  <!-- progress fill bar -->
  <div style="position:absolute;bottom:0;left:0;width:67%;height:2px;background:var(--amber);opacity:.7;transition:width .5s"></div>
  <!-- elapsed + cancel -->
  <span style="margin-left:auto;font-size:10px;color:var(--gray-400);font-variant-numeric:tabular-nums">14s</span>
  <button style="background:none;border:none;color:var(--gray-400);cursor:pointer;font-size:14px;padding:4px 6px;margin-left:4px">✕</button>
</div>
<div class="label">v1 — Dot stepper · active step highlighted · progress fill bottom edge · 67% · layer 4/6</div>
<div class="topbar-mock"><div class="mock-text">Dashboard content below...</div></div>
</body></html>
