<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shortcuts & CSV v1 — Groups with uppercase gray labels</title>
<style>
  :root {
    --blue-deep:#262B36; --blue-mid:#171A21; --blue-dark:#10131A;
    --teal:#D6D2CB; --teal-bright:#EBE8E2;
    --surface:#1B1F28; --surface-2:#232834; --surface-3:#2E3440;
    --border:rgba(255,255,255,0.09);
    --gray-100:#ECEAE7; --gray-200:#C5C1BB; --gray-400:#8F949C; --gray-500:#82868E; --gray-600:#5C5954;
    --ink:#F1F2F4;
    --hover:rgba(255,255,255,.045);
    --tint:rgba(255,255,255,.11);
    --sev-green-t:#6EE7B7;
    --badge-green-bg:rgba(16,185,129,.15); --badge-green-bd:rgba(16,185,129,.3);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--blue-dark);
    color: var(--ink);
    font-family: system-ui, sans-serif;
    font-size: 13px;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
  }

  .content-col {
    width: 360px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* Policies Panel */
  .policies-card {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .policies-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }

  .policies-title-group {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .policies-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gray-400);
  }

  .policies-meta {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .policies-meta-chip {
    font-size: 10px;
    font-weight: 600;
    color: var(--gray-500);
    background: var(--surface-3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
  }

  .policy-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    gap: 10px;
  }

  .policy-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--ink);
  }

  .policy-details {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .policy-type {
    font-size: 10px;
    color: var(--gray-500);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
  }

  .policy-rules {
    font-size: 10px;
    color: var(--gray-400);
  }

  /* Shared */
  .kbd {
    display: inline-block;
    background: var(--surface-3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 10px;
    font-family: monospace;
    color: var(--teal);
    margin-right: 8px;
  }

  .shortcut-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.65);
    z-index: 500;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .shortcut-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px 28px;
    min-width: 280px;
  }

  .col-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--gray-400);
    border-radius: 5px;
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    cursor: pointer;
  }

  .col-btn:hover { border-color: var(--teal); color: var(--teal); }

  .badge.b-green {
    background: var(--badge-green-bg);
    color: var(--sev-green-t);
    border: 1px solid var(--badge-green-bd);
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
  }

  /* Shortcuts panel (inline, not overlay) */
  .shortcuts-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
  }

  .shortcuts-panel-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gray-400);
    margin-bottom: 16px;
  }

  .shortcut-group {
    margin-bottom: 16px;
  }

  .shortcut-group:last-child {
    margin-bottom: 0;
  }

  .group-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gray-400);
    margin-bottom: 8px;
  }

  .shortcut-row {
    display: flex;
    align-items: center;
    padding: 4px 0;
  }

  .shortcut-desc {
    font-size: 12px;
    color: var(--gray-200);
  }

  .group-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 14px 0;
  }
</style>
</head>
<body>
<div class="content-col">

  <!-- Policies Panel -->
  <div class="policies-card">
    <div class="policies-header">
      <div class="policies-title-group">
        <span class="policies-label">Security Policies</span>
        <div class="policies-meta">
          <span class="policies-meta-chip">4 Active</span>
          <span class="policies-meta-chip">12 Rules</span>
        </div>
      </div>
      <button class="col-btn">CSV</button>
    </div>
    <div class="policy-row">
      <div>
        <div class="policy-name">Corporate DNS</div>
        <div class="policy-details" style="margin-top:3px;">
          <span class="policy-type">block</span>
          <span class="policy-rules">6 rules</span>
        </div>
      </div>
      <span class="badge b-green">Active</span>
    </div>
  </div>

  <!-- Shortcuts Panel — inline, v1: uppercase gray labels, single column -->
  <div class="shortcuts-panel">
    <div class="shortcuts-panel-title">Keyboard Shortcuts</div>

    <!-- Navigation group -->
    <div class="shortcut-group">
      <div class="group-label">Navigation</div>
      <div class="shortcut-row">
        <span class="kbd">1–9</span>
        <span class="shortcut-desc">Switch section</span>
      </div>
      <div class="shortcut-row">
        <span class="kbd">/</span>
        <span class="shortcut-desc">Jump to Search</span>
      </div>
    </div>

    <hr class="group-divider">

    <!-- Actions group -->
    <div class="shortcut-group">
      <div class="group-label">Actions</div>
      <div class="shortcut-row">
        <span class="kbd">r</span>
        <span class="shortcut-desc">Refresh data</span>
      </div>
      <div class="shortcut-row">
        <span class="kbd">⌘K</span>
        <span class="shortcut-desc">Command palette</span>
      </div>
      <div class="shortcut-row">
        <span class="kbd">e</span>
        <span class="shortcut-desc">Export CSV</span>
      </div>
      <div class="shortcut-row">
        <span class="kbd">t</span>
        <span class="shortcut-desc">Cycle theme</span>
      </div>
    </div>

    <hr class="group-divider">

    <!-- UI group -->
    <div class="shortcut-group">
      <div class="group-label">UI</div>
      <div class="shortcut-row">
        <span class="kbd">?</span>
        <span class="shortcut-desc">Toggle this panel</span>
      </div>
      <div class="shortcut-row">
        <span class="kbd">Esc</span>
        <span class="shortcut-desc">Close panels</span>
      </div>
    </div>

  </div>
</div>
</body>
</html>
