<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shortcuts & CSV v6 — 2-column split</title>
<style>
  :root {
    --blue-deep:#262B36; --blue-mid:#171A21; --blue-dark:#10131A;
    --teal:#D6D2CB; --teal-bright:#EBE8E2;
    --surface:#1B1F28; --surface-2:#232834; --surface-3:#2E3440;
    --border:rgba(255,255,255,0.09);
    --gray-100:#ECEAE7; --gray-200:#C5C1BB; --gray-400:#8F949C; --gray-500:#82868E; --gray-600:#5C5954;
    --ink:#F1F2F4;
    --hover:rgba(255,255,255,.045);
    --tint:rgba(255,255,255,.11);
    --sev-green-t:#6EE7B7;
    --badge-green-bg:rgba(16,185,129,.15); --badge-green-bd:rgba(16,185,129,.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--blue-dark);
    color: var(--ink);
    font-family: system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    gap: 16px;
  }

  /* Required CSS */
  .kbd { display:inline-block; background:var(--surface-3); border:1px solid var(--border); border-radius:4px; padding:1px 6px; font-size:10px; font-family:monospace; color:var(--teal); margin-right:8px; }
  .shortcut-overlay { position:fixed; inset:0; background:rgba(0,0,0,.65); z-index:500; display:flex; align-items:center; justify-content:center; }
  .shortcut-box { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:24px 28px; min-width:280px; }
  .col-btn { background:none; border:1px solid var(--border); color:var(--gray-400); border-radius:5px; font-size:10px; font-weight:600; padding:3px 8px; cursor:pointer; }
  .col-btn:hover { border-color:var(--teal); color:var(--teal); }
  .badge.b-green { background:var(--badge-green-bg); color:var(--sev-green-t); border:1px solid var(--badge-green-bd); display:inline-flex; align-items:center; padding:2px 8px; border-radius:20px; font-size:10px; font-weight:700; text-transform:uppercase; }

  /* Page layout — wider for 2-col */
  .content-col {
    width: 440px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* Policies panel */
  .policies-card {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .policies-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }
  .policies-header-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .policies-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gray-400);
  }
  .policies-meta {
    font-size: 10px;
    color: var(--gray-600);
  }
  .policies-meta span {
    color: var(--teal);
    font-weight: 600;
  }
  .policy-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    gap: 8px;
  }
  .policy-row-left {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }
  .policy-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--gray-100);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .policy-type {
    font-size: 10px;
    color: var(--gray-500);
    white-space: nowrap;
  }
  .policy-rules {
    font-size: 10px;
    color: var(--gray-600);
    white-space: nowrap;
  }
  .policy-row-right {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  /* Shortcuts panel — v6 2-column grid */
  .shortcut-box {
    width: 100%;
    min-width: 400px;
  }

  .shortcut-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .shortcut-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--gray-400);
  }
  .shortcut-hint {
    font-size: 10px;
    color: var(--gray-600);
  }

  /* 2-column grid inside the panel */
  .shortcuts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0 24px;
  }

  /* Left column — Navigation + UI stacked */
  .col-left {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Right column — Actions, with left border as divider */
  .col-right {
    border-left: 1px solid var(--border);
    padding-left: 24px;
  }

  /* Group inside a column */
  .shortcut-group {
    /* no extra background — separation via columns */
  }
  .group-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gray-400);
    margin-bottom: 7px;
  }

  /* Shortcut row */
  .sc-row {
    display: flex;
    align-items: center;
    padding: 3px 0;
  }
  .sc-label {
    font-size: 11px;
    color: var(--gray-400);
    flex: 1;
  }
</style>
</head>
<body>

<div class="content-col">

  <!-- Policies Panel -->
  <div class="policies-card">
    <div class="policies-header">
      <div class="policies-header-left">
        <span class="policies-title">Security Policies</span>
        <span class="policies-meta"><span>4</span> Active · <span>12</span> Rules</span>
      </div>
      <button class="col-btn">CSV</button>
    </div>
    <div class="policy-row">
      <div class="policy-row-left">
        <div class="policy-name">Corporate DNS</div>
        <div class="policy-type">block</div>
        <div class="policy-rules">6 rules</div>
      </div>
      <div class="policy-row-right">
        <span class="badge b-green">Active</span>
      </div>
    </div>
  </div>

  <!-- Shortcuts Panel — v6 2-column split -->
  <div class="shortcut-box">
    <div class="shortcut-header">
      <span class="shortcut-title">Keyboard Shortcuts</span>
      <span class="shortcut-hint">Press <span class="kbd" style="margin-right:0">?</span> to toggle</span>
    </div>

    <div class="shortcuts-grid">

      <!-- Left column: Navigation + UI -->
      <div class="col-left">

        <!-- Navigation group -->
        <div class="shortcut-group">
          <div class="group-label">Navigation</div>
          <div class="sc-row">
            <span class="kbd">1–9</span>
            <span class="sc-label">Switch section</span>
          </div>
          <div class="sc-row">
            <span class="kbd">/</span>
            <span class="sc-label">Jump to Search</span>
          </div>
        </div>

        <!-- UI group -->
        <div class="shortcut-group">
          <div class="group-label">UI</div>
          <div class="sc-row">
            <span class="kbd">?</span>
            <span class="sc-label">Toggle this panel</span>
          </div>
          <div class="sc-row">
            <span class="kbd">Esc</span>
            <span class="sc-label">Close panels</span>
          </div>
        </div>

      </div>

      <!-- Right column: Actions -->
      <div class="col-right">
        <div class="shortcut-group">
          <div class="group-label">Actions</div>
          <div class="sc-row">
            <span class="kbd">r</span>
            <span class="sc-label">Refresh data</span>
          </div>
          <div class="sc-row">
            <span class="kbd">⌘K</span>
            <span class="sc-label">Command palette</span>
          </div>
          <div class="sc-row">
            <span class="kbd">e</span>
            <span class="sc-label">Export CSV</span>
          </div>
          <div class="sc-row">
            <span class="kbd">t</span>
            <span class="sc-label">Cycle theme</span>
          </div>
        </div>
      </div>

    </div>
  </div>

</div>

</body>
</html>
